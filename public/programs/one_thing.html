<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>One Thing at a Time — Creative Reset Club</title>
<style>
@font-face { font-family: 'Codec Pro'; src: url('/fonts/codec-pro_regular.ttf') format('truetype'); font-weight: 400 700; font-style: normal; }
</style>
<style>
  :root { --cream: #f4f2ee; --cream-dark: #e8e4dc; --ink: #000332; --ink-soft: #000332cc; --red: #ff9090; --red-soft: #ffd0d0; --sand: #000332; --sand-mid: #00033280; --ice: #e6f6ff; }
  * { margin:0; padding:0; box-sizing:border-box; } html { scroll-behavior:smooth; }
  body { background:var(--cream); color:var(--ink); font-family:'Codec Pro',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
  .app { display:flex; min-height:100vh; position:relative; z-index:1; }
  .sidebar { width:268px; min-height:100vh; background:var(--ink); padding:32px 22px; position:fixed; top:0; left:0; bottom:0; overflow-y:auto; display:flex; flex-direction:column; z-index:50; transition:transform .3s ease; }
  .sidebar-logo { font-size:11px; letter-spacing:.12em; text-transform:lowercase; color:rgba(255,255,255,0.35); margin-bottom:4px; }
  .sidebar-program { font-family:'Codec Pro',sans-serif; font-size:19px; color:var(--cream); line-height:1.2; margin-bottom:32px; font-style:normal; }
  .phase-group { margin-bottom:20px; } .phase-label { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,0.28); margin-bottom:7px; padding-left:4px; }
  .day-nav-item { display:flex; align-items:center; gap:9px; padding:8px 9px; border-radius:3px; cursor:pointer; transition:all .2s; border:none; background:none; width:100%; text-align:left; }
  .day-nav-item:hover { background:rgba(242,237,228,.06); } .day-nav-item.active { background:rgba(242,237,228,.1); }
  .day-nav-num { width:23px; height:23px; border-radius:50%; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; font-size:10px; color:rgba(255,255,255,0.55); font-weight:500; flex-shrink:0; transition:all .2s; }
  .day-nav-item.active .day-nav-num { background:var(--cream); color:var(--ink); }
  .day-nav-item.completed .day-nav-num { background:var(--red)!important; color:white!important; }
  .day-nav-title { font-size:11px; color:rgba(255,255,255,0.45); line-height:1.3; font-weight:300; }
  .day-nav-item.active .day-nav-title { color:var(--cream); font-weight:400; }
  .sidebar-progress { margin-top:auto; padding-top:20px; border-top:1px solid rgba(242,237,228,.1); }
  .progress-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:7px; }
  .progress-track { height:3px; background:rgba(242,237,228,.1); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--red); border-radius:2px; transition:width .5s ease; }
  .progress-count { font-size:11px; color:rgba(255,255,255,0.35); margin-top:6px; }
  .main { margin-left:268px; flex:1; padding:52px 60px 100px; max-width:calc(100% - 268px); }
  .day-view { display:none; animation:fadeIn .4s ease forwards; } .day-view.active { display:block; }
  .journal-view { display:none; animation:fadeIn .4s ease forwards; } .journal-view.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .day-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:40px; }
  .day-eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:10px; }
  .day-title { font-family:'Codec Pro',sans-serif; font-size:clamp(28px,4vw,46px); line-height:1.08; font-weight:400; color:var(--ink); margin-bottom:8px; }
  .day-title em { font-style:normal; color:var(--red); }
  .day-number-large { font-family:'Codec Pro',sans-serif; font-size:100px; line-height:1; color:var(--cream-dark); font-style:normal; user-select:none; margin-left:16px; margin-top:-4px; flex-shrink:0; }
  .day-completed-badge { display:none; align-items:center; gap:7px; font-size:12px; color:var(--red); }
  .day-completed-badge.show { display:flex; }
  .day-completed-badge::before { content:'✓'; width:17px; height:17px; background:var(--red); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; }
  .framework-card { background:var(--ink); color:var(--cream); border-radius:4px; padding:26px 30px; margin-bottom:32px; position:relative; overflow:hidden; }
  .framework-card::before { content:''; position:absolute; top:0; right:0; width:70px; height:70px; background:rgba(200,75,47,.15); border-radius:50%; transform:translate(18px,-18px); }
  .framework-eyebrow { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--red); margin-bottom:7px; }
  .framework-name { font-family:'Codec Pro',sans-serif; font-size:19px; color:var(--cream); margin-bottom:2px; font-style:normal; }
  .framework-author { font-size:12px; color:var(--sand-mid); margin-bottom:12px; }
  .framework-body { font-size:14px; line-height:1.75; color:rgba(242,237,228,.75); font-weight:300; }
  .framework-benefit { margin-top:12px; padding-top:12px; border-top:1px solid rgba(244,242,238,.15); font-size:12px; color:rgba(244,242,238,0.65); line-height:1.65; }
  .framework-benefit strong { color:#f4f2ee; font-weight:700; }
  .section { margin-bottom:32px; }
  .section-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--sand); opacity:.4; }
  .question-text { font-family:'Codec Pro',sans-serif; font-size:clamp(17px,2.5vw,25px); line-height:1.45; color:var(--ink); margin-bottom:10px; font-style:normal; }
  .writing-prompts { margin-bottom:14px; }
  .writing-prompt { font-size:13px; color:var(--ink-soft); line-height:1.65; padding:5px 0 5px 14px; border-left:2px solid var(--sand); margin-bottom:7px; font-weight:300; }
  .writing-area { width:100%; min-height:260px; padding:20px 22px; border:1.5px solid var(--sand); border-radius:3px; background:transparent; font-family:'Codec Pro',sans-serif; font-size:15px; line-height:1.85; color:var(--ink); resize:vertical; outline:none; transition:border-color .2s; }
  .writing-area::placeholder { color:var(--sand-mid); font-style:normal; font-size:14px; } .writing-area:focus { border-color:var(--ink); } .writing-area.sufficient { border-color:#7A9E7E; }
  .char-counter { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .char-bar { flex:1; height:2px; background:var(--sand); border-radius:2px; overflow:hidden; }
  .char-fill { height:100%; background:var(--sand-mid); border-radius:2px; transition:width .3s ease, background .3s ease; } .char-fill.sufficient { background:#7A9E7E; }
  .char-num { font-size:11px; color:var(--sand-mid); white-space:nowrap; } .char-num.sufficient { color:#7A9E7E; }
  .followup-section { display:none; margin-top:22px; padding:22px; border:1px solid var(--red-soft); border-radius:3px; background:rgba(200,75,47,.025); animation:fadeIn .4s ease; }
  .followup-section.visible { display:block; }
  .followup-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--red); margin-bottom:9px; }
  .followup-question { font-family:'Codec Pro',sans-serif; font-size:18px; font-style:normal; color:var(--ink); margin-bottom:10px; line-height:1.4; }
  .followup-textarea { width:100%; min-height:160px; padding:16px 20px; border:1px solid var(--sand); border-radius:3px; background:transparent; font-family:'Codec Pro',sans-serif; font-size:14px; line-height:1.8; color:var(--ink); resize:vertical; outline:none; transition:border-color .2s; }
  .followup-textarea:focus { border-color:var(--ink); } .followup-textarea::placeholder { color:var(--sand-mid); font-style:normal; font-size:13px; }
  .reflection-box { background:var(--cream-dark); border-radius:3px; padding:20px 24px; }
  .reflection-prompt { font-size:14px; line-height:1.75; color:var(--ink-soft); font-style:normal; }
  .action-card { border:1.5px solid var(--ink); border-radius:3px; padding:20px 24px; display:flex; gap:16px; align-items:flex-start; }
  .action-icon { width:32px; height:32px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .action-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:4px; }
  .action-text { font-size:14px; line-height:1.65; color:var(--ink); }
  .complete-row { margin-top:32px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .btn-complete { background:var(--ink); color:var(--cream); border:none; padding:14px 34px; font-family:'Codec Pro',sans-serif; font-size:14px; font-weight:500; letter-spacing:.06em; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-complete:hover:not(:disabled) { background:var(--red); transform:translateY(-1px); } .btn-complete:disabled { background:var(--sand); cursor:default; }
  .btn-next { background:transparent; color:var(--ink); border:1.5px solid var(--sand); padding:13px 26px; font-family:'Codec Pro',sans-serif; font-size:14px; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-next:hover { border-color:var(--ink); }
  .complete-note { font-size:12px; color:var(--sand-mid); width:100%; } .complete-note.error { color:var(--red); }
  .journal-entry { margin-bottom:44px; padding-bottom:44px; border-bottom:1px solid var(--sand); } .journal-entry:last-of-type { border-bottom:none; }
  .journal-day-label { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:6px; }
  .journal-day-title { font-family:'Codec Pro',sans-serif; font-size:22px; font-style:normal; color:var(--ink); margin-bottom:12px; }
  .journal-question { font-size:13px; color:var(--sand-mid); margin-bottom:8px; font-style:normal; }
  .journal-answer { font-size:15px; line-height:1.85; color:var(--ink-soft); white-space:pre-wrap; }
  .journal-empty { font-size:14px; color:var(--sand); font-style:normal; }
  .ai-section { margin-top:56px; padding-top:44px; border-top:2px solid var(--ink); }
  .ai-eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--red); margin-bottom:10px; }
  .ai-title { font-family:'Codec Pro',sans-serif; font-size:30px; font-weight:400; color:var(--ink); margin-bottom:6px; } .ai-title em { font-style:normal; }
  .ai-sub { font-size:14px; color:var(--sand-mid); margin-bottom:32px; line-height:1.6; }
  .btn-generate { background:var(--ink); color:var(--cream); border:none; padding:15px 38px; font-family:'Codec Pro',sans-serif; font-size:14px; font-weight:500; letter-spacing:.06em; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-generate:hover { background:var(--red); transform:translateY(-1px); }
  .loading-box { display:flex; align-items:center; gap:12px; padding:28px; background:var(--ink); border-radius:4px; color:var(--cream); }
  .loading-dots { display:flex; gap:4px; }
  .loading-dot { width:6px; height:6px; border-radius:50%; background:var(--red); animation:pulse 1.4s ease infinite; }
  .loading-dot:nth-child(2) { animation-delay:.2s; } .loading-dot:nth-child(3) { animation-delay:.4s; }
  @keyframes pulse { 0%,80%,100% { opacity:.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }
  .reflection-output { animation:fadeIn .6s ease; }
  .warm-block { background:var(--ink); color:var(--cream); border-radius:4px; padding:32px; margin-bottom:24px; }
  .warm-label { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:14px; }
  .warm-text { font-size:15px; line-height:1.85; color:rgba(242,237,228,.88); font-weight:300; } .warm-text p { margin-bottom:14px; } .warm-text p:last-child { margin-bottom:0; }
  .patterns-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .patterns-label::after { content:''; flex:1; height:1px; background:var(--sand); opacity:.4; }
  .pattern-card { border:1.5px solid var(--sand); border-radius:3px; padding:22px 26px; margin-bottom:10px; }
  .pattern-num { font-family:'Codec Pro',sans-serif; font-size:28px; font-style:normal; color:var(--red); line-height:1; margin-bottom:6px; }
  .pattern-title { font-size:15px; font-weight:500; color:var(--ink); margin-bottom:7px; }
  .pattern-body { font-size:14px; line-height:1.75; color:var(--ink-soft); }
  .closing-block { padding:24px; background:var(--cream-dark); border-radius:3px; margin-top:10px; }
  .closing-text { font-family:'Codec Pro',sans-serif; font-size:19px; font-style:normal; line-height:1.55; color:var(--ink); }
  .menu-toggle { display:none; position:fixed; top:14px; left:14px; z-index:200; background:var(--ink); color:var(--cream); border:none; width:38px; height:38px; border-radius:3px; font-size:17px; cursor:pointer; align-items:center; justify-content:center; }
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:40; }
  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); } .sidebar.open { transform:translateX(0); } .sidebar-overlay.show { display:block; }
    .menu-toggle { display:flex; } .main { margin-left:0; padding:52px 18px 80px; max-width:100%; } .day-number-large { display:none; }
  }
</style>
</head>
<body>
<button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">creative reset club</div>
    <div class="sidebar-program">One Thing<br>at a Time</div>
    <div id="sidebarNav"></div>
    <div class="sidebar-progress">
      <div class="progress-label">your progress</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-count" id="progressCount">0 of 14 days complete</div>
    </div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
const MIN = 100;
function wordCount(str){ return str.trim().split(/\s+/).filter(w=>w.length>0).length; }
const program = [
  { day:1, phase:1, phaseName:"Choose", title:"Name the Thing",
    fw:{ name:"The ONE Thing", author:"Gary Keller — The ONE Thing",
      body:"Keller's focusing question is deceptively simple: what is the one thing you can do, such that by doing it, everything else becomes easier or unnecessary? Most people can't answer this — not because they don't know, but because choosing one thing means accepting that everything else is not the thing. Naming it is the first and hardest act.",
      benefit:"<strong>Cognitive benefit:</strong> Explicit goal identification activates the brain's reticular activating system — the neural filter that determines what you notice and what you ignore. Once a goal is named specifically, the brain begins unconsciously filtering information and opportunities through the lens of that goal." },
    q:"Name the one thing you need to do — the single project, task, or creative work that matters most right now. Not three things. One.",
    prompts:["What is the one thing that, if you finished it, would change the most about your creative or professional life?","Why this one? What makes it more important than everything else competing for your attention?","How long have you been carrying this one thing without finishing it?","What has prevented you from naming it clearly and committing to it before now?","Say it in one sentence: 'The one thing I need to do is...' Be specific. Not a category — the actual thing."],
    fu:{ t:50, q:"What does it feel like to name just one thing — and to accept that everything else is not the priority?", prompts:["Is there relief in the narrowing, or anxiety?","What other things are you afraid of neglecting while you focus on this?","What would change if you gave this one thing your full creative attention for 14 days?"] },
    ref:"Naming the thing is the hardest part. Not because you don't know what it is — you probably do. But because naming it means everything else has to wait. That's the price of focus. It's also the source of its power.",
    action:{ i:"🎯", t:"Write your one thing on a card. Put it where you'll see it every morning. For the next 13 days, this is the only thing. Everything else is not-the-thing." }
  },
  { day:2, phase:1, phaseName:"Choose", title:"Why This One",
    fw:{ name:"Start With Why", author:"Simon Sinek — Start With Why",
      body:"Sinek argues that the most motivated action comes from clarity about why something matters — not what it is or how to do it. When the one thing gets hard — and it will — the what and how won't sustain you. The why will. Today you dig into the real reason this particular thing matters more than all the others.",
      benefit:"<strong>Cognitive benefit:</strong> Connecting a goal to deep personal meaning activates the brain's limbic system — the center of motivation and emotional memory. Research shows that people with clear, personally meaningful reasons for pursuing a goal persist through difficulty at significantly higher rates than those motivated by external rewards or obligation." },
    q:"Why does this one thing matter to you — not strategically, not practically, but personally? What is the real reason?",
    prompts:["What does finishing this one thing make possible that is currently impossible?","Who benefits when this is done — and why do you care about that?","What personal meaning does this project carry? Is it about proving something, expressing something, or building something?","If this one thing never gets done, what is the cost — to you, to your creative life, to the people you serve?","What is the deepest, most honest reason this matters? Not the elevator pitch — the real one."],
    fu:{ t:50, q:"Is your why strong enough to carry you through the hardest day of this project — and how do you know?", prompts:["What has your why sustained you through in the past?","Is there a deeper why underneath the one you named — something you haven't admitted yet?","What would you need to believe about this project to stay committed when motivation disappears?"] },
    ref:"The why is your anchor. When the work gets hard, boring, or terrifying, the why is what keeps you showing up. If the why is weak, the commitment will be too. If it's real, nothing can stop you.",
    action:{ i:"💡", t:"Write your why in one sentence. Not the professional reason — the personal one. Put it next to your one-thing card. Read both every morning." }
  },
  { day:3, phase:1, phaseName:"Choose", title:"What You're Avoiding",
    fw:{ name:"The War of Art", author:"Steven Pressfield — The War of Art",
      body:"Pressfield names the force that keeps you from doing your most important work: Resistance. Resistance is strongest against the work that matters most. If you're avoiding something, that's usually a sign of its importance — not its unimportance. What you're avoiding about your one thing is data about where the real work lives.",
      benefit:"<strong>Cognitive benefit:</strong> Naming avoidance patterns reduces their unconscious influence on behavior. Research on cognitive defusion shows that when you can say 'I am avoiding this because...' the avoidance loses approximately 30% of its behavioral power — because awareness disrupts the automatic avoidance loop." },
    q:"What are you avoiding about your one thing — what specific part, aspect, or challenge do you keep not doing?",
    prompts:["What part of this project have you been circling without engaging? The part you skip, defer, or work around?","What is it about that part that makes you avoid it — is it hard, boring, scary, or something else?","What do you do instead of the avoided part? What's your avoidance behavior?","Is the avoided part actually the most important part — the thing the whole project depends on?","What would happen if you did the avoided part first — before anything else?"],
    fu:{ t:50, q:"What is the avoidance protecting you from — and is the protection worth the cost?", prompts:["If you did the hard thing, what would you have to face?","Is the avoidance about the work, or about what the work reveals about you?","What would change if you met the avoidance head-on tomorrow?"] },
    ref:"The part you're avoiding is almost always the part that matters most. Resistance is a compass — it points toward the work that will change you. Today you named where the compass is pointing.",
    action:{ i:"👁️", t:"Write down the specific thing you've been avoiding. Tomorrow, do that thing first. Not the easy parts. The avoided part. Ten minutes is enough to break the seal." }
  },
  { day:4, phase:1, phaseName:"Choose", title:"The Cost of Not Doing It",
    fw:{ name:"Regret Minimization", author:"Jeff Bezos — Regret Minimization Framework",
      body:"Bezos makes major decisions by imagining himself at 80, looking back. Would he regret not doing this? The regret minimization framework cuts through present-moment paralysis by connecting current inaction to future consequence. The cost of not doing your one thing is not just the project that doesn't exist — it's the version of you that doesn't emerge.",
      benefit:"<strong>Cognitive benefit:</strong> Future-self projection activates the brain's prospective memory and long-term planning systems. Research shows that people who vividly imagine the consequences of inaction are significantly more likely to take action than those who focus only on the difficulty of the task at hand." },
    q:"What is the real cost of not doing your one thing — not just the missed project, but the missed version of yourself?",
    prompts:["If you're still avoiding this one thing a year from now, what has that cost you — in progress, in creative growth, in self-respect?","What version of yourself emerges if you do this thing — and what version persists if you don't?","What opportunities, relationships, or possibilities depend on this one thing getting done?","What is the emotional cost of carrying this undone thing — the weight of knowing you should be doing it and not doing it?","Imagine yourself at 80 looking back. Does not finishing this register as a regret?"],
    fu:{ t:50, q:"Is the cost of not doing it actually worse than the difficulty of doing it?", prompts:["Have you been overestimating the difficulty and underestimating the cost of avoidance?","What would shift if you fully accepted both the difficulty and the cost?","What is the smallest way to begin reducing the cost, starting today?"] },
    ref:"The cost of not doing it is usually higher than the cost of doing it. We just don't notice because the cost of inaction is spread across time — a little weight every day, compounding silently. Today you made it visible.",
    action:{ i:"⚖️", t:"Write two sentences: 'If I do this thing, in one year I will be...' and 'If I don't do this thing, in one year I will be...' Let the gap between them motivate you." }
  },
  { day:5, phase:2, phaseName:"Commit", title:"The First Hour",
    fw:{ name:"Eat That Frog", author:"Brian Tracy — Eat That Frog",
      body:"Tracy's principle is simple: do the hardest, most important thing first — before email, before meetings, before the world's demands enter your day. The first hour belongs to your one thing. Not because the first hour is magic, but because it's the hour before everything else can derail you. Protect it, and the one thing gets done.",
      benefit:"<strong>Cognitive benefit:</strong> Morning cognitive resources are highest — willpower, focus, and decision-making capacity are all at peak levels before the demands of the day deplete them. Research shows that people who work on their most important task first produce higher-quality output and complete projects faster than those who defer important work." },
    q:"Give the first hour of your day to your one thing — before anything else gets your attention. What happened?",
    prompts:["What did you work on during your first hour? What specific part of your one thing did you advance?","What did you have to say no to in order to protect the first hour — email, phone, other people's needs?","How did working on the one thing first change the quality of your attention compared to fitting it in later?","What resistance showed up when you sat down to do the work? How did you move through it?","What exists now that didn't exist an hour ago?"],
    fu:{ t:50, q:"What would change about your relationship to your one thing if the first hour was non-negotiable, every day?", prompts:["How many first hours have you given to other people's priorities instead of your own?","What would 14 consecutive first hours of focused work produce?","What is the hardest part about protecting the first hour — and is it actually as hard as you imagine?"] },
    ref:"The first hour is yours. Not email's, not your team's, not the world's — yours. What you put in that hour determines what gets done. Today you put the right thing in it.",

const completed = new Set(JSON.parse(localStorage.getItem('crc-ot') || '[]'));

function init() {
  buildSidebar();
  document.getElementById('mainContent').innerHTML = program.map(buildDay).join('') + buildJournal();
  showDay(1);
  updateProgress();
}

function buildSidebar() {
  const phases = {};
  program.forEach(d => { if(!phases[d.phase]) phases[d.phase]=[]; phases[d.phase].push(d); });
  let html = '';
  Object.entries(phases).forEach(([ph, days]) => {
    html += `<div class="phase-group"><div class="phase-label">Phase ${ph} — ${days[0].phaseName}</div>`;
    days.forEach(d => {
      html += `<button class="day-nav-item ${completed.has(d.day)?'completed':''}" id="nav-${d.day}" onclick="showDay(${d.day})">
        <div class="day-nav-num">${d.day}</div><div class="day-nav-title">${d.title}</div></button>`;
    });
    html += '</div>';
  });
  html += `<div class="phase-group"><div class="phase-label">Review</div>
    <button class="day-nav-item" id="nav-journal" onclick="showJournal()">
      <div class="day-nav-num" style="font-size:13px">📖</div>
      <div class="day-nav-title">Full Journal + AI Reflection</div>
    </button></div>`;
  document.getElementById('sidebarNav').innerHTML = html;
}

function buildDay(d) {
  const sv = getSaved(d.day,'main'), sf = getSaved(d.day,'fu');
  const wc = wordCount(sv), pct = Math.min(100,(wc/MIN)*100), suf = wc>=MIN;
  const done = completed.has(d.day);
  return `<div class="day-view" id="day-${d.day}">
    <div class="day-header">
      <div class="day-meta">
        <div class="day-eyebrow">Day ${d.day} · Phase ${d.phase}: ${d.phaseName}</div>
        <h1 class="day-title">${d.title.split(' ').slice(0,-1).join(' ')} <em>${d.title.split(' ').slice(-1)}</em></h1>
        <div class="day-completed-badge ${done?'show':''}" id="badge-${d.day}">Completed</div>
      </div>
      <div class="day-number-large">${d.day}</div>
    </div>
    <div class="framework-card">
      <div class="framework-eyebrow">framework</div>
      <div class="framework-name">${d.fw.name}</div>
      <div class="framework-author">${d.fw.author}</div>
      <div class="framework-body">${d.fw.body}</div>
      <div class="framework-benefit">${d.fw.benefit}</div>
    </div>
    <div class="section">
      <div class="section-label">today's question</div>
      <div class="question-text">"${d.q}"</div>
      <div class="writing-prompts">${d.prompts.map(p=>`<div class="writing-prompt">${p}</div>`).join('')}</div>
      <textarea class="writing-area${suf?' sufficient':''}" id="write-${d.day}" placeholder="Write freely and at length. Use the prompts above as guides — not limits." oninput="onWrite(${d.day})">${sv}</textarea>
      <div class="char-counter">
        <div class="char-bar"><div class="char-fill${suf?' sufficient':''}" id="fill-${d.day}" style="width:${pct}%"></div></div>
        <div class="char-num${suf?' sufficient':''}" id="ctr-${d.day}">${suf?'✓ ready':`${wc} / ${MIN} words`}</div>
      </div>
      <div class="followup-section ${(sf||wordCount(sv)>=d.fu.t)?'visible':''}" id="fu-${d.day}">
        <div class="followup-label">going deeper</div>
        <div class="followup-question">"${d.fu.q}"</div>
        <div class="writing-prompts">${d.fu.prompts.map(p=>`<div class="writing-prompt">${p}</div>`).join('')}</div>
        <textarea class="followup-textarea" id="fw-${d.day}" placeholder="Keep writing. Don't stop." oninput="save(${d.day},'fu',this.value)">${sf}</textarea>
      </div>
    </div>
    <div class="section">
      <div class="section-label">reflection</div>
      <div class="reflection-box"><div class="reflection-prompt">${d.ref}</div></div>
    </div>
    <div class="section">
      <div class="section-label">micro-action</div>
      <div class="action-card">
        <div class="action-icon">${d.action.i}</div>
        <div><div class="action-label">do this today</div><div class="action-text">${d.action.t}</div></div>
      </div>
    </div>
    <div class="complete-row">
      <button class="btn-complete" id="cbtn-${d.day}" onclick="completeDay(${d.day})" ${done?'disabled':''}>${done?'Day Complete ✓':'Mark Day Complete'}</button>
      ${d.day<14?`<button class="btn-next" onclick="showDay(${d.day+1})">Day ${d.day+1} →</button>`:`<button class="btn-next" onclick="showJournal()">See your full journal →</button>`}
      ${!done?`<div class="complete-note" id="note-${d.day}">Write at least ${MIN} words to complete this day.</div>`:''}
    </div>
  </div>`;
}

function buildJournal() {
  return `<div class="journal-view" id="journal-view">
    <div class="day-eyebrow" style="margin-bottom:14px">Your Journey</div>
    <h1 class="day-title" style="margin-bottom:8px">Fourteen Days of <em>One Thing</em></h1>
    <p style="font-size:15px;color:var(--ink-soft);line-height:1.7;margin-bottom:44px;font-weight:300">Everything you wrote, in one place.</p>
    <div id="j-entries"></div>
    <div class="ai-section">
      <div class="ai-eyebrow">AI Reflection</div>
      <h2 class="ai-title">What your writing <em>reveals</em></h2>
      <p class="ai-sub">A warm mirror of what you said — then 2–3 patterns surfaced from everything you worked through across 14 days.</p>
      <div id="ai-state"><button class="btn-generate" onclick="generateReflection()">Generate my reflection</button></div>
    </div>
  </div>`;
}

function showDay(n) { document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active')); document.getElementById('day-'+n)?.classList.add('active'); document.getElementById('nav-'+n)?.classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); closeSidebar(); }

function showJournal() { document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active')); document.getElementById('journal-view').classList.add('active'); document.getElementById('nav-journal')?.classList.add('active'); populateJournal(); window.scrollTo({top:0,behavior:'smooth'}); closeSidebar(); }

function populateJournal() {
  document.getElementById('j-entries').innerHTML = program.map(d=>{
    const m=getSaved(d.day,'main'), f=getSaved(d.day,'fu');
    return `<div class="journal-entry">
      <div class="journal-day-label">Day ${d.day} · ${d.phaseName}</div>
      <div class="journal-day-title">${d.title}</div>
      <div class="journal-question">"${d.q}"</div>
      ${m?`<div class="journal-answer">${m}</div>`:`<div class="journal-empty">Nothing written yet.</div>`}
      ${f?`<div style="margin-top:18px"><div class="journal-question" style="margin-bottom:7px">"${d.fu.q}"</div><div class="journal-answer">${f}</div></div>`:''}
    </div>`;
  }).join('');
}

function onWrite(n) { const v=document.getElementById('write-'+n)?.value||''; save(n,'main',v); const wc=wordCount(v),pct=Math.min(100,(wc/MIN)*100),suf=wc>=MIN; const fill=document.getElementById('fill-'+n),ctr=document.getElementById('ctr-'+n),ta=document.getElementById('write-'+n); if(fill){fill.style.width=pct+'%';fill.className='char-fill'+(suf?' sufficient':'');} if(ctr){ctr.textContent=suf?'✓ ready':`${wc} / ${MIN} words`;ctr.className='char-num'+(suf?' sufficient':'');} if(ta)ta.className='writing-area'+(suf?' sufficient':''); if(wordCount(v)>=program[n-1].fu.t)document.getElementById('fu-'+n)?.classList.add('visible'); const note=document.getElementById('note-'+n); if(note)note.style.display=suf?'none':'block'; }

function completeDay(n) { const v=getSaved(n,'main'); if(wordCount(v)<MIN){const note=document.getElementById('note-'+n);if(note){note.className='complete-note error';note.textContent=`Please write at least ${MIN} words first.`;}return;} completed.add(n); localStorage.setItem('crc-ot',JSON.stringify([...completed])); const btn=document.getElementById('cbtn-'+n); if(btn){btn.textContent='Day Complete ✓';btn.disabled=true;} document.getElementById('badge-'+n)?.classList.add('show'); const nav=document.getElementById('nav-'+n); if(nav)nav.classList.add('completed'); const nn=nav?.querySelector('.day-nav-num'); if(nn){nn.style.background='#C84B2F';nn.style.color='white';} updateProgress(); if(n<14)setTimeout(()=>showDay(n+1),500); else setTimeout(()=>showJournal(),500); }

function updateProgress() { const pct=(completed.size/14)*100; document.getElementById('progressFill').style.width=pct+'%'; document.getElementById('progressCount').textContent=`${completed.size} of 14 days complete`; }

async function generateReflection() {
  const el=document.getElementById('ai-state');
  el.innerHTML=`<div class="loading-box"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><span style="font-size:14px;color:rgba(242,237,228,.7);font-weight:300">Reading everything you wrote across 14 days…</span></div>`;
  const writing=program.map(d=>{const m=getSaved(d.day,'main'),f=getSaved(d.day,'fu');if(!m&&!f)return null;return`DAY ${d.day} — ${d.title}\nQ: "${d.q}"\nA: ${m}${f?`\n\nDeeper Q: "${d.fu.q}"\nA: ${f}`:''}`; }).filter(Boolean).join('\n\n---\n\n');
  if(!writing.trim()){el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px;font-style:italic">Nothing written yet. Complete some days first and come back.</p>`;return;}
  const prompt=`You are a warm, insightful coach reviewing someone's 14-day journal from "One Thing at a Time" — a program helping scattered creatives choose one thing, commit to it fully, protect it, and finish it, grounded in Gary Keller, Steven Pressfield, Seth Godin, Cal Newport, and Angela Duckworth.\n\nHere is everything they wrote:\n\n${writing}\n\nRespond in exactly this format:\n\nWARM MIRROR\n[3-4 paragraphs reflecting back what they said warmly and without judgment. Use their own language. Show them you heard them. Speak directly to them as "you". Make them feel genuinely seen. Do not interpret yet — just mirror.]\n\nPATTERN 1\n[SHORT SPECIFIC TITLE IN CAPS]\n[One paragraph describing this pattern, grounded in specific things they wrote. Honest and warm — not generic.]\n\nPATTERN 2\n[SHORT SPECIFIC TITLE IN CAPS]\n[One paragraph describing this pattern, grounded in specific things they wrote.]\n\nPATTERN 3\n[SHORT SPECIFIC TITLE IN CAPS]\n[One paragraph describing this pattern, grounded in specific things they wrote.]\n\nCLOSING\n[One sentence. True and forward-facing. Something they can carry.]\n\nTone: warm but direct. Honest without being harsh. Like a trusted person who has read every word carefully.`;
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json(); const text=data.content?.map(b=>b.text||'').join('')||''; if(!text)throw new Error();
    const warmMatch=text.match(/WARM MIRROR\s*([\s\S]*?)(?=PATTERN 1)/i); const warm=warmMatch?warmMatch[1].trim():'';
    const patterns=[]; const patternRe=/PATTERN \d+\s+([A-Z][^\n]+)\s+([\s\S]*?)(?=PATTERN \d+|CLOSING|$)/gi; let pm; while((pm=patternRe.exec(text))!==null){patterns.push({title:pm[1].trim(),body:pm[2].trim()});}
    const closingMatch=text.match(/CLOSING\s*([\s\S]*?)$/i); const closing=closingMatch?closingMatch[1].trim():'';
    el.innerHTML=`<div class="reflection-output"><div class="warm-block"><div class="warm-label">what I heard</div><div class="warm-text">${warm.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div></div><div class="patterns-label">patterns across 14 days</div>${(patterns.length?patterns:[{title:'THE POWER OF CHOOSING ONE',body:'Across your writing, a transformation: from scattered energy across many things to focused commitment on one. The choosing itself was the breakthrough.'},{title:'PROTECTING WHAT MATTERS',body:'You discovered that the one thing doesn\'t survive on its own — it requires active protection from everything else competing for your attention. Building those walls was the hardest and most important work.'},{title:'YOU ARE SOMEONE WHO FINISHES',body:'The most significant shift wasn\'t in the project. It was in your identity. You are now someone with evidence that they can choose, commit, and finish. That changes everything.'}]).slice(0,3).map((p,i)=>`<div class="pattern-card"><div class="pattern-num">${i+1}</div><div class="pattern-title">${p.title}</div><div class="pattern-body">${p.body}</div></div>`).join('')}${closing?`<div class="closing-block"><div class="closing-text">${closing}</div></div>`:''}</div>`;
  } catch(e) { el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px">Something went wrong. Try again after completing more days.</p><button class="btn-generate" onclick="generateReflection()" style="margin-top:14px">Try again</button>`; }
}

function save(day,key,val){ localStorage.setItem(`crc-ot-${day}-${key}`,val); }
function getSaved(day,key){ return localStorage.getItem(`crc-ot-${day}-${key}`)||''; }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

init();
</script>
</body>
