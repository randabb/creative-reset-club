<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refill — Creative Reset Club</title>
<style>
@font-face { font-family:'Codec Pro'; src:url('/fonts/codec-pro_regular.ttf') format('truetype'); font-weight:400 700; font-style:normal; }
</style>
<style>
  :root { --cream:#f4f2ee;--cream-dark:#e8e4dc;--ink:#000332;--ink-soft:#000332cc;--red:#ff9090;--red-soft:#ffd0d0;--sand:#000332;--sand-mid:#00033280;--ice:#e6f6ff; }
  *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
  body{background:var(--cream);color:var(--ink);font-family:'Codec Pro',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  .app{display:flex;min-height:100vh;position:relative;z-index:1}
  .sidebar{width:268px;min-height:100vh;background:var(--ink);padding:32px 22px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;display:flex;flex-direction:column;z-index:50;transition:transform .3s ease}
  .sidebar-logo{font-size:11px;letter-spacing:.12em;text-transform:lowercase;color:rgba(255,255,255,0.35);margin-bottom:4px}
  .sidebar-program{font-family:'Codec Pro',sans-serif;font-size:19px;color:var(--cream);line-height:1.2;margin-bottom:32px;font-style:normal}
  .phase-group{margin-bottom:20px}.phase-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:7px;padding-left:4px}
  .day-nav-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:3px;cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left}
  .day-nav-item:hover{background:rgba(242,237,228,.06)}.day-nav-item.active{background:rgba(242,237,228,.1)}
  .day-nav-num{width:23px;height:23px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.55);font-weight:500;flex-shrink:0;transition:all .2s}
  .day-nav-item.active .day-nav-num{background:var(--cream);color:var(--ink)}.day-nav-item.completed .day-nav-num{background:var(--red)!important;color:white!important}
  .day-nav-title{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.3;font-weight:300}.day-nav-item.active .day-nav-title{color:var(--cream);font-weight:400}
  .sidebar-progress{margin-top:auto;padding-top:20px;border-top:1px solid rgba(242,237,228,.1)}
  .progress-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:7px}
  .progress-track{height:3px;background:rgba(242,237,228,.1);border-radius:2px;overflow:hidden}.progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width .5s ease}
  .progress-count{font-size:11px;color:rgba(255,255,255,0.35);margin-top:6px}
  .main{margin-left:268px;flex:1;padding:52px 60px 100px;max-width:calc(100% - 268px)}
  .day-view{display:none;animation:fadeIn .4s ease forwards}.day-view.active{display:block}
  .journal-view{display:none;animation:fadeIn .4s ease forwards}.journal-view.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px}
  .day-eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:10px}
  .day-title{font-family:'Codec Pro',sans-serif;font-size:clamp(28px,4vw,46px);line-height:1.08;font-weight:400;color:var(--ink);margin-bottom:8px}
  .day-title em{font-style:normal;color:var(--red)}
  .day-number-large{font-family:'Codec Pro',sans-serif;font-size:100px;line-height:1;color:var(--cream-dark);font-style:normal;user-select:none;margin-left:16px;margin-top:-4px;flex-shrink:0}
  .day-completed-badge{display:none;align-items:center;gap:7px;font-size:12px;color:var(--red)}
  .day-completed-badge.show{display:flex}
  .day-completed-badge::before{content:'✓';width:17px;height:17px;background:var(--red);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
  .section{margin-bottom:32px}
  .section-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--sand);opacity:.4}
  .question-text{font-family:'Codec Pro',sans-serif;font-size:clamp(17px,2.5vw,25px);line-height:1.45;color:var(--ink);margin-bottom:10px;font-style:normal}
  .writing-prompts{margin-bottom:14px}
  .writing-prompt{font-size:13px;color:var(--ink-soft);line-height:1.65;padding:5px 0 5px 14px;border-left:2px solid var(--sand);margin-bottom:7px;font-weight:300}
  .writing-area{width:100%;min-height:260px;padding:20px 22px;border:1.5px solid var(--sand);border-radius:3px;background:transparent;font-family:'Codec Pro',sans-serif;font-size:15px;line-height:1.85;color:var(--ink);resize:vertical;outline:none;transition:border-color .2s}
  .writing-area::placeholder{color:var(--sand-mid);font-style:normal;font-size:14px}
  .writing-area:focus{border-color:var(--ink)}.writing-area.sufficient{border-color:#7A9E7E}
  .char-counter{display:flex;align-items:center;gap:10px;margin-top:8px}
  .char-bar{flex:1;height:2px;background:var(--sand);border-radius:2px;overflow:hidden}
  .char-fill{height:100%;background:var(--sand-mid);border-radius:2px;transition:width .3s ease,background .3s ease}.char-fill.sufficient{background:#7A9E7E}
  .char-num{font-size:11px;color:var(--sand-mid);white-space:nowrap}.char-num.sufficient{color:#7A9E7E}
  .reflection-box{background:var(--cream-dark);border-radius:3px;padding:20px 24px}
  .reflection-prompt{font-size:14px;line-height:1.75;color:var(--ink-soft);font-style:normal}
  .action-card{border:1.5px solid var(--ink);border-radius:3px;padding:20px 24px;display:flex;gap:16px;align-items:flex-start}
  .action-icon{width:32px;height:32px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .action-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:4px}
  .action-text{font-size:14px;line-height:1.65;color:var(--ink)}
  .complete-row{margin-top:32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .btn-complete{background:var(--ink);color:var(--cream);border:none;padding:14px 34px;font-family:'Codec Pro',sans-serif;font-size:14px;font-weight:500;letter-spacing:.06em;border-radius:2px;cursor:pointer;transition:all .2s}
  .btn-complete:hover:not(:disabled){background:var(--red);transform:translateY(-1px)}.btn-complete:disabled{background:var(--sand);cursor:default}
  .btn-next{background:transparent;color:var(--ink);border:1.5px solid var(--sand);padding:13px 26px;font-family:'Codec Pro',sans-serif;font-size:14px;border-radius:2px;cursor:pointer;transition:all .2s}
  .btn-next:hover{border-color:var(--ink)}
  .complete-note{font-size:12px;color:var(--sand-mid);width:100%}.complete-note.error{color:var(--red)}
  .journal-entry{margin-bottom:44px;padding-bottom:44px;border-bottom:1px solid var(--sand)}.journal-entry:last-of-type{border-bottom:none}
  .journal-day-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:6px}
  .journal-day-title{font-family:'Codec Pro',sans-serif;font-size:22px;font-style:normal;color:var(--ink);margin-bottom:12px}
  .journal-question{font-size:13px;color:var(--sand-mid);margin-bottom:8px;font-style:normal}
  .journal-answer{font-size:15px;line-height:1.85;color:var(--ink-soft);white-space:pre-wrap}
  .journal-empty{font-size:14px;color:var(--sand);font-style:normal}
  .ai-section{margin-top:56px;padding-top:44px;border-top:2px solid var(--ink)}
  .ai-eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
  .ai-title{font-family:'Codec Pro',sans-serif;font-size:30px;font-weight:400;color:var(--ink);margin-bottom:6px}.ai-title em{font-style:normal}
  .ai-sub{font-size:14px;color:var(--sand-mid);margin-bottom:32px;line-height:1.6}
  .btn-generate{background:var(--ink);color:var(--cream);border:none;padding:15px 38px;font-family:'Codec Pro',sans-serif;font-size:14px;font-weight:500;letter-spacing:.06em;border-radius:2px;cursor:pointer;transition:all .2s}
  .btn-generate:hover{background:var(--red);transform:translateY(-1px)}
  .loading-box{display:flex;align-items:center;gap:12px;padding:28px;background:var(--ink);border-radius:4px;color:var(--cream)}
  .loading-dots{display:flex;gap:4px}.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.4s ease infinite}
  .loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  .reflection-output{animation:fadeIn .6s ease}
  .warm-block{background:var(--ink);color:var(--cream);border-radius:4px;padding:32px;margin-bottom:24px}
  .warm-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:14px}
  .warm-text{font-size:15px;line-height:1.85;color:rgba(242,237,228,.88);font-weight:300}.warm-text p{margin-bottom:14px}.warm-text p:last-child{margin-bottom:0}
  .patterns-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .patterns-label::after{content:'';flex:1;height:1px;background:var(--sand);opacity:.4}
  .pattern-card{border:1.5px solid var(--sand);border-radius:3px;padding:22px 26px;margin-bottom:10px}
  .pattern-num{font-family:'Codec Pro',sans-serif;font-size:28px;font-style:normal;color:var(--red);line-height:1;margin-bottom:6px}
  .pattern-title{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:7px}
  .pattern-body{font-size:14px;line-height:1.75;color:var(--ink-soft)}
  .closing-block{padding:24px;background:var(--cream-dark);border-radius:3px;margin-top:10px}
  .closing-text{font-family:'Codec Pro',sans-serif;font-size:19px;font-style:normal;line-height:1.55;color:var(--ink)}
  .uts-section{margin-bottom:32px}
  .uts-toggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:16px 20px;background:rgba(0,3,50,0.03);border-radius:4px;border:1px solid rgba(0,3,50,0.06);list-style:none}
  .uts-toggle::-webkit-details-marker{display:none}
  .uts-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand-mid)}
  .uts-icon{font-size:16px;color:var(--sand-mid);transition:transform 0.2s}
  details[open] .uts-icon{transform:rotate(45deg)}
  .uts-body{padding:20px 20px 4px;font-size:14px;line-height:1.75;color:var(--ink-soft);font-weight:300}
  .menu-toggle{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--ink);color:var(--cream);border:none;width:38px;height:38px;border-radius:3px;font-size:17px;cursor:pointer;align-items:center;justify-content:center}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
  @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.sidebar-overlay.show{display:block}.menu-toggle{display:flex}.main{margin-left:0;padding:52px 18px 80px;max-width:100%}.day-number-large{display:none}}
</style>
</head>
<body>
<button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">creative reset club</div>
    <div class="sidebar-program">Refill</div>
    <div id="sidebarNav"></div>
    <div class="sidebar-progress">
      <div class="progress-label">your progress</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-count" id="progressCount">0 of 14 days complete</div>
    </div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
const MIN=100;
function wordCount(str){return str.trim().split(/\s+/).filter(w=>w.length>0).length;}
const program=[
  {day:1,phase:1,phaseName:"Acknowledge the Depletion",title:"Admit the Empty",
    uts:"Depletion in creative work is often the last thing to get acknowledged. You keep producing, keep showing up, keep delivering. But something about it has gone thin. Energy that used to feel natural now requires effort. The ideas that used to come now have to be forced. Most people push through this for a long time before they name it. You're naming it now.",
    q:"Write about what empty feels like for you. Not the dramatic version. The actual everyday version. What does a depleted creative day look like?",
    prompts:["What's the first sign that the well is running low?","What do you produce when you're depleted compared to when you're full?","How long have you been running on empty?"],
    kg:"Write about the last time the well felt full. What was different? What were you doing, taking in, making time for?",
    notice:"Notice if admitting the depletion feels like relief or defeat. Relief means you've been holding this for a while. Both are worth paying attention to.",
    action:{i:"💧",t:"Write one word that describes how your creative energy feels right now. Just one. That's the starting point."}
  },
  {day:2,phase:1,phaseName:"Acknowledge the Depletion",title:"What You've Been Giving",
    uts:"Depletion has a cause. It's not random and it's not a character flaw. It's the result of sustained output without sufficient input, of giving without replenishing, of staying in execution mode long past the point where the reserves ran out. Understanding what you've been giving, and how much, is the first step toward understanding what you need.",
    q:"Write about what you've been giving. The output, the energy, the presence, the care. What has been leaving you and going into the work or the people around you?",
    prompts:["Be specific and honest. Not complaining, just accounting.","What has required the most of you recently?","What have you been giving that hasn't been replenished?"],
    kg:"Write about the ratio. How much has been going out compared to how much has been coming in? What does that imbalance feel like in your body and in your work?",
    notice:"Notice if you've been treating depletion as a virtue. Busyness and output as proof of worth. That's worth examining.",
    action:{i:"📊",t:"Write one thing you've been giving that has cost more than you realized. Just one. Name it without judgment."}
  },
  {day:3,phase:1,phaseName:"Acknowledge the Depletion",title:"What You've Stopped Taking In",
    uts:"Rick Rubin describes creativity as rooted in noticing and receiving. The creative person as someone who is deeply attentive to the world, taking things in, letting them accumulate and combine. When we stop taking things in — not just consuming but genuinely receiving — the well stops refilling. It's not enough to rest. You have to actively restore.",
    q:"Write about what you've stopped taking in. The things that used to feed you creatively that have quietly disappeared from your life.",
    prompts:["What used to inspire you that you haven't made time for recently?","What experiences, people, or inputs used to make you feel alive and creative?","When did you last do something purely for the pleasure of receiving it?"],
    kg:"Write about why those things disappeared. Was it time? Energy? Guilt about not being productive? Or did you just stop noticing you'd let them go?",
    notice:"Notice if there's a pattern to what you've let go. Often it's the things that feel most like play, most like pure pleasure, most like they can't be justified. Those are usually the things most worth protecting.",
    action:{i:"🌿",t:"Write the name of one thing you used to do that fed you. One thing you've let go. You don't have to do it today. Just remember it exists."}
  },
  {day:4,phase:2,phaseName:"Stop the Drain",title:"What's Draining You",
    uts:"Restoration is harder when the drain is still open. Before the well can refill, it helps to understand what's been emptying it. Not everything that drains you is avoidable. But some of it is. And even the unavoidable drains become more manageable when you can see them clearly.",
    q:"Write about what's been draining you. Not the obvious big things. The quiet, persistent ones that take a little energy every day without announcing themselves.",
    prompts:["What do you do regularly that leaves you feeling less than when you started?","What obligations, habits, or inputs consistently cost more than they give back?","What are you tolerating that you haven't fully acknowledged?"],
    kg:"Pick the drain that costs the most. Write about what it would take to reduce it, remove it, or at least see it clearly enough to stop pretending it isn't there.",
    notice:"Notice if any of the drains are things you've chosen. Not all drains are imposed from outside. Sometimes we build them ourselves.",
    action:{i:"🔌",t:"Write one drain you could reduce this week. Not eliminate. Just reduce. One small change in the direction of less."}
  },
  {day:5,phase:2,phaseName:"Stop the Drain",title:"The Permission to Rest",
    uts:"Rest is not the absence of work. It's a different kind of work. The brain consolidates, integrates, and generates during rest in ways it cannot during active production. The research on default mode network activity shows that some of our most creative thinking happens when we're not trying to think. The problem is that most people never give themselves permission to stop.",
    q:"Write about your relationship with rest. Not sleep, but genuine stopping. Permission to do nothing productive.",
    prompts:["What do you feel when you're not being productive? Name the feeling honestly.","Where did your relationship with rest come from? Who modeled it for you?","When was the last time you rested without guilt?"],
    kg:"Write about what guilt-free rest would look like for you. Not a fantasy — a realistic version. What would you do? How long? What would you have to let go of to allow it?",
    notice:"Notice if rest feels like a reward you haven't earned yet. That feeling is worth examining. The well doesn't wait until you deserve to refill it.",
    action:{i:"🛋️",t:"Take 20 minutes today to do nothing productive. No phone, no content, no planning. Just exist. Write one sentence afterward about what that was like."}
  },
  {day:6,phase:2,phaseName:"Stop the Drain",title:"Slow Down on Purpose",
    uts:"Speed is one of the most reliable ways to stay depleted. When everything moves fast, nothing has time to land. Experiences pass through without accumulating. Ideas arrive and disappear before they can be held. Slowing down on purpose isn't about being less productive. It's about letting things actually reach you.",
    q:"Write about what it would mean to slow down this week. Not stop — just slow. What would you do less of? What would you do more slowly?",
    prompts:["What do you currently rush through that might be worth lingering in?","What would you notice if you moved at half your usual speed today?","What has speed been costing you that you haven't fully accounted for?"],
    kg:"Write about one thing you're going to do more slowly today. Describe it in detail before you do it. What might you notice that you usually miss?",
    notice:"Notice if slowing down feels uncomfortable. That discomfort is usually a sign that speed has become a way of avoiding something. Worth knowing.",
    action:{i:"🐌",t:"Do one thing today at half your usual speed. A meal, a walk, a conversation. Write one sentence about what you noticed."}
  },
  {day:7,phase:2,phaseName:"Stop the Drain",title:"What You Need",
    uts:"Most depleted people are very good at knowing what others need and much less practiced at knowing what they themselves need. Asking the question directly — and answering it honestly, without immediately dismissing the answer as impractical or self-indulgent — is a skill. It's the precondition for actually getting what you need.",
    q:"Write about what you actually need right now. Not what you should need, not the responsible answer. What do you genuinely need to feel more like yourself?",
    prompts:["If you had a week with no obligations, what would you do?","What does your body want that you've been ignoring?","What would make you feel more alive than you currently do?"],
    kg:"Write about what's standing between you and getting what you need. Be honest about what's real and what's just a story you're telling yourself.",
    notice:"Notice if what you need is simpler than you've been making it. Often it is. A walk, a conversation, an afternoon of doing nothing. The answer is usually quieter than the problem.",
    action:{i:"🧭",t:"Write one thing you need and one small step toward getting it. Just one. Today."}
  },
  {day:8,phase:3,phaseName:"Restore and Receive",title:"Take Something In",
    uts:"Restoration requires input. Not consumption, which is passive and often depleting, but genuine receiving. The difference is attention and intention. Consuming is scrolling past. Receiving is stopping, being present, letting something actually reach you. The same piece of music, the same walk, the same conversation can be consumed or received. The difference is how much of you shows up.",
    q:"Write about something you're going to take in today with full attention. A piece of music, a walk, a book, a meal, a conversation. Something you're going to receive rather than consume.",
    prompts:["What does this thing give you when you're fully present to it?","What do you usually miss because you're only half paying attention?","What would it mean to let this thing actually reach you?"],
    kg:"Do the thing. Then write about what you noticed. What reached you that usually doesn't?",
    notice:"Notice the difference between consuming and receiving. That difference is worth protecting.",
    action:{i:"🎧",t:"Name one thing you're going to receive today — not just consume. Write it down before you do it."}
  },
  {day:9,phase:3,phaseName:"Restore and Receive",title:"Follow Curiosity",
    uts:"Curiosity is one of the most reliable signs that the well is starting to refill. It shows up as a pull toward something, a question you want to follow, an interest that has no obvious practical application. Elizabeth Gilbert writes about curiosity as a more sustainable guide than passion, because it doesn't require intensity. It just requires following the small pull, even when it doesn't make sense.",
    q:"Write about what you're currently curious about. Not what you think you should be interested in. What actually pulls your attention right now, even if it seems irrelevant or impractical.",
    prompts:["What have you been wanting to learn about, explore, or understand?","What question keeps coming up that you haven't given yourself time to follow?","What would you explore if no one was watching and nothing had to come of it?"],
    kg:"Follow one thread of curiosity right now. Write about it. Let it go somewhere without trying to make it useful.",
    notice:"Notice if following curiosity felt different from doing productive work. That feeling is the beginning of restoration.",
    action:{i:"🔍",t:"Spend 15 minutes today following one curiosity with no agenda. Then write one sentence about where it led."}
  },
  {day:10,phase:3,phaseName:"Restore and Receive",title:"Make Something With No Purpose",
    uts:"Play is serious work for the creative system. It's how the brain makes unexpected connections, how new ideas form, how the relationship between effort and expression gets restored. Most adults have stopped playing because play feels unjustifiable. But making something with no purpose, no audience, no output in mind, is one of the fastest ways to restore creative energy. Not because it produces anything. Because of what it restores.",
    q:"Make something today with no purpose. Not for anyone, not toward anything. A piece of writing that will never be read, a drawing, a list of things you find beautiful, a description of a memory. Just make something for the sake of making.",
    prompts:["Give yourself permission to make it badly and privately.","Don't try to make it good. Try to make it genuine.","What would you make if you knew no one would ever see it?"],
    kg:"Write about what it felt like to make something with no stakes. What came up when the pressure was off?",
    notice:"Notice if making something purposeless felt more alive than some of your purposeful work. That's information about what your creative system actually needs.",
    action:{i:"🎨",t:"Keep what you made today. Don't show it to anyone. It's just yours."}
  },
  {day:11,phase:3,phaseName:"Restore and Receive",title:"What's Coming Back",
    uts:"Restoration is rarely dramatic. It arrives quietly. A thought that surprises you. A small pull toward something you'd stopped caring about. A moment of genuine interest after a long stretch of going through the motions. These are the signs the well is refilling. They're easy to miss if you're not paying attention.",
    q:"Write about what's been coming back. Small signs of creative energy returning. They might be subtle. Write them down anyway.",
    prompts:["What have you found yourself interested in this week that you weren't last week?","What ideas have surfaced that you haven't immediately dismissed?","What felt slightly more alive than usual?"],
    kg:"Pick one thing that's coming back and follow it further. Write about it, explore it, let it develop without forcing it into something useful yet.",
    notice:"Notice the difference between what was coming back and what you were forcing. The returning things are probably closer to what you actually need to be making.",
    action:{i:"🌱",t:"Write one thing that's starting to return. Give it a name. It's worth tracking."}
  },
  {day:12,phase:4,phaseName:"Return With Something in the Well",title:"What You Want to Make",
    uts:"When the well starts to refill, something shifts in the relationship to making. Instead of forcing output from an empty place, there's something to draw from. Ideas arrive with a different quality. The want to make something comes back, tentatively at first, then with more clarity. This is the moment to listen carefully to what's asking to be made, without rushing it into production.",
    q:"Write about what you want to make now. Not what you should make, not what's practical or expected. What genuinely wants to be made from where you are right now?",
    prompts:["What has this period of restoration uncovered or clarified?","What do you see or think about differently than you did two weeks ago?","What would you make if you trusted that the well would stay full?"],
    kg:"Write about what this thing would be for. Not the audience, not the outcome. What would it be an expression of?",
    notice:"Notice if what wants to be made now is different from what you thought you should be making before you started this track. Often it is.",
    action:{i:"✨",t:"Write one sentence about what you want to make next. Just one. That's enough for now."}
  },
  {day:13,phase:4,phaseName:"Return With Something in the Well",title:"Protecting the Well",
    uts:"The well will empty again. That's not a failure — it's the nature of sustained creative work. The question isn't how to prevent depletion but how to notice it earlier, respond to it faster, and build in the restoration before it becomes a crisis. The practices that refilled the well are worth protecting as ongoing habits, not just emergency measures.",
    q:"Write about what has restored you during this track. What practices, inputs, permissions, or slowings have made a difference?",
    prompts:["Which days felt most restorative? What was happening on those days?","What did you learn about what actually fills you versus what you thought would fill you?","What would you want to protect as an ongoing practice going forward?"],
    kg:"Write about how you want to work differently going forward. Not a grand plan. Just two or three things you're going to do to keep the well from running dry again.",
    notice:"Notice if the things that restored you were simpler than you expected. They usually are. The well doesn't need expensive inputs. It needs consistent, genuine ones.",
    action:{i:"🛡️",t:"Write two things you're going to protect as ongoing practices. Simple, specific, realistic. Those are your commitments."}
  },
  {day:14,phase:5,phaseName:"Return",title:"The Return",
    uts:"You started this track depleted. You've spent two weeks acknowledging it, stopping the drain, restoring, and beginning to return. The well isn't overflowing. But there's something in it. That's enough to begin. That's always been enough to begin.",
    q:"Write about where you started and where you are now. Not in terms of output. In terms of how the well feels.",
    prompts:["What's different about your creative energy compared to Day 1?","What surprised you most about this process?","What do you want to protect going forward?"],
    kg:"Write your return statement. Not a plan. Just an acknowledgment of what's been restored and what you're bringing back with you.",
    notice:"Notice what's in the well now that wasn't there before. Even if it's small. Small is enough.",
    action:{i:"🌅",t:"Write three words that describe how your creative energy feels now. Then write one sentence about what you're going to make first."}
  }
];

const completed=new Set(JSON.parse(localStorage.getItem('crc-rf')||'[]'));

function init(){buildSidebar();document.getElementById('mainContent').innerHTML=program.map(buildDay).join('')+buildJournal();showDay(1);updateProgress();}

function buildSidebar(){
  const phases={};program.forEach(d=>{if(!phases[d.phase])phases[d.phase]=[];phases[d.phase].push(d);});
  let html='';
  Object.entries(phases).forEach(([ph,days])=>{
    html+=`<div class="phase-group"><div class="phase-label">Phase ${ph} — ${days[0].phaseName}</div>`;
    days.forEach(d=>{html+=`<button class="day-nav-item ${completed.has(d.day)?'completed':''}" id="nav-${d.day}" onclick="showDay(${d.day})"><div class="day-nav-num">${d.day}</div><div class="day-nav-title">${d.title}</div></button>`;});
    html+='</div>';
  });
  html+=`<div class="phase-group"><div class="phase-label">Review</div><button class="day-nav-item" id="nav-journal" onclick="showJournal()"><div class="day-nav-num" style="font-size:13px">📖</div><div class="day-nav-title">Full Journal + AI Reflection</div></button></div>`;
  document.getElementById('sidebarNav').innerHTML=html;
}

function buildDay(d){
  const sv=getSaved(d.day,'main');const wc=wordCount(sv),pct=Math.min(100,(wc/MIN)*100),suf=wc>=MIN;const done=completed.has(d.day);
  return`<div class="day-view" id="day-${d.day}">
    <div class="day-header"><div class="day-meta"><div class="day-eyebrow">Day ${d.day} · Phase ${d.phase}: ${d.phaseName}</div><h1 class="day-title">${d.title.split(' ').slice(0,-1).join(' ')} <em>${d.title.split(' ').slice(-1)}</em></h1><div class="day-completed-badge ${done?'show':''}" id="badge-${d.day}">Completed</div></div><div class="day-number-large">${d.day}</div></div>
    <details class="uts-section"><summary class="uts-toggle"><span class="uts-label">under the surface</span><span class="uts-icon">+</span></summary><div class="uts-body">${d.uts}</div></details>
    <div class="section"><div class="section-label">start here</div><div class="question-text">"${d.q}"</div><div class="writing-prompts">${d.prompts.map(p=>`<div class="writing-prompt">${p}</div>`).join('')}</div>
      <textarea class="writing-area${suf?' sufficient':''}" id="write-${d.day}" placeholder="Write freely and at length. Use the prompts above as guides — not limits." oninput="onWrite(${d.day})">${sv}</textarea>
      <div class="char-counter"><div class="char-bar"><div class="char-fill${suf?' sufficient':''}" id="fill-${d.day}" style="width:${pct}%"></div></div><div class="char-num${suf?' sufficient':''}" id="ctr-${d.day}">${suf?'✓ ready':`${wc} / ${MIN} words`}</div></div></div>
    <div class="section"><div class="section-label">keep going</div><div class="question-text">"${d.kg}"</div></div>
    <div class="section"><div class="section-label">notice this</div><div class="reflection-box"><div class="reflection-prompt">${d.notice}</div></div></div>
    <div class="section"><div class="section-label">micro-action</div><div class="action-card"><div class="action-icon">${d.action.i}</div><div><div class="action-label">do this today</div><div class="action-text">${d.action.t}</div></div></div></div>
    <div class="complete-row"><button class="btn-complete" id="cbtn-${d.day}" onclick="completeDay(${d.day})" ${done?'disabled':''}>${done?'Day Complete ✓':'Mark Day Complete'}</button>${d.day<14?`<button class="btn-next" onclick="showDay(${d.day+1})">Day ${d.day+1} →</button>`:`<button class="btn-next" onclick="showJournal()">See your full journal →</button>`}${!done?`<div class="complete-note" id="note-${d.day}">Write at least ${MIN} words to complete this day.</div>`:''}</div>
  </div>`;
}

function buildJournal(){
  return`<div class="journal-view" id="journal-view"><div class="day-eyebrow" style="margin-bottom:14px">Your Journey</div><h1 class="day-title" style="margin-bottom:8px">Fourteen Days of <em>Refilling</em></h1><p style="font-size:15px;color:var(--ink-soft);line-height:1.7;margin-bottom:44px;font-weight:300">Everything you wrote, in one place.</p><div id="j-entries"></div>
    <div class="ai-section"><div class="ai-eyebrow">AI Reflection</div><h2 class="ai-title">What your writing <em>reveals</em></h2><p class="ai-sub">A warm mirror of what you said — then 2–3 patterns surfaced from everything you worked through across 14 days.</p><div id="ai-state"><button class="btn-generate" onclick="generateReflection()">Generate my reflection</button></div></div></div>`;
}

function showDay(n){document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));document.getElementById('day-'+n)?.classList.add('active');document.getElementById('nav-'+n)?.classList.add('active');window.scrollTo({top:0,behavior:'smooth'});closeSidebar();}
function showJournal(){document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));document.getElementById('journal-view').classList.add('active');document.getElementById('nav-journal')?.classList.add('active');populateJournal();window.scrollTo({top:0,behavior:'smooth'});closeSidebar();}

function populateJournal(){
  document.getElementById('j-entries').innerHTML=program.map(d=>{const m=getSaved(d.day,'main');return`<div class="journal-entry"><div class="journal-day-label">Day ${d.day} · ${d.phaseName}</div><div class="journal-day-title">${d.title}</div><div class="journal-question">"${d.q}"</div>${m?`<div class="journal-answer">${m}</div>`:`<div class="journal-empty">Nothing written yet.</div>`}</div>`;}).join('');
}

function onWrite(n){
  const v=document.getElementById('write-'+n)?.value||'';save(n,'main',v);
  const wc=wordCount(v),pct=Math.min(100,(wc/MIN)*100),suf=wc>=MIN;
  const fill=document.getElementById('fill-'+n),ctr=document.getElementById('ctr-'+n),ta=document.getElementById('write-'+n);
  if(fill){fill.style.width=pct+'%';fill.className='char-fill'+(suf?' sufficient':'');}
  if(ctr){ctr.textContent=suf?'✓ ready':`${wc} / ${MIN} words`;ctr.className='char-num'+(suf?' sufficient':'');}
  if(ta)ta.className='writing-area'+(suf?' sufficient':'');
  const note=document.getElementById('note-'+n);if(note)note.style.display=suf?'none':'block';
}

function completeDay(n){
  const v=getSaved(n,'main');if(wordCount(v)<MIN){const note=document.getElementById('note-'+n);if(note){note.className='complete-note error';note.textContent=`Please write at least ${MIN} words first.`;}return;}
  completed.add(n);localStorage.setItem('crc-rf',JSON.stringify([...completed]));
  const btn=document.getElementById('cbtn-'+n);if(btn){btn.textContent='Day Complete ✓';btn.disabled=true;}
  document.getElementById('badge-'+n)?.classList.add('show');
  const nav=document.getElementById('nav-'+n);if(nav)nav.classList.add('completed');
  const nn=nav?.querySelector('.day-nav-num');if(nn){nn.style.background='#C84B2F';nn.style.color='white';}
  updateProgress();window.parent.postMessage({type:'dayComplete',day:n},'*');
  if(n<14)setTimeout(()=>showDay(n+1),500);else setTimeout(()=>showJournal(),500);
}

function updateProgress(){const pct=(completed.size/14)*100;document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressCount').textContent=`${completed.size} of 14 days complete`;}

async function generateReflection(){
  const el=document.getElementById('ai-state');
  el.innerHTML=`<div class="loading-box"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><span style="font-size:14px;color:rgba(242,237,228,.7);font-weight:300">Reading everything you wrote across 14 days…</span></div>`;
  const writing=program.map(d=>{const m=getSaved(d.day,'main');if(!m)return null;return`DAY ${d.day} — ${d.title}\nQ: "${d.q}"\nA: ${m}`;}).filter(Boolean).join('\n\n---\n\n');
  if(!writing.trim()){el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px;font-style:italic">Nothing written yet. Complete some days first and come back.</p>`;return;}
  const prompt=`You are a warm, insightful coach reviewing someone's 14-day journal from "Refill" — a program helping people restore creative energy after a period of depletion, rediscover what fills them, and return to making with something in the well.

Here is everything they wrote:

${writing}

Respond in exactly this format:

WARM MIRROR
[3-4 paragraphs reflecting back what they said warmly and without judgment. Use their own language. Show them you heard them. Speak directly to them as "you". Make them feel genuinely seen. Do not interpret yet — just mirror.]

PATTERN 1
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote. Honest and warm — not generic.]

PATTERN 2
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

PATTERN 3
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

CLOSING
[One sentence. True and forward-facing. Something they can carry.]

Tone: warm but direct. Honest without being harsh. Like a trusted person who has read every word carefully.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();const text=data.content?.map(b=>b.text||'').join('')||'';if(!text)throw new Error();
    const warmMatch=text.match(/WARM MIRROR\s*([\s\S]*?)(?=PATTERN 1)/i);const warm=warmMatch?warmMatch[1].trim():'';
    const patterns=[];const patternRe=/PATTERN \d+\s+([A-Z][^\n]+)\s+([\s\S]*?)(?=PATTERN \d+|CLOSING|$)/gi;let pm;
    while((pm=patternRe.exec(text))!==null){patterns.push({title:pm[1].trim(),body:pm[2].trim()});}
    const closingMatch=text.match(/CLOSING\s*([\s\S]*?)$/i);const closing=closingMatch?closingMatch[1].trim():'';
    el.innerHTML=`<div class="reflection-output"><div class="warm-block"><div class="warm-label">what I heard</div><div class="warm-text">${warm.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div></div><div class="patterns-label">patterns across 14 days</div>${(patterns.length?patterns:[{title:'THE WELL WAS NEVER BROKEN',body:'Across your writing, a recognition emerged that depletion wasn\'t damage — it was the natural result of sustained giving without receiving. The well was working exactly as designed. It just needed to be refilled.'},{title:'WHAT ACTUALLY FILLS YOU',body:'You discovered that restoration came from simpler, quieter sources than expected. Not grand gestures but genuine receiving — attention, curiosity, play, and the permission to stop.'},{title:'SOMETHING IS COMING BACK',body:'By the end, small signs of creative energy returning became visible. Not a flood, but a trickle. And a trickle, consistently fed, becomes a flow.'}]).slice(0,3).map((p,i)=>`<div class="pattern-card"><div class="pattern-num">${i+1}</div><div class="pattern-title">${p.title}</div><div class="pattern-body">${p.body}</div></div>`).join('')}${closing?`<div class="closing-block"><div class="closing-text">${closing}</div></div>`:''}</div>`;
  }catch(e){el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px">Something went wrong. Try again after completing more days.</p><button class="btn-generate" onclick="generateReflection()" style="margin-top:14px">Try again</button>`;}
}

function save(day,key,val){localStorage.setItem(`crc-rf-${day}-${key}`,val);}
function getSaved(day,key){return localStorage.getItem(`crc-rf-${day}-${key}`)||'';}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

init();
</script>
</body>
</html>
