<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empty the Head — Creative Reset Club</title>
<style>
@font-face {
  font-family: 'Codec Pro';
  src: url('/fonts/codec-pro_regular.ttf') format('truetype');
  font-weight: 400 700;
  font-style: normal;
}
</style>
<style>
  :root {
    --cream: #f4f2ee; --cream-dark: #e8e4dc; --ink: #000332; --ink-soft: #000332cc;
    --red: #ff9090; --red-soft: #ffd0d0; --sand: #000332; --sand-mid: #00033280;
    --ice: #e6f6ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--cream); color:var(--ink); font-family:'Codec Pro',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
  .app { display:flex; min-height:100vh; position:relative; z-index:1; }

  /* SIDEBAR */
  .sidebar { width:268px; min-height:100vh; background:var(--ink); padding:32px 22px; position:fixed; top:0; left:0; bottom:0; overflow-y:auto; display:flex; flex-direction:column; z-index:50; transition:transform .3s ease; }
  .sidebar-logo { font-size:11px; letter-spacing:.12em; text-transform:lowercase; color:rgba(255,255,255,0.35); margin-bottom:4px; }
  .sidebar-program { font-family:'Codec Pro',sans-serif; font-size:19px; color:var(--cream); line-height:1.2; margin-bottom:32px; font-style:normal; }
  .phase-group { margin-bottom:20px; }
  .phase-label { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,0.28); margin-bottom:7px; padding-left:4px; }
  .day-nav-item { display:flex; align-items:center; gap:9px; padding:8px 9px; border-radius:3px; cursor:pointer; transition:all .2s; border:none; background:none; width:100%; text-align:left; }
  .day-nav-item:hover { background:rgba(242,237,228,.06); }
  .day-nav-item.active { background:rgba(242,237,228,.1); }
  .day-nav-num { width:23px; height:23px; border-radius:50%; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; font-size:10px; color:rgba(255,255,255,0.55); font-weight:500; flex-shrink:0; transition:all .2s; }
  .day-nav-item.active .day-nav-num { background:var(--cream); color:var(--ink); }
  .day-nav-item.completed .day-nav-num { background:var(--red)!important; color:white!important; }
  .day-nav-title { font-size:11px; color:rgba(255,255,255,0.45); line-height:1.3; font-weight:300; }
  .day-nav-item.active .day-nav-title { color:var(--cream); font-weight:400; }
  .sidebar-progress { margin-top:auto; padding-top:20px; border-top:1px solid rgba(242,237,228,.1); }
  .progress-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:7px; }
  .progress-track { height:3px; background:rgba(242,237,228,.1); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--red); border-radius:2px; transition:width .5s ease; }
  .progress-count { font-size:11px; color:rgba(255,255,255,0.35); margin-top:6px; }

  /* MAIN */
  .main { margin-left:268px; flex:1; padding:52px 60px 100px; max-width:calc(100% - 268px); }
  .day-view { display:none; animation:fadeIn .4s ease forwards; }
  .day-view.active { display:block; }
  .journal-view { display:none; animation:fadeIn .4s ease forwards; }
  .journal-view.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* DAY HEADER */
  .day-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:40px; }
  .day-eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:10px; }
  .day-title { font-family:'Codec Pro',sans-serif; font-size:clamp(28px,4vw,46px); line-height:1.08; font-weight:400; color:var(--ink); margin-bottom:8px; }
  .day-title em { font-style:normal; color:var(--red); }
  .day-number-large { font-family:'Codec Pro',sans-serif; font-size:100px; line-height:1; color:var(--cream-dark); font-style:normal; user-select:none; margin-left:16px; margin-top:-4px; flex-shrink:0; }
  .day-completed-badge { display:none; align-items:center; gap:7px; font-size:12px; color:var(--red); }
  .day-completed-badge.show { display:flex; }
  .day-completed-badge::before { content:'✓'; width:17px; height:17px; background:var(--red); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; }

  /* FRAMEWORK */
  .framework-card { background:var(--ink); color:var(--cream); border-radius:4px; padding:26px 30px; margin-bottom:32px; position:relative; overflow:hidden; }
  .framework-card::before { content:''; position:absolute; top:0; right:0; width:70px; height:70px; background:rgba(200,75,47,.15); border-radius:50%; transform:translate(18px,-18px); }
  .framework-eyebrow { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--red); margin-bottom:7px; }
  .framework-name { font-family:'Codec Pro',sans-serif; font-size:19px; color:var(--cream); margin-bottom:2px; font-style:normal; }
  .framework-author { font-size:12px; color:var(--sand-mid); margin-bottom:12px; }
  .framework-body { font-size:14px; line-height:1.75; color:rgba(242,237,228,.75); font-weight:300; }
  .framework-benefit { margin-top:12px; padding-top:12px; border-top:1px solid rgba(244,242,238,.15); font-size:12px; color:rgba(244,242,238,0.65); line-height:1.65; }
  .framework-benefit strong { color:#f4f2ee; font-weight:700; }

  /* SECTION */
  .section { margin-bottom:32px; }
  .section-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--sand); opacity:.4; }
  .question-text { font-family:'Codec Pro',sans-serif; font-size:clamp(17px,2.5vw,25px); line-height:1.45; color:var(--ink); margin-bottom:10px; font-style:normal; }
  .writing-prompts { margin-bottom:14px; }
  .writing-prompt { font-size:13px; color:var(--ink-soft); line-height:1.65; padding:5px 0 5px 14px; border-left:2px solid var(--sand); margin-bottom:7px; font-weight:300; }

  /* TEXTAREA + COUNTER */
  .writing-area { width:100%; min-height:260px; padding:20px 22px; border:1.5px solid var(--sand); border-radius:3px; background:transparent; font-family:'Codec Pro',sans-serif; font-size:15px; line-height:1.85; color:var(--ink); resize:vertical; outline:none; transition:border-color .2s; }
  .writing-area::placeholder { color:var(--sand-mid); font-style:normal; font-size:14px; }
  .writing-area:focus { border-color:var(--ink); }
  .writing-area.sufficient { border-color:#7A9E7E; }
  .char-counter { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .char-bar { flex:1; height:2px; background:var(--sand); border-radius:2px; overflow:hidden; }
  .char-fill { height:100%; background:var(--sand-mid); border-radius:2px; transition:width .3s ease, background .3s ease; }
  .char-fill.sufficient { background:#7A9E7E; }
  .char-num { font-size:11px; color:var(--sand-mid); white-space:nowrap; }
  .char-num.sufficient { color:#7A9E7E; }

  /* FOLLOWUP */
  .followup-section { display:none; margin-top:22px; padding:22px; border:1px solid var(--red-soft); border-radius:3px; background:rgba(200,75,47,.025); animation:fadeIn .4s ease; }
  .followup-section.visible { display:block; }
  .followup-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--red); margin-bottom:9px; }
  .followup-question { font-family:'Codec Pro',sans-serif; font-size:18px; font-style:normal; color:var(--ink); margin-bottom:10px; line-height:1.4; }
  .followup-textarea { width:100%; min-height:160px; padding:16px 20px; border:1px solid var(--sand); border-radius:3px; background:transparent; font-family:'Codec Pro',sans-serif; font-size:14px; line-height:1.8; color:var(--ink); resize:vertical; outline:none; transition:border-color .2s; }
  .followup-textarea:focus { border-color:var(--ink); }
  .followup-textarea::placeholder { color:var(--sand-mid); font-style:normal; font-size:13px; }

  /* REFLECTION + ACTION */
  .reflection-box { background:var(--cream-dark); border-radius:3px; padding:20px 24px; }
  .reflection-prompt { font-size:14px; line-height:1.75; color:var(--ink-soft); font-style:normal; }
  .action-card { border:1.5px solid var(--ink); border-radius:3px; padding:20px 24px; display:flex; gap:16px; align-items:flex-start; }
  .action-icon { width:32px; height:32px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .action-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:4px; }
  .action-text { font-size:14px; line-height:1.65; color:var(--ink); }

  /* BUTTONS */
  .complete-row { margin-top:32px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .btn-complete { background:var(--ink); color:var(--cream); border:none; padding:14px 34px; font-family:'Codec Pro',sans-serif; font-size:14px; font-weight:500; letter-spacing:.06em; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-complete:hover:not(:disabled) { background:var(--red); transform:translateY(-1px); }
  .btn-complete:disabled { background:var(--sand); cursor:default; }
  .btn-next { background:transparent; color:var(--ink); border:1.5px solid var(--sand); padding:13px 26px; font-family:'Codec Pro',sans-serif; font-size:14px; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-next:hover { border-color:var(--ink); }
  .complete-note { font-size:12px; color:var(--sand-mid); width:100%; }
  .complete-note.error { color:var(--red); }

  /* JOURNAL */
  .journal-entry { margin-bottom:44px; padding-bottom:44px; border-bottom:1px solid var(--sand); }
  .journal-entry:last-of-type { border-bottom:none; }
  .journal-day-label { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:6px; }
  .journal-day-title { font-family:'Codec Pro',sans-serif; font-size:22px; font-style:normal; color:var(--ink); margin-bottom:12px; }
  .journal-question { font-size:13px; color:var(--sand-mid); margin-bottom:8px; font-style:normal; }
  .journal-answer { font-size:15px; line-height:1.85; color:var(--ink-soft); white-space:pre-wrap; }
  .journal-empty { font-size:14px; color:var(--sand); font-style:normal; }

  /* AI REFLECTION */
  .ai-section { margin-top:56px; padding-top:44px; border-top:2px solid var(--ink); }
  .ai-eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--red); margin-bottom:10px; }
  .ai-title { font-family:'Codec Pro',sans-serif; font-size:30px; font-weight:400; color:var(--ink); margin-bottom:6px; }
  .ai-title em { font-style:normal; }
  .ai-sub { font-size:14px; color:var(--sand-mid); margin-bottom:32px; line-height:1.6; }
  .btn-generate { background:var(--ink); color:var(--cream); border:none; padding:15px 38px; font-family:'Codec Pro',sans-serif; font-size:14px; font-weight:500; letter-spacing:.06em; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-generate:hover { background:var(--red); transform:translateY(-1px); }
  .loading-box { display:flex; align-items:center; gap:12px; padding:28px; background:var(--ink); border-radius:4px; color:var(--cream); }
  .loading-dots { display:flex; gap:4px; }
  .loading-dot { width:6px; height:6px; border-radius:50%; background:var(--red); animation:pulse 1.4s ease infinite; }
  .loading-dot:nth-child(2) { animation-delay:.2s; }
  .loading-dot:nth-child(3) { animation-delay:.4s; }
  @keyframes pulse { 0%,80%,100% { opacity:.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }
  .reflection-output { animation:fadeIn .6s ease; }
  .warm-block { background:var(--ink); color:var(--cream); border-radius:4px; padding:32px; margin-bottom:24px; }
  .warm-label { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:14px; }
  .warm-text { font-size:15px; line-height:1.85; color:rgba(242,237,228,.88); font-weight:300; }
  .warm-text p { margin-bottom:14px; }
  .warm-text p:last-child { margin-bottom:0; }
  .patterns-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .patterns-label::after { content:''; flex:1; height:1px; background:var(--sand); opacity:.4; }
  .pattern-card { border:1.5px solid var(--sand); border-radius:3px; padding:22px 26px; margin-bottom:10px; }
  .pattern-num { font-family:'Codec Pro',sans-serif; font-size:28px; font-style:normal; color:var(--red); line-height:1; margin-bottom:6px; }
  .pattern-title { font-size:15px; font-weight:500; color:var(--ink); margin-bottom:7px; }
  .pattern-body { font-size:14px; line-height:1.75; color:var(--ink-soft); }
  .closing-block { padding:24px; background:var(--cream-dark); border-radius:3px; margin-top:10px; }
  .closing-text { font-family:'Codec Pro',sans-serif; font-size:19px; font-style:normal; line-height:1.55; color:var(--ink); }

  /* MOBILE */
  .menu-toggle { display:none; position:fixed; top:14px; left:14px; z-index:200; background:var(--ink); color:var(--cream); border:none; width:38px; height:38px; border-radius:3px; font-size:17px; cursor:pointer; align-items:center; justify-content:center; }
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:40; }
  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .sidebar-overlay.show { display:block; }
    .menu-toggle { display:flex; }
    .main { margin-left:0; padding:52px 18px 80px; max-width:100%; }
    .day-number-large { display:none; }
  }
</style>
</head>
<body>
<button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">creative reset club</div>
    <div class="sidebar-program">Empty<br>the Head</div>
    <div id="sidebarNav"></div>
    <div class="sidebar-progress">
      <div class="progress-label">your progress</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-count" id="progressCount">0 of 14 days complete</div>
    </div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
const MIN = 100;
function wordCount(str){ return str.trim().split(/\s+/).filter(w=>w.length>0).length; }
const program = [
  { day:1, phase:1, phaseName:"Clear", title:"The Brain Dump",
    fw:{ name:"Capture Everything", author:"David Allen — Getting Things Done",
      body:"Your mind is not a storage device — it's a processing engine. Every incomplete thought, half-finished plan, and vague worry occupies mental RAM that could be used for actual creative work. The brain dump is the first act of clearing: get everything out, without judgment, without sorting.",
      benefit:"<strong>Cognitive benefit:</strong> Externalising open loops frees working memory capacity. Research shows that simply writing down pending tasks reduces intrusive thinking about them by up to 33%, even before you act on any of them." },
    q:"Write down absolutely everything that is currently occupying your mind — every task, worry, idea, obligation, and half-thought. Empty the entire container.",
    prompts:["Start with what's loudest — the things that shout at you when you're trying to sleep or focus.","Include the small things: emails to send, calls to make, errands that have been nagging you for weeks.","Write down the creative ideas that are half-formed — the ones you haven't committed to but can't let go of.","Include the emotional weight: relationships that need attention, conversations you've been avoiding, guilt you're carrying.","Keep going until you genuinely feel empty. Most people stop too soon. Push past the first wave."],
    fu:{ t:50, q:"Looking at everything you just dumped — what is the feeling of seeing it all outside your head?", prompts:["Is there relief, or does it feel heavier seeing it written down?","What was hiding underneath the obvious stuff — what surfaced only after the first layer was cleared?","Which items have been in your head the longest without being addressed?"] },
    ref:"The first dump is never complete. But even an incomplete dump creates space you didn't have five minutes ago. Notice how your mind feels lighter — that's working memory coming back online.",
    action:{ i:"🧠", t:"Count your items. Circle the three that have been in your head the longest. Those are the ones costing you the most mental energy — not because they're important, but because they're unresolved." }
  },
  { day:2, phase:1, phaseName:"Clear", title:"What's Actually Urgent",
    fw:{ name:"The Eisenhower Matrix", author:"Dwight Eisenhower — via Stephen Covey",
      body:"Eisenhower distinguished between urgent and important — and observed that most people confuse the two. Urgent things demand attention now but rarely matter long-term. Important things build the life you want but rarely feel pressing. Mental clutter thrives in the gap: everything feels urgent when nothing has been sorted.",
      benefit:"<strong>Cognitive benefit:</strong> Categorising tasks by urgency and importance activates the prefrontal cortex's executive function, reducing the amygdala's tendency to treat everything as equally threatening. This sorting alone reduces perceived overwhelm." },
    q:"Go through your brain dump from yesterday. For each item, honestly assess: is it truly urgent, truly important, both, or neither?",
    prompts:["Mark each item: U for urgent (time-sensitive, real consequences if delayed), I for important (matters for your actual goals and values), B for both, or N for neither.","How many items marked urgent are actually someone else's urgency that you've absorbed?","Which important items have you been neglecting because they don't scream at you?","How many 'neither' items have been taking up mental space despite not actually mattering?","What would happen — honestly — if you dropped every item marked N? Would anyone notice?"],
    fu:{ t:50, q:"What pattern do you see in how you've been allocating your mental energy versus what actually matters?", prompts:["Are you spending your best thinking on urgent-but-unimportant tasks?","What important thing have you been postponing that deserves your attention most?","What would your days look like if you only worked on the important items?"] },
    ref:"Most mental clutter is not important — it's just loud. Sorting reveals that you have far fewer genuine priorities than your anxiety suggests. The noise was drowning out the signal.",
    action:{ i:"📊", t:"Take every item marked N — neither urgent nor important — and cross it off your list. Not 'maybe later.' Gone. Notice how that feels." }
  },
  { day:3, phase:1, phaseName:"Clear", title:"The Noise Inventory",
    fw:{ name:"Deep Work", author:"Cal Newport — Deep Work",
      body:"Newport argues that knowledge workers have lost the ability to focus because they've normalised constant shallow input. The noise inventory maps where your attention actually goes versus where you want it to go. Most people discover a shocking gap between their stated priorities and their actual attention patterns.",
      benefit:"<strong>Cognitive benefit:</strong> Attention residue — the cognitive cost of switching between tasks — persists for up to 23 minutes after each switch. By inventorying your noise sources, you identify where attention residue is being generated throughout your day." },
    q:"Map every source of mental noise in your daily life — every notification, interruption, input stream, and attention grab. Be brutally honest about what you let in.",
    prompts:["List every app that sends you notifications. Every one. How many did you choose versus how many defaulted on?","Track your information inputs: news, social media, podcasts, newsletters, group chats. How many do you actually need?","Name the people and relationships that generate mental noise — not because they're bad, but because interactions with them leave you mentally spinning.","What environments create noise for you? Open offices, cluttered spaces, background TV?","What internal noise generators do you have — perfectionism, comparison, catastrophising — that run regardless of external inputs?"],
    fu:{ t:50, q:"If you could only keep five sources of input in your entire life, which five would you keep?", prompts:["What would you lose by cutting the rest? What would you gain?","Which noise sources do you keep because you're afraid of missing something?","What are you actually missing right now because of all the noise?"] },
    ref:"You cannot think clearly in a noisy room. Your mind is a room. Today you mapped the noise. Tomorrow you'll decide what stays and what goes.",
    action:{ i:"🔇", t:"Turn off notifications for every app except phone calls and messages from the five people who matter most. Just for 24 hours. See what happens." }
  },
  { day:4, phase:1, phaseName:"Clear", title:"Permission to Drop",
    fw:{ name:"Essentialism", author:"Greg McKeown — Essentialism",
      body:"McKeown's central argument is that almost everything is noise, and very few things are essential. The disciplined pursuit of less requires active permission to drop things — not defer them, drop them. Most people carry obligations, projects, and commitments they picked up years ago and never consciously chose to keep.",
      benefit:"<strong>Cognitive benefit:</strong> Decision fatigue is cumulative — every uncommitted decision drains cognitive resources. Deliberately closing open loops through conscious dropping restores decision-making capacity and reduces the background cognitive load that makes everything feel harder than it is." },
    q:"What are you carrying that you have permission to put down — obligations, projects, commitments, and expectations that no longer serve you?",
    prompts:["What commitments are you keeping out of guilt rather than genuine desire or necessity?","What projects have you been 'meaning to get to' for months or years that you can honestly admit you're never going to do?","What expectations — from others or yourself — are you performing that don't align with who you actually are now?","What would you drop immediately if no one would judge you for it?","Write a permission slip to yourself for each thing you're dropping. Make it explicit: 'I give myself permission to stop...'"],
    fu:{ t:50, q:"What is the hardest thing to give yourself permission to drop — and what does the difficulty tell you?", prompts:["Is the difficulty about the thing itself, or about your identity as someone who does that thing?","Who are you without this commitment or obligation?","What becomes possible when this weight is gone?"] },
    ref:"Dropping is not failing. It is choosing. Every thing you carry that doesn't matter makes the things that do matter harder to hold. Today you made space.",
    action:{ i:"✂️", t:"Choose one commitment you identified and actually drop it today. Send the email, have the conversation, delete the project folder. Make it real." }
  },
  { day:5, phase:2, phaseName:"Sort", title:"The Energy Sort",
    fw:{ name:"The Power of Full Engagement", author:"Jim Loehr & Tony Schwartz",
      body:"Loehr and Schwartz argue that energy, not time, is the fundamental currency of performance. You can have all the time in the world, but if your energy is depleted or misallocated, nothing meaningful gets done. The energy sort examines where your energy actually goes — and whether it matches where you want it to go.",
      benefit:"<strong>Cognitive benefit:</strong> Energy management engages the body's autonomic regulatory systems. Research shows that aligning high-energy periods with high-priority tasks produces up to 500% more output than working on important things during low-energy windows." },
    q:"Map your energy across a typical day. When are you sharp? When are you depleted? What gives you energy and what takes it away?",
    prompts:["Track your energy levels hour by hour through a typical day. When do you peak? When do you crash?","What activities consistently leave you more energised than when you started?","What activities consistently drain you — even if they're supposed to be enjoyable or productive?","What are you doing during your peak energy hours? Is it your most important work, or is it email and admin?","What would your day look like if you ruthlessly protected your peak hours for your most important creative work?"],
    fu:{ t:50, q:"What is the single biggest energy leak in your current daily life — the thing that costs the most for the least return?", prompts:["How long has this leak been running?","What would plugging it free up for you?","What has stopped you from addressing it until now?"] },

const completed = new Set(JSON.parse(localStorage.getItem('crc-eth') || '[]'));

function init() {
  buildSidebar();
  document.getElementById('mainContent').innerHTML = program.map(buildDay).join('') + buildJournal();
  showDay(1);
  updateProgress();
}

function buildSidebar() {
  const phases = {};
  program.forEach(d => { if(!phases[d.phase]) phases[d.phase]=[]; phases[d.phase].push(d); });
  let html = '';
  Object.entries(phases).forEach(([ph, days]) => {
    html += `<div class="phase-group"><div class="phase-label">Phase ${ph} — ${days[0].phaseName}</div>`;
    days.forEach(d => {
      html += `<button class="day-nav-item ${completed.has(d.day)?'completed':''}" id="nav-${d.day}" onclick="showDay(${d.day})">
        <div class="day-nav-num">${d.day}</div><div class="day-nav-title">${d.title}</div></button>`;
    });
    html += '</div>';
  });
  html += `<div class="phase-group"><div class="phase-label">Review</div>
    <button class="day-nav-item" id="nav-journal" onclick="showJournal()">
      <div class="day-nav-num" style="font-size:13px">📖</div>
      <div class="day-nav-title">Full Journal + AI Reflection</div>
    </button></div>`;
  document.getElementById('sidebarNav').innerHTML = html;
}

function buildDay(d) {
  const sv = getSaved(d.day,'main'), sf = getSaved(d.day,'fu');
  const wc = wordCount(sv), pct = Math.min(100,(wc/MIN)*100), suf = wc>=MIN;
  const done = completed.has(d.day);
  return `<div class="day-view" id="day-${d.day}">
    <div class="day-header">
      <div class="day-meta">
        <div class="day-eyebrow">Day ${d.day} · Phase ${d.phase}: ${d.phaseName}</div>
        <h1 class="day-title">${d.title.split(' ').slice(0,-1).join(' ')} <em>${d.title.split(' ').slice(-1)}</em></h1>
        <div class="day-completed-badge ${done?'show':''}" id="badge-${d.day}">Completed</div>
      </div>
      <div class="day-number-large">${d.day}</div>
    </div>
    <div class="framework-card">
      <div class="framework-eyebrow">framework</div>
      <div class="framework-name">${d.fw.name}</div>
      <div class="framework-author">${d.fw.author}</div>
      <div class="framework-body">${d.fw.body}</div>
      <div class="framework-benefit">${d.fw.benefit}</div>
    </div>
    <div class="section">
      <div class="section-label">today's question</div>
      <div class="question-text">"${d.q}"</div>
      <div class="writing-prompts">${d.prompts.map(p=>`<div class="writing-prompt">${p}</div>`).join('')}</div>
      <textarea class="writing-area${suf?' sufficient':''}" id="write-${d.day}" placeholder="Write freely and at length. Use the prompts above as guides — not limits." oninput="onWrite(${d.day})">${sv}</textarea>
      <div class="char-counter">
        <div class="char-bar"><div class="char-fill${suf?' sufficient':''}" id="fill-${d.day}" style="width:${pct}%"></div></div>
        <div class="char-num${suf?' sufficient':''}" id="ctr-${d.day}">${suf?'✓ ready':`${wc} / ${MIN} words`}</div>
      </div>
      <div class="followup-section ${(sf||wordCount(sv)>=d.fu.t)?'visible':''}" id="fu-${d.day}">
        <div class="followup-label">going deeper</div>
        <div class="followup-question">"${d.fu.q}"</div>
        <div class="writing-prompts">${d.fu.prompts.map(p=>`<div class="writing-prompt">${p}</div>`).join('')}</div>
        <textarea class="followup-textarea" id="fw-${d.day}" placeholder="Keep writing. Don't stop." oninput="save(${d.day},'fu',this.value)">${sf}</textarea>
      </div>
    </div>
    <div class="section">
      <div class="section-label">reflection</div>
      <div class="reflection-box"><div class="reflection-prompt">${d.ref}</div></div>
    </div>
    <div class="section">
      <div class="section-label">micro-action</div>
      <div class="action-card">
        <div class="action-icon">${d.action.i}</div>
        <div><div class="action-label">do this today</div><div class="action-text">${d.action.t}</div></div>
      </div>
    </div>
    <div class="complete-row">
      <button class="btn-complete" id="cbtn-${d.day}" onclick="completeDay(${d.day})" ${done?'disabled':''}>${done?'Day Complete ✓':'Mark Day Complete'}</button>
      ${d.day<14?`<button class="btn-next" onclick="showDay(${d.day+1})">Day ${d.day+1} →</button>`:`<button class="btn-next" onclick="showJournal()">See your full journal →</button>`}
      ${!done?`<div class="complete-note" id="note-${d.day}">Write at least ${MIN} words to complete this day.</div>`:''}
    </div>
  </div>`;
}

function buildJournal() {
  return `<div class="journal-view" id="journal-view">
    <div class="day-eyebrow" style="margin-bottom:14px">Your Journey</div>
    <h1 class="day-title" style="margin-bottom:8px">Fourteen Days of <em>Clearing the Mind</em></h1>
    <p style="font-size:15px;color:var(--ink-soft);line-height:1.7;margin-bottom:44px;font-weight:300">Everything you wrote, in one place.</p>
    <div id="j-entries"></div>
    <div class="ai-section">
      <div class="ai-eyebrow">AI Reflection</div>
      <h2 class="ai-title">What your writing <em>reveals</em></h2>
      <p class="ai-sub">A warm mirror of what you said — then 2–3 patterns surfaced from everything you worked through across 14 days.</p>
      <div id="ai-state"><button class="btn-generate" onclick="generateReflection()">Generate my reflection</button></div>
    </div>
  </div>`;
}

function showDay(n) {
  document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('day-'+n)?.classList.add('active');
  document.getElementById('nav-'+n)?.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  closeSidebar();
}

function showJournal() {
  document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('journal-view').classList.add('active');
  document.getElementById('nav-journal')?.classList.add('active');
  populateJournal();
  window.scrollTo({top:0,behavior:'smooth'});
  closeSidebar();
}

function populateJournal() {
  document.getElementById('j-entries').innerHTML = program.map(d=>{
    const m=getSaved(d.day,'main'), f=getSaved(d.day,'fu');
    return `<div class="journal-entry">
      <div class="journal-day-label">Day ${d.day} · ${d.phaseName}</div>
      <div class="journal-day-title">${d.title}</div>
      <div class="journal-question">"${d.q}"</div>
      ${m?`<div class="journal-answer">${m}</div>`:`<div class="journal-empty">Nothing written yet.</div>`}
      ${f?`<div style="margin-top:18px"><div class="journal-question" style="margin-bottom:7px">"${d.fu.q}"</div><div class="journal-answer">${f}</div></div>`:''}
    </div>`;
  }).join('');
}

function onWrite(n) {
  const v = document.getElementById('write-'+n)?.value||'';
  save(n,'main',v);
  const wc=wordCount(v), pct=Math.min(100,(wc/MIN)*100), suf=wc>=MIN;
  const fill=document.getElementById('fill-'+n), ctr=document.getElementById('ctr-'+n), ta=document.getElementById('write-'+n);
  if(fill){fill.style.width=pct+'%'; fill.className='char-fill'+(suf?' sufficient':'');}
  if(ctr){ctr.textContent=suf?'✓ ready':`${wc} / ${MIN} words`; ctr.className='char-num'+(suf?' sufficient':'');}
  if(ta) ta.className='writing-area'+(suf?' sufficient':'');
  if(wordCount(v)>=program[n-1].fu.t) document.getElementById('fu-'+n)?.classList.add('visible');
  const note=document.getElementById('note-'+n);
  if(note) note.style.display=suf?'none':'block';
}

function completeDay(n) {
  const v=getSaved(n,'main');
  if(wordCount(v)<MIN){
    const note=document.getElementById('note-'+n);
    if(note){note.className='complete-note error'; note.textContent=`Please write at least ${MIN} words first.`;}
    return;
  }
  completed.add(n);
  localStorage.setItem('crc-eth',JSON.stringify([...completed]));
  const btn=document.getElementById('cbtn-'+n);
  if(btn){btn.textContent='Day Complete ✓'; btn.disabled=true;}
  document.getElementById('badge-'+n)?.classList.add('show');
  const nav=document.getElementById('nav-'+n);
  if(nav) nav.classList.add('completed');
  const nn=nav?.querySelector('.day-nav-num');
  if(nn){nn.style.background='#C84B2F'; nn.style.color='white';}
  updateProgress();
  if(n<14) setTimeout(()=>showDay(n+1),500);
  else setTimeout(()=>showJournal(),500);
}

function updateProgress() {
  const pct=(completed.size/14)*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressCount').textContent=`${completed.size} of 14 days complete`;
}

async function generateReflection() {
  const el=document.getElementById('ai-state');
  el.innerHTML=`<div class="loading-box"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><span style="font-size:14px;color:rgba(242,237,228,.7);font-weight:300">Reading everything you wrote across 14 days…</span></div>`;

  const writing = program.map(d=>{
    const m=getSaved(d.day,'main'), f=getSaved(d.day,'fu');
    if(!m&&!f) return null;
    return `DAY ${d.day} — ${d.title}\nQ: "${d.q}"\nA: ${m}${f?`\n\nDeeper Q: "${d.fu.q}"\nA: ${f}`:''}`;
  }).filter(Boolean).join('\n\n---\n\n');

  if(!writing.trim()){
    el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px;font-style:italic">Nothing written yet. Complete some days first and come back.</p>`;
    return;
  }

  const prompt=`You are a warm, insightful coach reviewing someone's 14-day journal from "Empty the Head" — a program helping people clear mental clutter, build focus systems, and find clarity, grounded in David Allen, Cal Newport, Greg McKeown, and James Clear.

Here is everything they wrote:

${writing}

Respond in exactly this format:

WARM MIRROR
[3-4 paragraphs reflecting back what they said warmly and without judgment. Use their own language. Show them you heard them. Speak directly to them as "you". Make them feel genuinely seen. Do not interpret yet — just mirror.]

PATTERN 1
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote. Honest and warm — not generic.]

PATTERN 2
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

PATTERN 3
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

CLOSING
[One sentence. True and forward-facing. Something they can carry.]

Tone: warm but direct. Honest without being harsh. Like a trusted person who has read every word carefully.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'';
    if(!text) throw new Error();

    const warmMatch = text.match(/WARM MIRROR\s*([\s\S]*?)(?=PATTERN 1)/i);
    const warm = warmMatch ? warmMatch[1].trim() : '';

    const patterns = [];
    const patternRe = /PATTERN \d+\s+([A-Z][^\n]+)\s+([\s\S]*?)(?=PATTERN \d+|CLOSING|$)/gi;
    let pm;
    while((pm=patternRe.exec(text))!==null) {
      patterns.push({ title: pm[1].trim(), body: pm[2].trim() });
    }

    const closingMatch = text.match(/CLOSING\s*([\s\S]*?)$/i);
    const closing = closingMatch ? closingMatch[1].trim() : '';

    el.innerHTML = `<div class="reflection-output">
      <div class="warm-block">
        <div class="warm-label">what I heard</div>
        <div class="warm-text">${warm.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
      </div>
      <div class="patterns-label">patterns across 14 days</div>
      ${(patterns.length?patterns:[{title:'YOUR GROWING CLARITY',body:'Across your writing, a consistent movement from noise toward signal — from overwhelm toward understanding what actually matters to you.'},{title:'THE COURAGE TO DROP',body:'You showed a willingness to let go of things you\'ve been carrying out of obligation. That takes more courage than adding new things.'},{title:'A SYSTEM THAT FITS YOU',body:'The practices you designed aren\'t borrowed — they emerged from honest self-observation. That\'s why they\'ll stick.'}]).slice(0,3).map((p,i)=>`
        <div class="pattern-card">
          <div class="pattern-num">${i+1}</div>
          <div class="pattern-title">${p.title}</div>
          <div class="pattern-body">${p.body}</div>
        </div>`).join('')}
      ${closing?`<div class="closing-block"><div class="closing-text">${closing}</div></div>`:''}
    </div>`;
  } catch(e) {
    el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px">Something went wrong. Try again after completing more days.</p>
      <button class="btn-generate" onclick="generateReflection()" style="margin-top:14px">Try again</button>`;
  }
}

function save(day,key,val){ localStorage.setItem(`crc-eth-${day}-${key}`,val); }
function getSaved(day,key){ return localStorage.getItem(`crc-eth-${day}-${key}`)||''; }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

init();
</script>
