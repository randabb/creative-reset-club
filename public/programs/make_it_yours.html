<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make It Yours — Creative Reset Club</title>
<style>
@font-face { font-family:'Codec Pro'; src:url('/fonts/codec-pro_regular.ttf') format('truetype'); font-weight:400 700; font-style:normal; }
</style>
<style>
  :root { --cream:#f4f2ee;--cream-dark:#e8e4dc;--ink:#000332;--ink-soft:#000332cc;--red:#ff9090;--red-soft:#ffd0d0;--sand:#000332;--sand-mid:#00033280;--ice:#e6f6ff; }
  *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
  body{background:var(--cream);color:var(--ink);font-family:'Codec Pro',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  .app{display:flex;min-height:100vh;position:relative;z-index:1}
  .sidebar{width:268px;min-height:100vh;background:var(--ink);padding:32px 22px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;display:flex;flex-direction:column;z-index:50;transition:transform .3s ease}
  .sidebar-logo{font-size:11px;letter-spacing:.12em;text-transform:lowercase;color:rgba(255,255,255,0.35);margin-bottom:4px}
  .sidebar-program{font-family:'Codec Pro',sans-serif;font-size:19px;color:var(--cream);line-height:1.2;margin-bottom:32px;font-style:normal}
  .phase-group{margin-bottom:20px}.phase-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:7px;padding-left:4px}
  .day-nav-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:3px;cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left}
  .day-nav-item:hover{background:rgba(242,237,228,.06)}.day-nav-item.active{background:rgba(242,237,228,.1)}
  .day-nav-num{width:23px;height:23px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.55);font-weight:500;flex-shrink:0;transition:all .2s}
  .day-nav-item.active .day-nav-num{background:var(--cream);color:var(--ink)}.day-nav-item.completed .day-nav-num{background:var(--red)!important;color:white!important}
  .day-nav-title{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.3;font-weight:300}.day-nav-item.active .day-nav-title{color:var(--cream);font-weight:400}
  .sidebar-progress{margin-top:auto;padding-top:20px;border-top:1px solid rgba(242,237,228,.1)}
  .progress-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:7px}
  .progress-track{height:3px;background:rgba(242,237,228,.1);border-radius:2px;overflow:hidden}.progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width .5s ease}
  .progress-count{font-size:11px;color:rgba(255,255,255,0.35);margin-top:6px}
  .main{margin-left:268px;flex:1;padding:52px 60px 100px;max-width:calc(100% - 268px)}
  .day-view{display:none;animation:fadeIn .4s ease forwards}.day-view.active{display:block}
  .journal-view{display:none;animation:fadeIn .4s ease forwards}.journal-view.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px}
  .day-eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:10px}
  .day-title{font-family:'Codec Pro',sans-serif;font-size:clamp(28px,4vw,46px);line-height:1.08;font-weight:400;color:var(--ink);margin-bottom:8px}
  .day-title em{font-style:normal;color:var(--red)}
  .day-number-large{font-family:'Codec Pro',sans-serif;font-size:100px;line-height:1;color:var(--cream-dark);font-style:normal;user-select:none;margin-left:16px;margin-top:-4px;flex-shrink:0}
  .day-completed-badge{display:none;align-items:center;gap:7px;font-size:12px;color:var(--red)}
  .day-completed-badge.show{display:flex}
  .day-completed-badge::before{content:'✓';width:17px;height:17px;background:var(--red);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
  .section{margin-bottom:32px}
  .section-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--sand);opacity:.4}
  .question-text{font-family:'Codec Pro',sans-serif;font-size:clamp(17px,2.5vw,25px);line-height:1.45;color:var(--ink);margin-bottom:10px;font-style:normal}
  .writing-prompts{margin-bottom:14px}
  .writing-prompt{font-size:13px;color:var(--ink-soft);line-height:1.65;padding:5px 0 5px 14px;border-left:2px solid var(--sand);margin-bottom:7px;font-weight:300}
  .writing-area{width:100%;min-height:260px;padding:20px 22px;border:1.5px solid var(--sand);border-radius:3px;background:transparent;font-family:'Codec Pro',sans-serif;font-size:15px;line-height:1.85;color:var(--ink);resize:vertical;outline:none;transition:border-color .2s}
  .writing-area::placeholder{color:var(--sand-mid);font-style:normal;font-size:14px}
  .writing-area:focus{border-color:var(--ink)}.writing-area.sufficient{border-color:#7A9E7E}
  .char-counter{display:flex;align-items:center;gap:10px;margin-top:8px}
  .char-bar{flex:1;height:2px;background:var(--sand);border-radius:2px;overflow:hidden}
  .char-fill{height:100%;background:var(--sand-mid);border-radius:2px;transition:width .3s ease,background .3s ease}.char-fill.sufficient{background:#7A9E7E}
  .char-num{font-size:11px;color:var(--sand-mid);white-space:nowrap}.char-num.sufficient{color:#7A9E7E}
  .reflection-box{background:var(--cream-dark);border-radius:3px;padding:20px 24px}
  .reflection-prompt{font-size:14px;line-height:1.75;color:var(--ink-soft);font-style:normal}
  .action-card{border:1.5px solid var(--ink);border-radius:3px;padding:20px 24px;display:flex;gap:16px;align-items:flex-start}
  .action-icon{width:32px;height:32px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .action-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:4px}
  .action-text{font-size:14px;line-height:1.65;color:var(--ink)}
  .complete-row{margin-top:32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .btn-complete{background:var(--ink);color:var(--cream);border:none;padding:14px 34px;font-family:'Codec Pro',sans-serif;font-size:14px;font-weight:500;letter-spacing:.06em;border-radius:2px;cursor:pointer;transition:all .2s}
  .btn-complete:hover:not(:disabled){background:var(--red);transform:translateY(-1px)}.btn-complete:disabled{background:var(--sand);cursor:default}
  .btn-next{background:transparent;color:var(--ink);border:1.5px solid var(--sand);padding:13px 26px;font-family:'Codec Pro',sans-serif;font-size:14px;border-radius:2px;cursor:pointer;transition:all .2s}
  .btn-next:hover{border-color:var(--ink)}
  .complete-note{font-size:12px;color:var(--sand-mid);width:100%}.complete-note.error{color:var(--red)}
  .journal-entry{margin-bottom:44px;padding-bottom:44px;border-bottom:1px solid var(--sand)}.journal-entry:last-of-type{border-bottom:none}
  .journal-day-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:6px}
  .journal-day-title{font-family:'Codec Pro',sans-serif;font-size:22px;font-style:normal;color:var(--ink);margin-bottom:12px}
  .journal-question{font-size:13px;color:var(--sand-mid);margin-bottom:8px;font-style:normal}
  .journal-answer{font-size:15px;line-height:1.85;color:var(--ink-soft);white-space:pre-wrap}
  .journal-empty{font-size:14px;color:var(--sand);font-style:normal}
  .ai-section{margin-top:56px;padding-top:44px;border-top:2px solid var(--ink)}
  .ai-eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
  .ai-title{font-family:'Codec Pro',sans-serif;font-size:30px;font-weight:400;color:var(--ink);margin-bottom:6px}.ai-title em{font-style:normal}
  .ai-sub{font-size:14px;color:var(--sand-mid);margin-bottom:32px;line-height:1.6}
  .btn-generate{background:var(--ink);color:var(--cream);border:none;padding:15px 38px;font-family:'Codec Pro',sans-serif;font-size:14px;font-weight:500;letter-spacing:.06em;border-radius:2px;cursor:pointer;transition:all .2s}
  .btn-generate:hover{background:var(--red);transform:translateY(-1px)}
  .loading-box{display:flex;align-items:center;gap:12px;padding:28px;background:var(--ink);border-radius:4px;color:var(--cream)}
  .loading-dots{display:flex;gap:4px}.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.4s ease infinite}
  .loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  .reflection-output{animation:fadeIn .6s ease}
  .warm-block{background:var(--ink);color:var(--cream);border-radius:4px;padding:32px;margin-bottom:24px}
  .warm-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:14px}
  .warm-text{font-size:15px;line-height:1.85;color:rgba(242,237,228,.88);font-weight:300}.warm-text p{margin-bottom:14px}.warm-text p:last-child{margin-bottom:0}
  .patterns-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand-mid);margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .patterns-label::after{content:'';flex:1;height:1px;background:var(--sand);opacity:.4}
  .pattern-card{border:1.5px solid var(--sand);border-radius:3px;padding:22px 26px;margin-bottom:10px}
  .pattern-num{font-family:'Codec Pro',sans-serif;font-size:28px;font-style:normal;color:var(--red);line-height:1;margin-bottom:6px}
  .pattern-title{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:7px}
  .pattern-body{font-size:14px;line-height:1.75;color:var(--ink-soft)}
  .closing-block{padding:24px;background:var(--cream-dark);border-radius:3px;margin-top:10px}
  .closing-text{font-family:'Codec Pro',sans-serif;font-size:19px;font-style:normal;line-height:1.55;color:var(--ink)}
  .uts-section{margin-bottom:32px}
  .uts-toggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:16px 20px;background:rgba(0,3,50,0.03);border-radius:4px;border:1px solid rgba(0,3,50,0.06);list-style:none}
  .uts-toggle::-webkit-details-marker{display:none}
  .uts-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand-mid)}
  .uts-icon{font-size:16px;color:var(--sand-mid);transition:transform 0.2s}
  details[open] .uts-icon{transform:rotate(45deg)}
  .uts-body{padding:20px 20px 4px;font-size:14px;line-height:1.75;color:var(--ink-soft);font-weight:300}
  .menu-toggle{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--ink);color:var(--cream);border:none;width:38px;height:38px;border-radius:3px;font-size:17px;cursor:pointer;align-items:center;justify-content:center}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
  @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.sidebar-overlay.show{display:block}.menu-toggle{display:flex}.main{margin-left:0;padding:52px 18px 80px;max-width:100%}.day-number-large{display:none}}
</style>
</head>
<body>
<button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">creative reset club</div>
    <div class="sidebar-program">Make It<br>Yours</div>
    <div id="sidebarNav"></div>
    <div class="sidebar-progress">
      <div class="progress-label">your progress</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-count" id="progressCount">0 of 14 days complete</div>
    </div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
const MIN=100;
function wordCount(str){return str.trim().split(/\s+/).filter(w=>w.length>0).length;}
const program=[
  {day:1,phase:1,phaseName:"See the Performance",title:"Who You've Been Making For",
    uts:"Making for an audience isn't wrong. But there's a difference between being aware of your audience and making decisions based on what you think they want before you've even found out what you actually think. When the imagined audience starts arriving before the first draft, something in the work changes. It becomes a transaction instead of an expression. This track is about finding your way back to the expression.",
    q:"Write about who you've been making for. Not who you intend to make for. Who actually shows up in your head when you're creating.",
    prompts:["Whose approval are you imagining when you make something?","Whose disappointment are you trying to avoid?","When did you last make something with no imagined audience at all?"],
    kg:"Write about what changes in your work when the imagined audience arrives. What do you add? What do you remove? What do you soften or amplify?",
    notice:"Notice if the imagined audience arrived before you even started today's prompt. That's how embedded it can become.",
    action:{i:"🎭",t:"Write one name or type of person you've been performing for. Just one. Naming them directly is the first step to making them less powerful."}
  },
  {day:2,phase:1,phaseName:"See the Performance",title:"What You Edit Out",
    uts:"The most revealing thing about how we perform is not what we put in but what we take out. The edits we make before anyone sees the work. The thoughts we have and immediately dismiss as too much, too weird, too vulnerable, too obvious, too self-indulgent. Those edits are a map of where the performance is happening. And what gets edited out is often the most genuinely yours.",
    q:"Write about what you edit out. The things you think and don't say, make and don't share, start and don't finish. What consistently gets removed before anyone sees it?",
    prompts:["What do you think is too much? Too vulnerable? Too weird?","What have you made that felt true and then hidden?","What would you make if you knew it would never be seen?"],
    kg:"Write one of the things you usually edit out. Right now, without editing it. Let it exist on the page.",
    notice:"Notice how the unedited thing feels compared to the polished version. Often it has more life. Often it's more true.",
    action:{i:"✂️",t:"Write one thing you've been editing out of your work or your thinking. Just let it exist on the page today without doing anything with it."}
  },
  {day:3,phase:1,phaseName:"See the Performance",title:"The Gap Between Public and Private",
    uts:"Most creative people have two modes. The public mode, where the work is shaped for how it will land. And the private mode, where the thinking is looser, more honest, less concerned with reception. The gap between those two modes is worth examining. A very large gap usually means the performance has become the default, and the private thinking has started to feel inaccessible even in private.",
    q:"Write about the gap between how you think privately and how you present publicly. Not just in your work — but in how you talk about your work, your ideas, your creative life.",
    prompts:["What do you think privately that you rarely say out loud?","What version of yourself shows up in your work versus the version that exists when no one is watching?","When did the gap between those two feel smallest?"],
    kg:"Write about what it would mean to close that gap. Not to perform less, but to let the private thinking into the public work more. What would have to change?",
    notice:"Notice if the private version of you is more interesting than the public one. For most people it is. That's not an accident.",
    action:{i:"🪞",t:"Write one thing you think privately that rarely makes it into your public work. Just write it. You don't have to do anything with it yet."}
  },
  {day:4,phase:2,phaseName:"Find What's Underneath It",title:"Where the Performance Started",
    uts:"Performing for others doesn't start as a choice. It usually starts as an adaptation. A response to feedback that taught you what was acceptable. A relationship that rewarded a particular version of you. A creative context that valued certain things and dismissed others. Understanding where the performance started doesn't excuse it or explain it away. But it makes it legible. And legible things are easier to change.",
    q:"Write about where the performance started for you. Not in your work necessarily. In your life. When did you first learn that a particular version of you was more acceptable than the real one?",
    prompts:["Who taught you this? Explicitly or implicitly?","What happened when you were too much, too honest, too yourself?","What version of you got rewarded? What version got ignored or criticized?"],
    kg:"Write about how that early lesson shows up in your creative work now. What version of you makes it into the work? What version gets left out?",
    notice:"Notice if the performance has been so consistent for so long that it no longer feels like a performance. It just feels like you. That's worth questioning.",
    action:{i:"🔍",t:"Write one sentence about who you were before you learned to perform. Even if you can barely remember. Just try."}
  },
  {day:5,phase:2,phaseName:"Find What's Underneath It",title:"What You Actually Think",
    uts:"One of the side effects of sustained performance is that it becomes harder to access what you actually think. The performed opinion arrives first — quickly, fluently. The real opinion is slower, less certain, harder to articulate. Getting to what you actually think requires slowing down enough to let the performed version pass and waiting for what's underneath it.",
    q:"Pick a topic you work with or care about. Write your performed opinion first — the one that comes quickly and sounds right. Then write your actual opinion — the one that's slower and less certain and might contradict the first one.",
    prompts:["What do you say you think about this topic in professional or public contexts?","What do you actually think when you're being honest with yourself?","Where do those two diverge? What does that divergence cost you?"],
    kg:"Write about what it would mean to lead with your actual opinion instead of your performed one. In your work, in your conversations, in what you make.",
    notice:"Notice how long it took to get to the actual opinion. That delay is the performance at work. With practice, it gets shorter.",
    action:{i:"💭",t:"Write one actual opinion you have that you rarely lead with. Keep it. It belongs in your work."}
  },
  {day:6,phase:2,phaseName:"Find What's Underneath It",title:"What You Find Genuinely Interesting",
    uts:"Sustained performance can make it hard to know what you actually find interesting — as opposed to what you've learned is interesting to find. The things that genuinely pull your attention, that you'd follow even if no one was watching and nothing came of it, tend to get filtered out early because they don't fit the performed identity. Getting back to genuine interest is one of the fastest routes back to genuine work.",
    q:"Write about what you genuinely find interesting. Not what you're supposed to find interesting, not what fits your professional identity. What actually pulls your attention when you're not performing?",
    prompts:["What do you read, watch, or think about when no one is watching?","What questions do you find yourself returning to that don't fit neatly into your work?","What would you explore if there were no professional implications?"],
    kg:"Write about what would happen if you let your genuine interests into your work. What would change? What would you have to give up?",
    notice:"Notice if your genuine interests feel embarrassing or irrelevant. That feeling is often a sign they're worth following.",
    action:{i:"🧲",t:"Write one genuine interest you've been keeping separate from your work. Just name it. That's the first step toward letting it in."}
  },
  {day:7,phase:2,phaseName:"Find What's Underneath It",title:"The Voice Underneath",
    uts:"Every person has a voice. Not a style or a brand or a tone of voice document. An actual way of thinking and expressing that is specific to them. It shows up most clearly in the unguarded moments. The text message you sent without thinking about it. The conversation where you forgot to be professional. The piece of writing that you almost deleted because it felt too personal. That voice is the thing worth recovering.",
    q:"Write about what your actual voice sounds like. Not your professional voice, not your public voice. The one that comes out when you're talking to someone you trust completely.",
    prompts:["What words do you use? What do you tend to say that others don't?","What's your rhythm? Fast, slow, direct, circular?","What do you care about that always finds its way into what you say — no matter the topic?"],
    kg:"Write something in that voice right now. About anything. Just write the way you actually think, not the way you think you should think.",
    notice:"Notice if your actual voice feels more alive than your performed one. It usually does. That's the one worth making room for.",
    action:{i:"🗣️",t:"Write one sentence in your actual voice about something you care about. Don't edit it. That sentence belongs in your work."}
  },
  {day:8,phase:3,phaseName:"Make Something With No Audience",title:"Make Something Private",
    uts:"Making something with the explicit intention of keeping it private removes the performance almost entirely. The imagined audience has nowhere to stand. What's left is just you and the work and what actually wants to be expressed. Private making is not a lesser version of real making. For many people it's where the best work begins, because it's where the most honest thinking happens.",
    q:"Make something today that you intend to keep private. It could be a piece of writing, a list, a letter, a description of something you've never described out loud. Make it for yourself only.",
    prompts:["What would you make if you knew with certainty that no one would ever see it?","What truth would you tell if there were no consequences?","What would you make if making it well didn't matter — only making it honestly?"],
    kg:"Write about what it felt like to make something private. What was different about the process? What came through that usually doesn't?",
    notice:"Notice if the private thing has more of you in it than your public work. If it does, that's not a coincidence. That's information.",
    action:{i:"🔒",t:"Keep what you made today. Don't share it. It's evidence of what's possible when the audience leaves the room."}
  },
  {day:9,phase:3,phaseName:"Make Something With No Audience",title:"Make Something Weird",
    uts:"Weird, in creative work, usually means specific. The things that feel too particular, too niche, too personal to be relevant are often the things most likely to resonate deeply with the right people. The attempt to make something broadly appealing tends to produce work that is broadly forgettable. The attempt to make something true tends to produce work that surprises you with how far it travels.",
    q:"Make something today that feels too weird, too specific, too personal to share. Lean into the weirdness deliberately. Make it weirder than you'd normally allow.",
    prompts:["What's the strangest thing you genuinely think or believe or notice?","What would you make if you were trying to make something that only you would understand?","What's the most specific, particular thing you could make right now?"],
    kg:"Write about what the weird thing is actually about. Underneath the surface weirdness, what's the real thing it's pointing at?",
    notice:"Notice if the weird thing is actually more interesting than the safe thing. It usually is. Specificity has a quality that generality can't replicate.",
    action:{i:"🌀",t:"Keep the weird thing. Don't sanitize it. In its current form it's more valuable than a polished version would be."}
  },
  {day:10,phase:3,phaseName:"Make Something With No Audience",title:"Make Something True",
    uts:"Truth in creative work isn't about facts. It's about accuracy to actual experience. The thing that, when you read it or see it or hear it, you think: yes, that's how it actually is. Not how it's supposed to be, not how it looks from the outside. How it actually is. Making something true requires dropping the performance long enough to access the actual experience. It's harder than it sounds. It's also the only way to make something that genuinely connects.",
    q:"Write something true today. About your experience of creativity, of working, of being the kind of person who makes things. Not how it's supposed to feel. How it actually feels.",
    prompts:["What's the part of your creative experience that you rarely admit out loud?","What would you say about making things if you were being completely honest?","What's true about your work that you haven't put into your work yet?"],
    kg:"Write about why this truth hasn't made it into your work before. What has been keeping it out?",
    notice:"Notice if the true thing feels uncomfortable. That's usually a sign it's worth saying. The comfortable things have already been said.",
    action:{i:"💎",t:"Write one true thing about your experience that hasn't made it into your work yet. That's the seed of something genuinely yours."}
  },
  {day:11,phase:3,phaseName:"Make Something With No Audience",title:"Show It to One Person",
    uts:"There's a difference between making something for an audience and choosing to share something with one person. An audience is abstract and imagined and tends to trigger the performance. One specific person — someone you trust, someone whose response you're genuinely curious about rather than afraid of — changes the dynamic entirely. Sharing becomes a conversation instead of a presentation.",
    q:"Write about one person you could share something true with. Not for feedback. Not for approval. Just to let one person see something real.",
    prompts:["Who do you trust to receive something unpolished?","Who has ever made you feel safe to be more honest than usual?","What would you share with that person that you haven't shared with anyone?"],
    kg:"Write what you would say to that person. What you've been making, what it's about, why it matters to you. Write it like you're actually talking to them.",
    notice:"Notice if writing to a specific trusted person felt different from writing for a general audience. The specificity changes everything.",
    action:{i:"💌",t:"Share something with that one person today. It can be small. Just let one person see something real."}
  },
  {day:12,phase:4,phaseName:"Return to Your Own Voice",title:"Your Actual Aesthetic",
    uts:"Everyone has an aesthetic. Not a brand, not a style guide, not a set of references chosen for how they look. An actual set of things they find beautiful, compelling, true, worth spending time with. The performed aesthetic and the actual aesthetic are often quite different. Returning to your own voice requires knowing what you actually respond to, not what you've been trained to respond to.",
    q:"Write about what you actually find beautiful. Not what's impressive or what fits your professional aesthetic. What genuinely moves you, stops you, makes you want to linger.",
    prompts:["What do you find beautiful that you rarely admit because it doesn't fit your image?","What have you made that you found beautiful, even if no one else did?","What aesthetic qualities show up in your private taste that are absent from your public work?"],
    kg:"Write about what your work would look like if it was built from your actual aesthetic rather than your performed one. What would change? What would stay?",
    notice:"Notice if your actual aesthetic feels more alive than your performed one. That's usually where the real work is.",
    action:{i:"🎨",t:"Write one aesthetic quality you find genuinely beautiful that hasn't made it into your work yet. That's an invitation."}
  },
  {day:13,phase:4,phaseName:"Return to Your Own Voice",title:"Make It Yours",
    uts:"Austin Kleon writes that you don't need to be original. You need to be yourself. Originality isn't the goal. Authenticity is. And authenticity doesn't require being unlike everyone else. It requires being genuinely like yourself. The work that comes from that place tends to be the work that travels furthest, connects most deeply, and lasts longest. Not because it tried to. Because it didn't try to be anything other than true.",
    q:"Make something today that is as much yours as you can make it. Use your actual voice, your actual aesthetic, your actual opinions, your actual experience. Make it the least performed thing you've made in a long time.",
    prompts:["What would you make if you weren't trying to make anything impressive?","What would you make if the only measure of success was whether it felt true to you?","What's the most you thing you could make right now?"],
    kg:"Write about what making that felt like. What was hard? What was easier than expected? What surprised you?",
    notice:"Notice if making something genuinely yours felt more tiring or more energizing than your usual work. That answer matters.",
    action:{i:"✦",t:"Keep what you made today. It's the most honest thing you've made in a while. That makes it valuable regardless of what it looks like."}
  },
  {day:14,phase:5,phaseName:"Return",title:"The Return to Yourself",
    uts:"You started this track making things for everyone else. You've spent two weeks seeing the performance, finding what's underneath it, making without an audience, and returning to your own voice. The performance will come back. External context always creates some pressure toward performance. But you know now what your voice sounds like when it's not performing. That's the thing worth protecting.",
    q:"Write about where you started and where you are now. Not in terms of what you've made. In terms of whose voice has been showing up.",
    prompts:["What do you know about your actual voice now that you didn't know two weeks ago?","What was the moment when something felt most genuinely yours?","What do you want to protect going forward?"],
    kg:"Write your declaration. What you're making, whose voice it's in, and what you're committing to protect.",
    notice:"Notice what's different. The performed version and the real version might look similar from the outside. But you can feel the difference. Trust that feeling.",
    action:{i:"⚡",t:"Write three words that describe your actual voice. Then write one sentence about what you're going to make next, in that voice."}
  }
];

const completed=new Set(JSON.parse(localStorage.getItem('crc-miy')||'[]'));

function init(){buildSidebar();document.getElementById('mainContent').innerHTML=program.map(buildDay).join('')+buildJournal();showDay(1);updateProgress();}

function buildSidebar(){
  const phases={};program.forEach(d=>{if(!phases[d.phase])phases[d.phase]=[];phases[d.phase].push(d);});
  let html='';
  Object.entries(phases).forEach(([ph,days])=>{
    html+=`<div class="phase-group"><div class="phase-label">Phase ${ph} — ${days[0].phaseName}</div>`;
    days.forEach(d=>{html+=`<button class="day-nav-item ${completed.has(d.day)?'completed':''}" id="nav-${d.day}" onclick="showDay(${d.day})"><div class="day-nav-num">${d.day}</div><div class="day-nav-title">${d.title}</div></button>`;});
    html+='</div>';
  });
  html+=`<div class="phase-group"><div class="phase-label">Review</div><button class="day-nav-item" id="nav-journal" onclick="showJournal()"><div class="day-nav-num" style="font-size:13px">📖</div><div class="day-nav-title">Full Journal + AI Reflection</div></button></div>`;
  document.getElementById('sidebarNav').innerHTML=html;
}

function buildDay(d){
  const sv=getSaved(d.day,'main');const wc=wordCount(sv),pct=Math.min(100,(wc/MIN)*100),suf=wc>=MIN;const done=completed.has(d.day);
  return`<div class="day-view" id="day-${d.day}">
    <div class="day-header"><div class="day-meta"><div class="day-eyebrow">Day ${d.day} · Phase ${d.phase}: ${d.phaseName}</div><h1 class="day-title">${d.title.split(' ').slice(0,-1).join(' ')} <em>${d.title.split(' ').slice(-1)}</em></h1><div class="day-completed-badge ${done?'show':''}" id="badge-${d.day}">Completed</div></div><div class="day-number-large">${d.day}</div></div>
    <details class="uts-section"><summary class="uts-toggle"><span class="uts-label">under the surface</span><span class="uts-icon">+</span></summary><div class="uts-body">${d.uts}</div></details>
    <div class="section"><div class="section-label">start here</div><div class="question-text">"${d.q}"</div><div class="writing-prompts">${d.prompts.map(p=>`<div class="writing-prompt">${p}</div>`).join('')}</div>
      <textarea class="writing-area${suf?' sufficient':''}" id="write-${d.day}" placeholder="Write freely and at length. Use the prompts above as guides — not limits." oninput="onWrite(${d.day})">${sv}</textarea>
      <div class="char-counter"><div class="char-bar"><div class="char-fill${suf?' sufficient':''}" id="fill-${d.day}" style="width:${pct}%"></div></div><div class="char-num${suf?' sufficient':''}" id="ctr-${d.day}">${suf?'✓ ready':`${wc} / ${MIN} words`}</div></div></div>
    <div class="section"><div class="section-label">keep going</div><div class="question-text">"${d.kg}"</div></div>
    <div class="section"><div class="section-label">notice this</div><div class="reflection-box"><div class="reflection-prompt">${d.notice}</div></div></div>
    <div class="section"><div class="section-label">micro-action</div><div class="action-card"><div class="action-icon">${d.action.i}</div><div><div class="action-label">do this today</div><div class="action-text">${d.action.t}</div></div></div></div>
    <div class="complete-row"><button class="btn-complete" id="cbtn-${d.day}" onclick="completeDay(${d.day})" ${done?'disabled':''}>${done?'Day Complete ✓':'Mark Day Complete'}</button>${d.day<14?`<button class="btn-next" onclick="showDay(${d.day+1})">Day ${d.day+1} →</button>`:`<button class="btn-next" onclick="showJournal()">See your full journal →</button>`}${!done?`<div class="complete-note" id="note-${d.day}">Write at least ${MIN} words to complete this day.</div>`:''}</div>
  </div>`;
}

function buildJournal(){
  return`<div class="journal-view" id="journal-view"><div class="day-eyebrow" style="margin-bottom:14px">Your Journey</div><h1 class="day-title" style="margin-bottom:8px">Fourteen Days of Making It <em>Yours</em></h1><p style="font-size:15px;color:var(--ink-soft);line-height:1.7;margin-bottom:44px;font-weight:300">Everything you wrote, in one place.</p><div id="j-entries"></div>
    <div class="ai-section"><div class="ai-eyebrow">AI Reflection</div><h2 class="ai-title">What your writing <em>reveals</em></h2><p class="ai-sub">A warm mirror of what you said — then 2–3 patterns surfaced from everything you worked through across 14 days.</p><div id="ai-state"><button class="btn-generate" onclick="generateReflection()">Generate my reflection</button></div></div></div>`;
}

function showDay(n){document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));document.getElementById('day-'+n)?.classList.add('active');document.getElementById('nav-'+n)?.classList.add('active');window.scrollTo({top:0,behavior:'smooth'});closeSidebar();}
function showJournal(){document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));document.getElementById('journal-view').classList.add('active');document.getElementById('nav-journal')?.classList.add('active');populateJournal();window.scrollTo({top:0,behavior:'smooth'});closeSidebar();}

function populateJournal(){
  document.getElementById('j-entries').innerHTML=program.map(d=>{const m=getSaved(d.day,'main');return`<div class="journal-entry"><div class="journal-day-label">Day ${d.day} · ${d.phaseName}</div><div class="journal-day-title">${d.title}</div><div class="journal-question">"${d.q}"</div>${m?`<div class="journal-answer">${m}</div>`:`<div class="journal-empty">Nothing written yet.</div>`}</div>`;}).join('');
}

function onWrite(n){
  const v=document.getElementById('write-'+n)?.value||'';save(n,'main',v);
  const wc=wordCount(v),pct=Math.min(100,(wc/MIN)*100),suf=wc>=MIN;
  const fill=document.getElementById('fill-'+n),ctr=document.getElementById('ctr-'+n),ta=document.getElementById('write-'+n);
  if(fill){fill.style.width=pct+'%';fill.className='char-fill'+(suf?' sufficient':'');}
  if(ctr){ctr.textContent=suf?'✓ ready':`${wc} / ${MIN} words`;ctr.className='char-num'+(suf?' sufficient':'');}
  if(ta)ta.className='writing-area'+(suf?' sufficient':'');
  const note=document.getElementById('note-'+n);if(note)note.style.display=suf?'none':'block';
}

function completeDay(n){
  const v=getSaved(n,'main');if(wordCount(v)<MIN){const note=document.getElementById('note-'+n);if(note){note.className='complete-note error';note.textContent=`Please write at least ${MIN} words first.`;}return;}
  completed.add(n);localStorage.setItem('crc-miy',JSON.stringify([...completed]));
  const btn=document.getElementById('cbtn-'+n);if(btn){btn.textContent='Day Complete ✓';btn.disabled=true;}
  document.getElementById('badge-'+n)?.classList.add('show');
  const nav=document.getElementById('nav-'+n);if(nav)nav.classList.add('completed');
  const nn=nav?.querySelector('.day-nav-num');if(nn){nn.style.background='#C84B2F';nn.style.color='white';}
  updateProgress();window.parent.postMessage({type:'dayComplete',day:n},'*');
  if(n<14)setTimeout(()=>showDay(n+1),500);else setTimeout(()=>showJournal(),500);
}

function updateProgress(){const pct=(completed.size/14)*100;document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressCount').textContent=`${completed.size} of 14 days complete`;}

async function generateReflection(){
  const el=document.getElementById('ai-state');
  el.innerHTML=`<div class="loading-box"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><span style="font-size:14px;color:rgba(242,237,228,.7);font-weight:300">Reading everything you wrote across 14 days…</span></div>`;
  const writing=program.map(d=>{const m=getSaved(d.day,'main');if(!m)return null;return`DAY ${d.day} — ${d.title}\nQ: "${d.q}"\nA: ${m}`;}).filter(Boolean).join('\n\n---\n\n');
  if(!writing.trim()){el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px;font-style:italic">Nothing written yet. Complete some days first and come back.</p>`;return;}
  const prompt=`You are a warm, insightful coach reviewing someone's 14-day journal from "Make It Yours" — a program helping people stop performing for an imagined audience, rediscover their actual voice and aesthetic, and return to making things that are genuinely theirs.

Here is everything they wrote:

${writing}

Respond in exactly this format:

WARM MIRROR
[3-4 paragraphs reflecting back what they said warmly and without judgment. Use their own language. Show them you heard them. Speak directly to them as "you". Make them feel genuinely seen. Do not interpret yet — just mirror.]

PATTERN 1
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote. Honest and warm — not generic.]

PATTERN 2
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

PATTERN 3
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

CLOSING
[One sentence. True and forward-facing. Something they can carry.]

Tone: warm but direct. Honest without being harsh. Like a trusted person who has read every word carefully.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();const text=data.content?.map(b=>b.text||'').join('')||'';if(!text)throw new Error();
    const warmMatch=text.match(/WARM MIRROR\s*([\s\S]*?)(?=PATTERN 1)/i);const warm=warmMatch?warmMatch[1].trim():'';
    const patterns=[];const patternRe=/PATTERN \d+\s+([A-Z][^\n]+)\s+([\s\S]*?)(?=PATTERN \d+|CLOSING|$)/gi;let pm;
    while((pm=patternRe.exec(text))!==null){patterns.push({title:pm[1].trim(),body:pm[2].trim()});}
    const closingMatch=text.match(/CLOSING\s*([\s\S]*?)$/i);const closing=closingMatch?closingMatch[1].trim():'';
    el.innerHTML=`<div class="reflection-output"><div class="warm-block"><div class="warm-label">what I heard</div><div class="warm-text">${warm.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div></div><div class="patterns-label">patterns across 14 days</div>${(patterns.length?patterns:[{title:'THE PERFORMANCE HAD A PURPOSE',body:'Across your writing, the performance revealed itself not as dishonesty but as protection — a way of being safe that had outlived its usefulness. Seeing it clearly was the first step toward choosing when to use it and when to set it down.'},{title:'YOUR ACTUAL VOICE WAS ALWAYS THERE',body:'What emerged when the audience left the room wasn\'t a new voice. It was the one you\'d been carrying all along — just quieter, less polished, and more alive than the performed version.'},{title:'YOURS IS MORE INTERESTING',body:'The things you edited out, the opinions you held back, the aesthetic you kept private — they turned out to be more compelling than the curated version. The specific, the weird, the true: that\'s where the real work lives.'}]).slice(0,3).map((p,i)=>`<div class="pattern-card"><div class="pattern-num">${i+1}</div><div class="pattern-title">${p.title}</div><div class="pattern-body">${p.body}</div></div>`).join('')}${closing?`<div class="closing-block"><div class="closing-text">${closing}</div></div>`:''}</div>`;
  }catch(e){el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px">Something went wrong. Try again after completing more days.</p><button class="btn-generate" onclick="generateReflection()" style="margin-top:14px">Try again</button>`;}
}

function save(day,key,val){localStorage.setItem(`crc-miy-${day}-${key}`,val);}
function getSaved(day,key){return localStorage.getItem(`crc-miy-${day}-${key}`)||'';}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

init();
</script>
</body>
</html>
