<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move It Forward — Creative Reset Club</title>
<style>
@font-face {
  font-family: 'Codec Pro';
  src: url('/fonts/codec-pro_regular.ttf') format('truetype');
  font-weight: 400 700;
  font-style: normal;
}
</style>
<style>
  :root {
    --cream: #f4f2ee; --cream-dark: #e8e4dc; --ink: #000332; --ink-soft: #000332cc;
    --red: #ff9090; --red-soft: #ffd0d0; --sand: #000332; --sand-mid: #00033280;
    --ice: #e6f6ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--cream); color:var(--ink); font-family:'Codec Pro',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
  .app { display:flex; min-height:100vh; position:relative; z-index:1; }

  /* SIDEBAR */
  .sidebar { width:268px; min-height:100vh; background:var(--ink); padding:32px 22px; position:fixed; top:0; left:0; bottom:0; overflow-y:auto; display:flex; flex-direction:column; z-index:50; transition:transform .3s ease; }
  .sidebar-logo { font-size:11px; letter-spacing:.12em; text-transform:lowercase; color:rgba(255,255,255,0.35); margin-bottom:4px; }
  .sidebar-program { font-family:'Codec Pro',sans-serif; font-size:19px; color:var(--cream); line-height:1.2; margin-bottom:32px; font-style:normal; }
  .phase-group { margin-bottom:20px; }
  .phase-label { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,0.28); margin-bottom:7px; padding-left:4px; }
  .day-nav-item { display:flex; align-items:center; gap:9px; padding:8px 9px; border-radius:3px; cursor:pointer; transition:all .2s; border:none; background:none; width:100%; text-align:left; }
  .day-nav-item:hover { background:rgba(242,237,228,.06); }
  .day-nav-item.active { background:rgba(242,237,228,.1); }
  .day-nav-num { width:23px; height:23px; border-radius:50%; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; font-size:10px; color:rgba(255,255,255,0.55); font-weight:500; flex-shrink:0; transition:all .2s; }
  .day-nav-item.active .day-nav-num { background:var(--cream); color:var(--ink); }
  .day-nav-item.completed .day-nav-num { background:var(--red)!important; color:white!important; }
  .day-nav-title { font-size:11px; color:rgba(255,255,255,0.45); line-height:1.3; font-weight:300; }
  .day-nav-item.active .day-nav-title { color:var(--cream); font-weight:400; }
  .sidebar-progress { margin-top:auto; padding-top:20px; border-top:1px solid rgba(242,237,228,.1); }
  .progress-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:7px; }
  .progress-track { height:3px; background:rgba(242,237,228,.1); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--red); border-radius:2px; transition:width .5s ease; }
  .progress-count { font-size:11px; color:rgba(255,255,255,0.35); margin-top:6px; }

  /* MAIN */
  .main { margin-left:268px; flex:1; padding:52px 60px 100px; max-width:calc(100% - 268px); }
  .day-view { display:none; animation:fadeIn .4s ease forwards; }
  .day-view.active { display:block; }
  .journal-view { display:none; animation:fadeIn .4s ease forwards; }
  .journal-view.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* DAY HEADER */
  .day-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:40px; }
  .day-eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:10px; }
  .day-title { font-family:'Codec Pro',sans-serif; font-size:clamp(28px,4vw,46px); line-height:1.08; font-weight:400; color:var(--ink); margin-bottom:8px; }
  .day-title em { font-style:normal; color:var(--red); }
  .day-number-large { font-family:'Codec Pro',sans-serif; font-size:100px; line-height:1; color:var(--cream-dark); font-style:normal; user-select:none; margin-left:16px; margin-top:-4px; flex-shrink:0; }
  .day-completed-badge { display:none; align-items:center; gap:7px; font-size:12px; color:var(--red); }
  .day-completed-badge.show { display:flex; }
  .day-completed-badge::before { content:'✓'; width:17px; height:17px; background:var(--red); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; }

  /* SECTION */
  .section { margin-bottom:32px; }
  .section-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--sand); opacity:.4; }
  .question-text { font-family:'Codec Pro',sans-serif; font-size:clamp(17px,2.5vw,25px); line-height:1.45; color:var(--ink); margin-bottom:10px; font-style:normal; }
  .writing-prompts { margin-bottom:14px; }
  .writing-prompt { font-size:13px; color:var(--ink-soft); line-height:1.65; padding:5px 0 5px 14px; border-left:2px solid var(--sand); margin-bottom:7px; font-weight:300; }

  /* TEXTAREA + COUNTER */
  .writing-area { width:100%; min-height:260px; padding:20px 22px; border:1.5px solid var(--sand); border-radius:3px; background:transparent; font-family:'Codec Pro',sans-serif; font-size:15px; line-height:1.85; color:var(--ink); resize:vertical; outline:none; transition:border-color .2s; }
  .writing-area::placeholder { color:var(--sand-mid); font-style:normal; font-size:14px; }
  .writing-area:focus { border-color:var(--ink); }
  .writing-area.sufficient { border-color:#7A9E7E; }
  .char-counter { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .char-bar { flex:1; height:2px; background:var(--sand); border-radius:2px; overflow:hidden; }
  .char-fill { height:100%; background:var(--sand-mid); border-radius:2px; transition:width .3s ease, background .3s ease; }
  .char-fill.sufficient { background:#7A9E7E; }
  .char-num { font-size:11px; color:var(--sand-mid); white-space:nowrap; }
  .char-num.sufficient { color:#7A9E7E; }

  /* REFLECTION + ACTION */
  .reflection-box { background:var(--cream-dark); border-radius:3px; padding:20px 24px; }
  .reflection-prompt { font-size:14px; line-height:1.75; color:var(--ink-soft); font-style:normal; }
  .action-card { border:1.5px solid var(--ink); border-radius:3px; padding:20px 24px; display:flex; gap:16px; align-items:flex-start; }
  .action-icon { width:32px; height:32px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .action-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:4px; }
  .action-text { font-size:14px; line-height:1.65; color:var(--ink); }

  /* BUTTONS */
  .complete-row { margin-top:32px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .btn-complete { background:var(--ink); color:var(--cream); border:none; padding:14px 34px; font-family:'Codec Pro',sans-serif; font-size:14px; font-weight:500; letter-spacing:.06em; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-complete:hover:not(:disabled) { background:var(--red); transform:translateY(-1px); }
  .btn-complete:disabled { background:var(--sand); cursor:default; }
  .btn-next { background:transparent; color:var(--ink); border:1.5px solid var(--sand); padding:13px 26px; font-family:'Codec Pro',sans-serif; font-size:14px; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-next:hover { border-color:var(--ink); }
  .complete-note { font-size:12px; color:var(--sand-mid); width:100%; }
  .complete-note.error { color:var(--red); }

  /* JOURNAL */
  .journal-entry { margin-bottom:44px; padding-bottom:44px; border-bottom:1px solid var(--sand); }
  .journal-entry:last-of-type { border-bottom:none; }
  .journal-day-label { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:6px; }
  .journal-day-title { font-family:'Codec Pro',sans-serif; font-size:22px; font-style:normal; color:var(--ink); margin-bottom:12px; }
  .journal-question { font-size:13px; color:var(--sand-mid); margin-bottom:8px; font-style:normal; }
  .journal-answer { font-size:15px; line-height:1.85; color:var(--ink-soft); white-space:pre-wrap; }
  .journal-empty { font-size:14px; color:var(--sand); font-style:normal; }

  /* AI REFLECTION */
  .ai-section { margin-top:56px; padding-top:44px; border-top:2px solid var(--ink); }
  .ai-eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--red); margin-bottom:10px; }
  .ai-title { font-family:'Codec Pro',sans-serif; font-size:30px; font-weight:400; color:var(--ink); margin-bottom:6px; }
  .ai-title em { font-style:normal; }
  .ai-sub { font-size:14px; color:var(--sand-mid); margin-bottom:32px; line-height:1.6; }
  .btn-generate { background:var(--ink); color:var(--cream); border:none; padding:15px 38px; font-family:'Codec Pro',sans-serif; font-size:14px; font-weight:500; letter-spacing:.06em; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-generate:hover { background:var(--red); transform:translateY(-1px); }
  .loading-box { display:flex; align-items:center; gap:12px; padding:28px; background:var(--ink); border-radius:4px; color:var(--cream); }
  .loading-dots { display:flex; gap:4px; }
  .loading-dot { width:6px; height:6px; border-radius:50%; background:var(--red); animation:pulse 1.4s ease infinite; }
  .loading-dot:nth-child(2) { animation-delay:.2s; }
  .loading-dot:nth-child(3) { animation-delay:.4s; }
  @keyframes pulse { 0%,80%,100% { opacity:.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }
  .reflection-output { animation:fadeIn .6s ease; }
  .warm-block { background:var(--ink); color:var(--cream); border-radius:4px; padding:32px; margin-bottom:24px; }
  .warm-label { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:14px; }
  .warm-text { font-size:15px; line-height:1.85; color:rgba(242,237,228,.88); font-weight:300; }
  .warm-text p { margin-bottom:14px; }
  .warm-text p:last-child { margin-bottom:0; }
  .patterns-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .patterns-label::after { content:''; flex:1; height:1px; background:var(--sand); opacity:.4; }
  .pattern-card { border:1.5px solid var(--sand); border-radius:3px; padding:22px 26px; margin-bottom:10px; }
  .pattern-num { font-family:'Codec Pro',sans-serif; font-size:28px; font-style:normal; color:var(--red); line-height:1; margin-bottom:6px; }
  .pattern-title { font-size:15px; font-weight:500; color:var(--ink); margin-bottom:7px; }
  .pattern-body { font-size:14px; line-height:1.75; color:var(--ink-soft); }
  .closing-block { padding:24px; background:var(--cream-dark); border-radius:3px; margin-top:10px; }
  .closing-text { font-family:'Codec Pro',sans-serif; font-size:19px; font-style:normal; line-height:1.55; color:var(--ink); }

  /* UNDER THE SURFACE COLLAPSIBLE */
  .uts-section { margin-bottom:32px; }
  .uts-toggle { display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding:16px 20px; background:rgba(0,3,50,0.03); border-radius:4px; border:1px solid rgba(0,3,50,0.06); list-style:none; }
  .uts-toggle::-webkit-details-marker { display:none; }
  .uts-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); }
  .uts-icon { font-size:16px; color:var(--sand-mid); transition:transform 0.2s; }
  details[open] .uts-icon { transform:rotate(45deg); }
  .uts-body { padding:20px 20px 4px; font-size:14px; line-height:1.75; color:var(--ink-soft); font-weight:300; }

  /* MOBILE */
  .menu-toggle { display:none; position:fixed; top:14px; left:14px; z-index:200; background:var(--ink); color:var(--cream); border:none; width:38px; height:38px; border-radius:3px; font-size:17px; cursor:pointer; align-items:center; justify-content:center; }
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:40; }
  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .sidebar-overlay.show { display:block; }
    .menu-toggle { display:flex; }
    .main { margin-left:0; padding:52px 18px 80px; max-width:100%; }
    .day-number-large { display:none; }
  }
</style>
</head>
<body>
<button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">creative reset club</div>
    <div class="sidebar-program">Move It<br>Forward</div>
    <div id="sidebarNav"></div>
    <div class="sidebar-progress">
      <div class="progress-label">your progress</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-count" id="progressCount">0 of 14 days complete</div>
    </div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
const MIN = 100;
function wordCount(str){ return str.trim().split(/\s+/).filter(w=>w.length>0).length; }
const program = [
  { day:1, phase:1, phaseName:"Understand the Loop", title:"Name the Loop",
    uts:"Loops have a structure. They look like procrastination from the outside but from the inside they feel more like reasonable caution. You revise, refine, reconsider. The work never feels quite ready. The moment never feels quite right. Cognitive science calls this rumination — the brain running the same process repeatedly without resolution. The first step out of the loop is naming it precisely.",
    q:"Write about the thing that's stuck. Not what it is — what the loop looks like. What do you do instead of moving it forward?",
    prompts:["What does a typical day with this thing in the background look like?","What do you tell yourself when you don't move it forward?","How long has it been in this state?"],
    kg:"Write about what moving it forward would actually require. Not the ideal version — the next smallest step. What would that be?",
    notice:"Notice if the loop has a rhythm. Same time of day, same trigger, same avoidance. Patterns this consistent usually have a specific cause.",
    action:{ i:"📋", t:"Write the name of the stuck thing at the top of today's entry. Just naming it directly is the first move." }
  },
  { day:2, phase:1, phaseName:"Understand the Loop", title:"What the Loop Is Protecting You From",
    uts:"Loops are rarely random. They tend to form around things that matter — which is why they're so persistent. The refining and revisiting isn't laziness. It's a protection mechanism. Something about finishing, or releasing, or being seen feels threatening. Until you understand what the loop is protecting you from, it's very hard to move through it.",
    q:"Write about what finishing this thing would mean. Not the positive version — the scary version. What becomes real when it's done?",
    prompts:["What could go wrong once it exists in the world?","What would you have to give up — identity, excuses, possibility — if it were finished?","Is there a version of you that benefits from it staying unfinished?"],
    kg:"Write about the best case scenario if it were finished. Be specific. What changes? What becomes possible?",
    notice:"Notice if the fear of finishing is bigger than the fear of never finishing. That ratio matters.",
    action:{ i:"🔍", t:"Write one sentence about what you're actually afraid of. As plainly as possible. No softening." }
  },
  { day:3, phase:1, phaseName:"Understand the Loop", title:"The Perfectionism Check",
    uts:"Perfectionism isn't really about quality. It's about control. If the work is never finished, it can never be judged. The standard keeps moving because the real goal isn't excellence — it's safety. Brené Brown's research on vulnerability shows that the willingness to be seen imperfectly is the precondition for genuine creative work. Not the outcome. The precondition.",
    q:"Write about your standard for this thing. What would 'good enough' actually look like? Be specific.",
    prompts:["Where did this standard come from? Is it yours, or did you inherit it?","Has anything you've made ever actually met this standard? What happened?","What would you have to believe about yourself to release something imperfect?"],
    kg:"Write the ugliest, most imperfect version of the next step. Not what it should be — what it could be if you just did it badly and moved on.",
    notice:"Notice if your perfectionism is selective. Most people are more perfectionist about the things that matter most to them. That's useful information.",
    action:{ i:"✅", t:"Write one thing you could release, finish, or move forward today at 80% quality. Just one. 80% done and out is worth more than 100% done and stuck." }
  },
  { day:4, phase:2, phaseName:"Break the Pattern", title:"The Smallest Possible Move",
    uts:"BJ Fogg's research on behavior change shows that the size of the action matters less than the consistency of starting. A move so small it feels almost pointless is still a move. It still breaks the pattern. It still tells your nervous system that forward is possible. The goal today isn't progress. It's the interruption of the loop.",
    q:"Write about the smallest possible move you could make on the stuck thing today. Not the right move, not the impressive move. The most doable one.",
    prompts:["It should take less than 10 minutes.","It should require almost no decision-making.","If it feels too small, good. That's the point."],
    kg:"Write about what comes after that move. Not a full plan. Just the next two steps after the smallest one.",
    notice:"Notice if the small move feels insufficient. That feeling is the perfectionism talking. The move doesn't need to feel significant to be significant.",
    action:{ i:"👣", t:"Do the smallest move. Right now if you can. Then write one sentence about what happened." }
  },
  { day:5, phase:2, phaseName:"Break the Pattern", title:"Change the Context",
    uts:"Loops are partly environmental. The same desk, the same time of day, the same sequence of events before you sit down — these conditions become associated with the stuck feeling. Sometimes the fastest way to break a loop isn't to think differently about the work. It's to think about it somewhere else, at a different time, in a different state.",
    q:"Write about where and when you usually work on this thing. What does that context feel like? What associations has it accumulated?",
    prompts:["What do you feel in your body when you sit down to work on it?","What do you do in the minutes before? Does that help or hurt?","When was the last time you worked on it somewhere different?"],
    kg:"Write about what a different context for this work could look like. Not a fantasy — a realistic alternative. Different time, different place, different sequence.",
    notice:"Notice if you've been treating the stuck feeling as information about the work, when it might just be information about the context.",
    action:{ i:"🔄", t:"Work on the stuck thing somewhere different today. Even for 10 minutes. Notice what changes." }
  },
  { day:6, phase:2, phaseName:"Break the Pattern", title:"Set a Constraint",
    uts:"Constraints are one of the most reliable creativity tools because they force decisions. When everything is possible, nothing gets done. When the parameters narrow, the work has somewhere to go. Brian Eno built an entire creative system around this principle. The constraint isn't a limitation. It's a direction.",
    q:"Write about what constraint you could put on the stuck thing. A deadline, a word limit, a format restriction, a scope reduction. Something that forces a decision.",
    prompts:["What would you have to cut or simplify to work within this constraint?","What would the constraint force you to prioritize?","What version of this thing could exist within the constraint?"],
    kg:"Write the constrained version. Not what it should be eventually. What it could be now, within the limits you just set.",
    notice:"Notice if the constrained version is actually closer to the core of what you're trying to say or make. Often it is.",
    action:{ i:"📐", t:"Set one real constraint on the stuck thing. Write it down. It's now a rule until the thing is done." }
  },
  { day:7, phase:2, phaseName:"Break the Pattern", title:"Ship Something Adjacent",
    uts:"Sometimes the best way to break a loop on one thing is to finish something else. The act of completion — any completion — rebuilds the neural pathway between starting and finishing. It reminds your system that done is possible. It doesn't matter if the thing you finish is the stuck thing. It matters that you finish something.",
    q:"Write about something smaller and adjacent to the stuck thing that you could complete today. A piece of it, a related thing, something that lives in the same creative neighborhood.",
    prompts:["It doesn't have to be important. It just has to be completable.","What's the smallest unit of this work that could be considered done?","What would it feel like to mark something complete today?"],
    kg:"Write about what finishing this adjacent thing might open up. What might become clearer or easier once something is done?",
    notice:"Notice if finishing the small thing changes how the stuck thing feels. Often it does. Momentum is transferable.",
    action:{ i:"📦", t:"Finish the adjacent thing today. Mark it complete. Write one word about how that feels." }
  },
  { day:8, phase:3, phaseName:"Make Small Committed Moves", title:"Define Done",
    uts:"One of the most common causes of creative loops is an undefined finish line. If you don't know what done looks like, you can never get there. The work keeps expanding to fill the available space. Defining done isn't giving up on quality. It's giving the work a place to land.",
    q:"Write about what done actually looks like for the stuck thing. Be specific. What would exist that doesn't exist now? What would you be able to say?",
    prompts:["Not the ideal version. The version that could exist if you finished it this week.","What's the minimum that would make it real?","What would you have to stop adding or changing for it to be done?"],
    kg:"Write a completion criteria list. Three to five specific things that would mean this is done. Not perfect. Done.",
    notice:"Notice if defining done made the work feel more or less possible. If it feels more possible, you have your answer. If it feels less possible, the definition might still be too broad.",
    action:{ i:"🎯", t:"Write your completion criteria at the top of today's entry. That's your finish line. Everything else is in service of crossing it." }
  },
  { day:9, phase:3, phaseName:"Make Small Committed Moves", title:"Work in Public",
    uts:"Accountability doesn't require an audience. It requires a witness. Telling one person what you're working on and when you plan to have it done changes the psychology of the work. Not because of external pressure, but because articulating a commitment out loud makes it more real. The work stops being a private negotiation and becomes something you've said.",
    q:"Write about who you could tell about this thing. Not to impress them, not to ask for feedback. Just to say: this is what I'm working on and this is when I'm going to have something to show.",
    prompts:["Who would hold this lightly enough not to add pressure, but seriously enough to actually remember?","What would you tell them? Write it out.","What timeline would you commit to?"],
    kg:"Write about what it would feel like to have this thing exist and for that person to have seen it. Be specific about the feeling, not the outcome.",
    notice:"Notice if the act of writing what you'd tell them made the commitment feel more real. That's the effect of articulation.",
    action:{ i:"🗣️", t:"Tell one person today. It can be a message, a conversation, a voice note. Just say it out loud to someone." }
  },
  { day:10, phase:3, phaseName:"Make Small Committed Moves", title:"The Reverse Brief",
    uts:"Working backward from the finished thing is a powerful way to break creative paralysis. Instead of asking 'what do I do next,' you ask 'what would have to be true for this to be done?' Then you work backward from that state. It shifts the question from open-ended to specific, from generative to editorial. Sometimes that's exactly what the work needs.",
    q:"Write about the finished version of this thing as if it already exists. Describe it in detail. What does it look like, feel like, say?",
    prompts:["Be as specific as possible. The more detailed the vision, the clearer the path.","What do people say about it? How does it make them feel?","How do you feel when you look at it?"],
    kg:"Now work backward. What had to happen in the last week before it was finished? The last day? The last hour? Write the reverse timeline.",
    notice:"Notice if working backward revealed a specific next step that forward thinking had been obscuring.",
    action:{ i:"⏪", t:"Write the one thing that has to happen next, based on the reverse brief. Just one. Do it today." }
  },
  { day:11, phase:4, phaseName:"Build Momentum and Release", title:"Release Something",
    uts:"There is a version of this thing that could exist today. Not the final version, not the perfect version. A version. Releasing an imperfect thing is an act of creative courage, and it's also a practical move. Work that exists in the world can be responded to, improved, built on. Work that stays in the loop can't do any of those things.",
    q:"Write about what version of this thing could be released today. Not what you wish you could release. What you actually could.",
    prompts:["What would you have to let go of to release it at this stage?","Who would benefit from it existing, even imperfectly?","What's the cost of waiting for the perfect version versus the cost of releasing now?"],
    kg:"Write about what releasing this thing would make possible. What comes after? What gets unlocked?",
    notice:"Notice if the resistance to releasing is about the work or about being seen. Those require different responses.",
    action:{ i:"🚀", t:"Release something today. It can be small. A draft, a paragraph, an idea shared with one person. Something that didn't exist in the world yesterday." }
  },
  { day:12, phase:4, phaseName:"Build Momentum and Release", title:"What Moving Forward Cost",
    uts:"Moving forward always costs something. Time, comfort, the safety of the unfinished. Acknowledging what it cost isn't weakness — it's honest accounting. And honest accounting tends to produce better decisions than pretending the cost wasn't real.",
    q:"Write about what moving this thing forward has cost you. Not in a complaining way. Just honestly.",
    prompts:["What did you have to give up or push through to get here?","What was harder than you expected?","What surprised you about the process?"],
    kg:"Write about what it was worth. What do you have now that you didn't have at Day 1? What shifted?",
    notice:"Notice if the cost was worth it. If it was, that's information about what matters to you. If it wasn't, that's equally important information.",
    action:{ i:"💎", t:"Write one thing you learned about yourself through this process. Just one. That learning belongs to you regardless of what happens with the work." }
  },
  { day:13, phase:4, phaseName:"Build Momentum and Release", title:"The Next Thing",
    uts:"Momentum is real and it's transferable. The state of having moved something forward, having broken a loop, having released something — that state is a resource. It doesn't disappear when this particular piece of work is done. It's available for the next thing. The question is what you do with it.",
    q:"Write about what's next. Not a grand plan. Just what you want to move toward now that this thing has moved.",
    prompts:["What's been waiting for this thing to be done before it could begin?","What feels most alive to you right now?","What do you want to make next?"],
    kg:"Write about how you want to work differently going forward. What have you learned about your own loop that you can use?",
    notice:"Notice if you feel differently about starting something new than you did at Day 1. That's the shift this track was designed to create.",
    action:{ i:"🌱", t:"Write the name of the next thing at the top of a blank entry. Leave the rest empty. That's where you're going." }
  },
  { day:14, phase:5, phaseName:"The Move", title:"The Move",
    uts:"You started this track stuck in a loop. You've spent two weeks understanding it, breaking it, making small moves, and releasing something. The loop isn't gone forever — loops come back. But now you know what yours looks like, what it protects you from, and how to interrupt it. That knowledge is the real output of this track.",
    q:"Write about where you started and where you are now. Not in terms of the work. In terms of how you move.",
    prompts:["What do you know about your loop that you didn't know two weeks ago?","What was the move that mattered most?","What do you want to remember when the loop comes back?"],
    kg:"Write your forward statement. Not a plan. A declaration of how you intend to move from here.",
    notice:"Notice what's different. The loop may have felt permanent. It wasn't.",
    action:{ i:"⚡", t:"Write three words that describe how you want to work from here. Then write one sentence about what you're moving toward next." }
  }
];


const completed = new Set(JSON.parse(localStorage.getItem('crc-mif') || '[]'));

function init() {
  buildSidebar();
  document.getElementById('mainContent').innerHTML = program.map(buildDay).join('') + buildJournal();
  showDay(1);
  updateProgress();
}

function buildSidebar() {
  const phases = {};
  program.forEach(d => { if(!phases[d.phase]) phases[d.phase]=[]; phases[d.phase].push(d); });
  let html = '';
  Object.entries(phases).forEach(([ph, days]) => {
    html += `<div class="phase-group"><div class="phase-label">Phase ${ph} — ${days[0].phaseName}</div>`;
    days.forEach(d => {
      html += `<button class="day-nav-item ${completed.has(d.day)?'completed':''}" id="nav-${d.day}" onclick="showDay(${d.day})">
        <div class="day-nav-num">${d.day}</div><div class="day-nav-title">${d.title}</div></button>`;
    });
    html += '</div>';
  });
  html += `<div class="phase-group"><div class="phase-label">Review</div>
    <button class="day-nav-item" id="nav-journal" onclick="showJournal()">
      <div class="day-nav-num" style="font-size:13px">📖</div>
      <div class="day-nav-title">Full Journal + AI Reflection</div>
    </button></div>`;
  document.getElementById('sidebarNav').innerHTML = html;
}

function buildDay(d) {
  const sv = getSaved(d.day,'main');
  const wc = wordCount(sv), pct = Math.min(100,(wc/MIN)*100), suf = wc>=MIN;
  const done = completed.has(d.day);
  return `<div class="day-view" id="day-${d.day}">
    <div class="day-header">
      <div class="day-meta">
        <div class="day-eyebrow">Day ${d.day} · Phase ${d.phase}: ${d.phaseName}</div>
        <h1 class="day-title">${d.title.split(' ').slice(0,-1).join(' ')} <em>${d.title.split(' ').slice(-1)}</em></h1>
        <div class="day-completed-badge ${done?'show':''}" id="badge-${d.day}">Completed</div>
      </div>
      <div class="day-number-large">${d.day}</div>
    </div>
    <details class="uts-section">
      <summary class="uts-toggle">
        <span class="uts-label">under the surface</span>
        <span class="uts-icon">+</span>
      </summary>
      <div class="uts-body">${d.uts}</div>
    </details>
    <div class="section">
      <div class="section-label">start here</div>
      <div class="question-text">"${d.q}"</div>
      <div class="writing-prompts">${d.prompts.map(p=>`<div class="writing-prompt">${p}</div>`).join('')}</div>
      <textarea class="writing-area${suf?' sufficient':''}" id="write-${d.day}" placeholder="Write freely and at length. Use the prompts above as guides — not limits." oninput="onWrite(${d.day})">${sv}</textarea>
      <div class="char-counter">
        <div class="char-bar"><div class="char-fill${suf?' sufficient':''}" id="fill-${d.day}" style="width:${pct}%"></div></div>
        <div class="char-num${suf?' sufficient':''}" id="ctr-${d.day}">${suf?'✓ ready':`${wc} / ${MIN} words`}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">keep going</div>
      <div class="question-text">"${d.kg}"</div>
    </div>
    <div class="section">
      <div class="section-label">notice this</div>
      <div class="reflection-box"><div class="reflection-prompt">${d.notice}</div></div>
    </div>
    <div class="section">
      <div class="section-label">micro-action</div>
      <div class="action-card">
        <div class="action-icon">${d.action.i}</div>
        <div><div class="action-label">do this today</div><div class="action-text">${d.action.t}</div></div>
      </div>
    </div>
    <div class="complete-row">
      <button class="btn-complete" id="cbtn-${d.day}" onclick="completeDay(${d.day})" ${done?'disabled':''}>${done?'Day Complete ✓':'Mark Day Complete'}</button>
      ${d.day<14?`<button class="btn-next" onclick="showDay(${d.day+1})">Day ${d.day+1} →</button>`:`<button class="btn-next" onclick="showJournal()">See your full journal →</button>`}
      ${!done?`<div class="complete-note" id="note-${d.day}">Write at least ${MIN} words to complete this day.</div>`:''}
    </div>
  </div>`;
}

function buildJournal() {
  return `<div class="journal-view" id="journal-view">
    <div class="day-eyebrow" style="margin-bottom:14px">Your Journey</div>
    <h1 class="day-title" style="margin-bottom:8px">Fourteen Days of <em>Moving</em></h1>
    <p style="font-size:15px;color:var(--ink-soft);line-height:1.7;margin-bottom:44px;font-weight:300">Everything you wrote, in one place.</p>
    <div id="j-entries"></div>
    <div class="ai-section">
      <div class="ai-eyebrow">AI Reflection</div>
      <h2 class="ai-title">What your writing <em>reveals</em></h2>
      <p class="ai-sub">A warm mirror of what you said — then 2–3 patterns surfaced from everything you worked through across 14 days.</p>
      <div id="ai-state"><button class="btn-generate" onclick="generateReflection()">Generate my reflection</button></div>
    </div>
  </div>`;
}

function showDay(n) {
  document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('day-'+n)?.classList.add('active');
  document.getElementById('nav-'+n)?.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  closeSidebar();
}

function showJournal() {
  document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('journal-view').classList.add('active');
  document.getElementById('nav-journal')?.classList.add('active');
  populateJournal();
  window.scrollTo({top:0,behavior:'smooth'});
  closeSidebar();
}

function populateJournal() {
  document.getElementById('j-entries').innerHTML = program.map(d=>{
    const m=getSaved(d.day,'main');
    return `<div class="journal-entry">
      <div class="journal-day-label">Day ${d.day} · ${d.phaseName}</div>
      <div class="journal-day-title">${d.title}</div>
      <div class="journal-question">"${d.q}"</div>
      ${m?`<div class="journal-answer">${m}</div>`:`<div class="journal-empty">Nothing written yet.</div>`}
    </div>`;
  }).join('');
}

function onWrite(n) {
  const v = document.getElementById('write-'+n)?.value||'';
  save(n,'main',v);
  const wc=wordCount(v), pct=Math.min(100,(wc/MIN)*100), suf=wc>=MIN;
  const fill=document.getElementById('fill-'+n), ctr=document.getElementById('ctr-'+n), ta=document.getElementById('write-'+n);
  if(fill){fill.style.width=pct+'%'; fill.className='char-fill'+(suf?' sufficient':'');}
  if(ctr){ctr.textContent=suf?'✓ ready':`${wc} / ${MIN} words`; ctr.className='char-num'+(suf?' sufficient':'');}
  if(ta) ta.className='writing-area'+(suf?' sufficient':'');
  const note=document.getElementById('note-'+n);
  if(note) note.style.display=suf?'none':'block';
}

function completeDay(n) {
  const v=getSaved(n,'main');
  if(wordCount(v)<MIN){
    const note=document.getElementById('note-'+n);
    if(note){note.className='complete-note error'; note.textContent=`Please write at least ${MIN} words first.`;}
    return;
  }
  completed.add(n);
  localStorage.setItem('crc-mif',JSON.stringify([...completed]));
  const btn=document.getElementById('cbtn-'+n);
  if(btn){btn.textContent='Day Complete ✓'; btn.disabled=true;}
  document.getElementById('badge-'+n)?.classList.add('show');
  const nav=document.getElementById('nav-'+n);
  if(nav) nav.classList.add('completed');
  const nn=nav?.querySelector('.day-nav-num');
  if(nn){nn.style.background='#C84B2F'; nn.style.color='white';}
  updateProgress();
  // Post message to parent for Supabase save
  window.parent.postMessage({ type:'dayComplete', day:n }, '*');
  if(n<14) setTimeout(()=>showDay(n+1),500);
  else setTimeout(()=>showJournal(),500);
}

function updateProgress() {
  const pct=(completed.size/14)*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressCount').textContent=`${completed.size} of 14 days complete`;
}

async function generateReflection() {
  const el=document.getElementById('ai-state');
  el.innerHTML=`<div class="loading-box"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><span style="font-size:14px;color:rgba(242,237,228,.7);font-weight:300">Reading everything you wrote across 14 days…</span></div>`;

  const writing = program.map(d=>{
    const m=getSaved(d.day,'main');
    if(!m) return null;
    return `DAY ${d.day} — ${d.title}\nQ: "${d.q}"\nA: ${m}`;
  }).filter(Boolean).join('\n\n---\n\n');

  if(!writing.trim()){
    el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px;font-style:italic">Nothing written yet. Complete some days first and come back.</p>`;
    return;
  }

  const prompt=`You are a warm, insightful coach reviewing someone's 14-day journal from "Move It Forward" — a program helping people break free from creative loops, stop circling and start moving, and release work that's been stuck.

Here is everything they wrote:

${writing}

Respond in exactly this format:

WARM MIRROR
[3-4 paragraphs reflecting back what they said warmly and without judgment. Use their own language. Show them you heard them. Speak directly to them as "you". Make them feel genuinely seen. Do not interpret yet — just mirror.]

PATTERN 1
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote. Honest and warm — not generic.]

PATTERN 2
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

PATTERN 3
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

CLOSING
[One sentence. True and forward-facing. Something they can carry.]

Tone: warm but direct. Honest without being harsh. Like a trusted person who has read every word carefully.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'';
    if(!text) throw new Error();

    const warmMatch = text.match(/WARM MIRROR\s*([\s\S]*?)(?=PATTERN 1)/i);
    const warm = warmMatch ? warmMatch[1].trim() : '';

    const patterns = [];
    const patternRe = /PATTERN \d+\s+([A-Z][^\n]+)\s+([\s\S]*?)(?=PATTERN \d+|CLOSING|$)/gi;
    let pm;
    while((pm=patternRe.exec(text))!==null) {
      patterns.push({ title: pm[1].trim(), body: pm[2].trim() });
    }

    const closingMatch = text.match(/CLOSING\s*([\s\S]*?)$/i);
    const closing = closingMatch ? closingMatch[1].trim() : '';

    el.innerHTML = `<div class="reflection-output">
      <div class="warm-block">
        <div class="warm-label">what I heard</div>
        <div class="warm-text">${warm.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
      </div>
      <div class="patterns-label">patterns across 14 days</div>
      ${(patterns.length?patterns:[{title:'THE LOOP HAD A NAME',body:'Across your writing, a specific pattern of avoidance and return became visible — not random stuckness, but a loop with structure, triggers, and a purpose you could finally see.'},{title:'SMALL MOVES CHANGED EVERYTHING',body:'You showed that the size of the action mattered less than the act of starting. The smallest moves broke the pattern more effectively than any grand plan could have.'},{title:'FORWARD WAS ALWAYS POSSIBLE',body:'What emerged wasn\'t a sudden breakthrough but a growing recognition that movement was available all along — the loop just made it hard to see.'}]).slice(0,3).map((p,i)=>`
        <div class="pattern-card">
          <div class="pattern-num">${i+1}</div>
          <div class="pattern-title">${p.title}</div>
          <div class="pattern-body">${p.body}</div>
        </div>`).join('')}
      ${closing?`<div class="closing-block"><div class="closing-text">${closing}</div></div>`:''}
    </div>`;
  } catch(e) {
    el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px">Something went wrong. Try again after completing more days.</p>
      <button class="btn-generate" onclick="generateReflection()" style="margin-top:14px">Try again</button>`;
  }
}

function save(day,key,val){ localStorage.setItem(`crc-mif-${day}-${key}`,val); }
function getSaved(day,key){ return localStorage.getItem(`crc-mif-${day}-${key}`)||''; }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

init();
</script>
</body>
</html>
