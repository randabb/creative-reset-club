<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reignite — Creative Reset Club</title>
<style>
@font-face {
  font-family: 'Codec Pro';
  src: url('/fonts/codec-pro_regular.ttf') format('truetype');
  font-weight: 400 700;
  font-style: normal;
}
</style>
<style>
  :root {
    --cream: #f4f2ee; --cream-dark: #e8e4dc; --ink: #000332; --ink-soft: #000332cc;
    --red: #ff9090; --red-soft: #ffd0d0; --sand: #000332; --sand-mid: #00033280;
    --ice: #e6f6ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--cream); color:var(--ink); font-family:'Codec Pro',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }
  .app { display:flex; min-height:100vh; position:relative; z-index:1; }

  /* SIDEBAR */
  .sidebar { width:268px; min-height:100vh; background:var(--ink); padding:32px 22px; position:fixed; top:0; left:0; bottom:0; overflow-y:auto; display:flex; flex-direction:column; z-index:50; transition:transform .3s ease; }
  .sidebar-logo { font-size:11px; letter-spacing:.12em; text-transform:lowercase; color:rgba(255,255,255,0.35); margin-bottom:4px; }
  .sidebar-program { font-family:'Codec Pro',sans-serif; font-size:19px; color:var(--cream); line-height:1.2; margin-bottom:32px; font-style:normal; }
  .phase-group { margin-bottom:20px; }
  .phase-label { font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,0.28); margin-bottom:7px; padding-left:4px; }
  .day-nav-item { display:flex; align-items:center; gap:9px; padding:8px 9px; border-radius:3px; cursor:pointer; transition:all .2s; border:none; background:none; width:100%; text-align:left; }
  .day-nav-item:hover { background:rgba(242,237,228,.06); }
  .day-nav-item.active { background:rgba(242,237,228,.1); }
  .day-nav-num { width:23px; height:23px; border-radius:50%; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; font-size:10px; color:rgba(255,255,255,0.55); font-weight:500; flex-shrink:0; transition:all .2s; }
  .day-nav-item.active .day-nav-num { background:var(--cream); color:var(--ink); }
  .day-nav-item.completed .day-nav-num { background:var(--red)!important; color:white!important; }
  .day-nav-title { font-size:11px; color:rgba(255,255,255,0.45); line-height:1.3; font-weight:300; }
  .day-nav-item.active .day-nav-title { color:var(--cream); font-weight:400; }
  .sidebar-progress { margin-top:auto; padding-top:20px; border-top:1px solid rgba(242,237,228,.1); }
  .progress-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:7px; }
  .progress-track { height:3px; background:rgba(242,237,228,.1); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--red); border-radius:2px; transition:width .5s ease; }
  .progress-count { font-size:11px; color:rgba(255,255,255,0.35); margin-top:6px; }

  /* MAIN */
  .main { margin-left:268px; flex:1; padding:52px 60px 100px; max-width:calc(100% - 268px); }
  .day-view { display:none; animation:fadeIn .4s ease forwards; }
  .day-view.active { display:block; }
  .journal-view { display:none; animation:fadeIn .4s ease forwards; }
  .journal-view.active { display:block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  /* DAY HEADER */
  .day-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:40px; }
  .day-eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:10px; }
  .day-title { font-family:'Codec Pro',sans-serif; font-size:clamp(28px,4vw,46px); line-height:1.08; font-weight:400; color:var(--ink); margin-bottom:8px; }
  .day-title em { font-style:normal; color:var(--red); }
  .day-number-large { font-family:'Codec Pro',sans-serif; font-size:100px; line-height:1; color:var(--cream-dark); font-style:normal; user-select:none; margin-left:16px; margin-top:-4px; flex-shrink:0; }
  .day-completed-badge { display:none; align-items:center; gap:7px; font-size:12px; color:var(--red); }
  .day-completed-badge.show { display:flex; }
  .day-completed-badge::before { content:'✓'; width:17px; height:17px; background:var(--red); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; }

  /* FRAMEWORK (kept for backwards compat) */
  .framework-card { background:var(--ink); color:var(--cream); border-radius:4px; padding:26px 30px; margin-bottom:32px; position:relative; overflow:hidden; }
  .framework-card::before { content:''; position:absolute; top:0; right:0; width:70px; height:70px; background:rgba(200,75,47,.15); border-radius:50%; transform:translate(18px,-18px); }
  .framework-eyebrow { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--red); margin-bottom:7px; }
  .framework-name { font-family:'Codec Pro',sans-serif; font-size:19px; color:var(--cream); margin-bottom:2px; font-style:normal; }
  .framework-author { font-size:12px; color:var(--sand-mid); margin-bottom:12px; }
  .framework-body { font-size:14px; line-height:1.75; color:rgba(242,237,228,.75); font-weight:300; }
  .framework-benefit { margin-top:12px; padding-top:12px; border-top:1px solid rgba(244,242,238,.15); font-size:12px; color:rgba(244,242,238,0.65); line-height:1.65; }
  .framework-benefit strong { color:#f4f2ee; font-weight:700; }

  /* SECTION */
  .section { margin-bottom:32px; }
  .section-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--sand); opacity:.4; }
  .question-text { font-family:'Codec Pro',sans-serif; font-size:clamp(17px,2.5vw,25px); line-height:1.45; color:var(--ink); margin-bottom:10px; font-style:normal; }
  .writing-prompts { margin-bottom:14px; }
  .writing-prompt { font-size:13px; color:var(--ink-soft); line-height:1.65; padding:5px 0 5px 14px; border-left:2px solid var(--sand); margin-bottom:7px; font-weight:300; }

  /* TEXTAREA + COUNTER */
  .writing-area { width:100%; min-height:260px; padding:20px 22px; border:1.5px solid var(--sand); border-radius:3px; background:transparent; font-family:'Codec Pro',sans-serif; font-size:15px; line-height:1.85; color:var(--ink); resize:vertical; outline:none; transition:border-color .2s; }
  .writing-area::placeholder { color:var(--sand-mid); font-style:normal; font-size:14px; }
  .writing-area:focus { border-color:var(--ink); }
  .writing-area.sufficient { border-color:#7A9E7E; }
  .char-counter { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .char-bar { flex:1; height:2px; background:var(--sand); border-radius:2px; overflow:hidden; }
  .char-fill { height:100%; background:var(--sand-mid); border-radius:2px; transition:width .3s ease, background .3s ease; }
  .char-fill.sufficient { background:#7A9E7E; }
  .char-num { font-size:11px; color:var(--sand-mid); white-space:nowrap; }
  .char-num.sufficient { color:#7A9E7E; }

  /* REFLECTION + ACTION */
  .reflection-box { background:var(--cream-dark); border-radius:3px; padding:20px 24px; }
  .reflection-prompt { font-size:14px; line-height:1.75; color:var(--ink-soft); font-style:normal; }
  .action-card { border:1.5px solid var(--ink); border-radius:3px; padding:20px 24px; display:flex; gap:16px; align-items:flex-start; }
  .action-icon { width:32px; height:32px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .action-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:4px; }
  .action-text { font-size:14px; line-height:1.65; color:var(--ink); }

  /* BUTTONS */
  .complete-row { margin-top:32px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .btn-complete { background:var(--ink); color:var(--cream); border:none; padding:14px 34px; font-family:'Codec Pro',sans-serif; font-size:14px; font-weight:500; letter-spacing:.06em; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-complete:hover:not(:disabled) { background:var(--red); transform:translateY(-1px); }
  .btn-complete:disabled { background:var(--sand); cursor:default; }
  .btn-next { background:transparent; color:var(--ink); border:1.5px solid var(--sand); padding:13px 26px; font-family:'Codec Pro',sans-serif; font-size:14px; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-next:hover { border-color:var(--ink); }
  .complete-note { font-size:12px; color:var(--sand-mid); width:100%; }
  .complete-note.error { color:var(--red); }

  /* JOURNAL */
  .journal-entry { margin-bottom:44px; padding-bottom:44px; border-bottom:1px solid var(--sand); }
  .journal-entry:last-of-type { border-bottom:none; }
  .journal-day-label { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:6px; }
  .journal-day-title { font-family:'Codec Pro',sans-serif; font-size:22px; font-style:normal; color:var(--ink); margin-bottom:12px; }
  .journal-question { font-size:13px; color:var(--sand-mid); margin-bottom:8px; font-style:normal; }
  .journal-answer { font-size:15px; line-height:1.85; color:var(--ink-soft); white-space:pre-wrap; }
  .journal-empty { font-size:14px; color:var(--sand); font-style:normal; }

  /* AI REFLECTION */
  .ai-section { margin-top:56px; padding-top:44px; border-top:2px solid var(--ink); }
  .ai-eyebrow { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--red); margin-bottom:10px; }
  .ai-title { font-family:'Codec Pro',sans-serif; font-size:30px; font-weight:400; color:var(--ink); margin-bottom:6px; }
  .ai-title em { font-style:normal; }
  .ai-sub { font-size:14px; color:var(--sand-mid); margin-bottom:32px; line-height:1.6; }
  .btn-generate { background:var(--ink); color:var(--cream); border:none; padding:15px 38px; font-family:'Codec Pro',sans-serif; font-size:14px; font-weight:500; letter-spacing:.06em; border-radius:2px; cursor:pointer; transition:all .2s; }
  .btn-generate:hover { background:var(--red); transform:translateY(-1px); }
  .loading-box { display:flex; align-items:center; gap:12px; padding:28px; background:var(--ink); border-radius:4px; color:var(--cream); }
  .loading-dots { display:flex; gap:4px; }
  .loading-dot { width:6px; height:6px; border-radius:50%; background:var(--red); animation:pulse 1.4s ease infinite; }
  .loading-dot:nth-child(2) { animation-delay:.2s; }
  .loading-dot:nth-child(3) { animation-delay:.4s; }
  @keyframes pulse { 0%,80%,100% { opacity:.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }
  .reflection-output { animation:fadeIn .6s ease; }
  .warm-block { background:var(--ink); color:var(--cream); border-radius:4px; padding:32px; margin-bottom:24px; }
  .warm-label { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:14px; }
  .warm-text { font-size:15px; line-height:1.85; color:rgba(242,237,228,.88); font-weight:300; }
  .warm-text p { margin-bottom:14px; }
  .warm-text p:last-child { margin-bottom:0; }
  .patterns-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .patterns-label::after { content:''; flex:1; height:1px; background:var(--sand); opacity:.4; }
  .pattern-card { border:1.5px solid var(--sand); border-radius:3px; padding:22px 26px; margin-bottom:10px; }
  .pattern-num { font-family:'Codec Pro',sans-serif; font-size:28px; font-style:normal; color:var(--red); line-height:1; margin-bottom:6px; }
  .pattern-title { font-size:15px; font-weight:500; color:var(--ink); margin-bottom:7px; }
  .pattern-body { font-size:14px; line-height:1.75; color:var(--ink-soft); }
  .closing-block { padding:24px; background:var(--cream-dark); border-radius:3px; margin-top:10px; }
  .closing-text { font-family:'Codec Pro',sans-serif; font-size:19px; font-style:normal; line-height:1.55; color:var(--ink); }

  /* UNDER THE SURFACE COLLAPSIBLE */
  .uts-section { margin-bottom:32px; }
  .uts-toggle { display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding:16px 20px; background:rgba(0,3,50,0.03); border-radius:4px; border:1px solid rgba(0,3,50,0.06); list-style:none; }
  .uts-toggle::-webkit-details-marker { display:none; }
  .uts-label { font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--sand-mid); }
  .uts-icon { font-size:16px; color:var(--sand-mid); transition:transform 0.2s; }
  details[open] .uts-icon { transform:rotate(45deg); }
  .uts-body { padding:20px 20px 4px; font-size:14px; line-height:1.75; color:var(--ink-soft); font-weight:300; }

  /* MOBILE */
  .menu-toggle { display:none; position:fixed; top:14px; left:14px; z-index:200; background:var(--ink); color:var(--cream); border:none; width:38px; height:38px; border-radius:3px; font-size:17px; cursor:pointer; align-items:center; justify-content:center; }
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:40; }
  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .sidebar-overlay.show { display:block; }
    .menu-toggle { display:flex; }
    .main { margin-left:0; padding:52px 18px 80px; max-width:100%; }
    .day-number-large { display:none; }
  }
</style>
</head>
<body>
<button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">creative reset club</div>
    <div class="sidebar-program">Reignite</div>
    <div id="sidebarNav"></div>
    <div class="sidebar-progress">
      <div class="progress-label">your progress</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-count" id="progressCount">0 of 14 days complete</div>
    </div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
const MIN = 100;
function wordCount(str){ return str.trim().split(/\s+/).filter(w=>w.length>0).length; }
const program = [
  { day:1, phase:1, phaseName:"Notice the Drift", title:"The Last Time",
    uts:"Disconnection from your own thinking rarely happens suddenly. It's a slow drift, usually invisible until you look back and realize you can't remember the last time an idea felt entirely yours. Mihaly Csikszentmihalyi's research on flow shows that creative engagement requires a specific kind of attention, one that's hard to access when you're constantly reacting to external input. The first step isn't to generate. It's to notice where you went.",
    q:"Write about the last time you had an idea that felt entirely yours. Not a response to something you read, not a brief someone gave you, not a trend you noticed. Something that came from inside.",
    prompts:["When was it? What were you doing? Where were you?","What did it feel like to have it? How is that different from how ideas feel now?","What happened after? Did you follow it? Did you let it go?"],
    kg:"Write about what's changed since then. Not in your external circumstances. In how you think. What do you do now that you didn't do then? What have you stopped doing?",
    notice:"Notice if the memory of that last time feels far away or surprisingly close. Both tell you something.",
    action:{ i:"💭", t:"Write one word that describes how thinking felt then. Write one word that describes how it feels now. Sit with the gap between them." }
  },
  { day:2, phase:1, phaseName:"Notice the Drift", title:"What You've Been Consuming",
    uts:"The ratio of input to output matters more than most people realize. When consumption consistently outpaces expression, the internal voice gets quieter. Not because it has nothing to say, because it hasn't been asked. Rick Rubin describes creativity as rooted in noticing and receiving. But receiving requires space, and space requires occasionally stopping the intake.",
    q:"Write about what you've been consuming most. Content, tools, other people's thinking, AI outputs, social feeds. What has been filling the space where your own thinking used to live?",
    prompts:["Be honest about volume. How much are you taking in compared to how much you're putting out?","Which inputs feel nourishing? Which ones just fill time?","Is there anything you reach for automatically, before you've given yourself a chance to think first?"],
    kg:"Write about what you reach for when you're stuck. The first thing you do when you don't know what to do next. That reflex is worth examining.",
    notice:"Notice if any of your consumption habits started as tools and became defaults. There's a difference between choosing to use something and reaching for it without thinking.",
    action:{ i:"📱", t:"Name one input you could reduce or delay by 30 minutes tomorrow morning. Just 30 minutes of space before you let anything in." }
  },
  { day:3, phase:1, phaseName:"Notice the Drift", title:"When You Stopped Generating",
    uts:"There's usually a moment, or a period, when the shift happened. A project that went badly. A stretch of overwork. A season of consuming more than creating. A relationship or role that slowly took over. It's worth identifying not to assign blame but to understand the pattern, so you can interrupt it.",
    q:"Write about when you think the drift started. You don't have to be precise. Just get close.",
    prompts:["What was happening in your life or work around that time?","Was there a specific moment, or was it gradual?","Did you notice it then, or only in retrospect?"],
    kg:"Write about what you were generating before the drift. What were you making, thinking about, working on? What did your creative life look like when it felt most alive?",
    notice:"Notice if identifying the origin point makes the disconnection feel more understandable. It wasn't random. It had a cause. Causes can be addressed.",
    action:{ i:"📍", t:"Write one sentence that starts with 'I stopped generating when...' Finish it honestly. That sentence is the beginning of the way back." }
  },
  { day:4, phase:1, phaseName:"Notice the Drift", title:"What You Still Notice",
    uts:"Attention is the seed of creativity. Before ideas, before making, before expression, there is noticing. Simone Weil wrote that attention is the rarest and purest form of generosity. It's also the first thing to go when we're depleted or overwhelmed. But it doesn't disappear entirely. Even in the quietest creative periods, something still catches your eye. That something is worth following.",
    q:"Write about what you still notice. The things that catch your attention even when you're not looking for inspiration. Images, conversations, moments, questions, patterns.",
    prompts:["What have you noticed in the last week that you haven't told anyone?","What do you keep coming back to, even when you try to move on?","What makes you stop scrolling, slow down, look twice?"],
    kg:"Pick one thing you've noticed recently and follow it further than you normally would. Write about why it caught you. What it connects to. What it might mean.",
    notice:"Notice that you're still noticing. The capacity is there. It just needs to be trusted again.",
    action:{ i:"👁️", t:"Write down one thing you noticed today. Just one. Do this every day this week." }
  },
  { day:5, phase:2, phaseName:"Hear Yourself Again", title:"What You Know That Others Don't",
    uts:"Every person has a specific kind of knowledge that comes from their particular combination of experience, perspective, and attention. Not expertise in the formal sense, something more specific. The way you understand a certain kind of situation. The pattern you always see that others seem to miss. Austin Kleon calls it your unique combination of influences. It's already there. You just haven't been asked to articulate it lately.",
    q:"Write about something you understand that most people in your field or life don't seem to see. A pattern, a truth, a way of thinking about something that feels obvious to you but isn't obvious to others.",
    prompts:["It doesn't have to be profound. It just has to be genuinely yours.","Where did this understanding come from? Experience, observation, failure, something else?","Have you ever tried to explain it to someone? What happened?"],
    kg:"Write about why this matters. Not why it's impressive, why it's useful, or true, or worth saying out loud.",
    notice:"Notice how it feels to claim something as yours. That slight resistance or discomfort is worth paying attention to.",
    action:{ i:"🔑", t:"Write one sentence that starts with 'Something I've always believed about [your field or creative practice] is...' That sentence is a seed." }
  },
  { day:6, phase:2, phaseName:"Hear Yourself Again", title:"Your Unpopular Opinion",
    uts:"The most interesting thinking usually lives at the edge of what's acceptable to say. Not because controversy is valuable in itself, but because the places where you hesitate are often the places where you actually have something to say. David Whyte writes that we discover what we think through expression. Sometimes the way to find your voice is to say the thing you've been editing out.",
    q:"Write about something you genuinely believe that most people around you don't agree with. About your work, your field, creativity, how things should be done, what matters.",
    prompts:["Don't perform controversy. Write something you actually believe.","Why do you believe it? What has led you to this?","What would happen if you said this out loud in a room full of your peers?"],
    kg:"Write about what it would mean to build something from this belief. Not a manifesto, just a direction. What would your work look like if this belief was at the center of it?",
    notice:"Notice if this belief has been quietly shaping your work already, even when you weren't naming it.",
    action:{ i:"🗣️", t:"Write your unpopular opinion in one sentence. As clearly and directly as you can. No hedging. That sentence is yours." }
  },
  { day:7, phase:2, phaseName:"Hear Yourself Again", title:"The Question You Keep Asking",
    uts:"Every creative person has a question they keep returning to, even when they think they've moved on. It shows up in different projects, different forms, different phases of life. Identifying it doesn't mean you have to answer it. It means you know what you're actually working on, underneath everything else.",
    q:"Write about the question you keep asking. The one that shows up across your work, your thinking, your conversations. You might not have articulated it before, try now.",
    prompts:["Look back at things you've made or been drawn to. What question do they have in common?","What are you trying to figure out? Not intellectually, existentially.","If your work could answer one question, what would it be?"],
    kg:"Write about why this question matters to you. Where it came from. Why it hasn't been answered yet.",
    notice:"Notice if naming the question makes the work feel more coherent. Often it does. The question is the thread that connects everything.",
    action:{ i:"❓", t:"Write your question at the top of a blank entry. Leave the rest empty. That's your creative compass." }
  },
  { day:8, phase:3, phaseName:"Make Something", title:"Generate Without Filtering",
    uts:"The inner critic and the inner creator cannot operate at the same time. Julia Cameron's morning pages work not because the writing is good, it's often terrible, but because the act of writing without judgment rebuilds the neural pathway between impulse and expression. You're not trying to make something good today. You're trying to make something at all.",
    q:"Write for 10 minutes without stopping. Start with whatever is in your head right now. Follow each thought wherever it goes. Don't edit, don't evaluate, don't reread until you're done.",
    prompts:["If you get stuck, write 'I don't know what to write' until something else comes.","Don't try to be interesting. Try to be honest.","Keep going even when it feels pointless. Especially then."],
    kg:"Read back what you wrote. Underline one sentence that surprised you. Write about why it surprised you.",
    notice:"Notice what came out when you stopped trying to control it. That's closer to your actual voice than anything you'd produce with editing.",
    action:{ i:"✍️", t:"Do this again tomorrow morning, before you look at your phone. Just 5 minutes. No agenda." }
  },
  { day:9, phase:3, phaseName:"Make Something", title:"Make Something Badly",
    uts:"Perfectionism is the enemy of the first draft, the first attempt, the first anything. Elizabeth Gilbert writes that fear and creativity travel together, the goal isn't to eliminate fear but to move alongside it. Making something badly on purpose is one of the most effective ways to break the perfectionism loop. It reframes the task from 'make something good' to 'make something at all.'",
    q:"Make something today with the explicit intention of making it badly. Write a terrible first paragraph of something. Sketch an ugly idea. Draft the worst possible version of something you've been wanting to make.",
    prompts:["The worse the better. Genuinely try to make it bad.","Notice what happens when you give yourself permission to fail on purpose.","Keep going even when the good version starts trying to take over."],
    kg:"Write about what it felt like to make something badly. Was it harder or easier than you expected? What did the bad version reveal that the good version would have hidden?",
    notice:"Notice if the bad version had any energy in it. Sometimes the ugly first draft is closer to the truth than the polished one.",
    action:{ i:"🎨", t:"Save the bad version. Don't delete it. It's evidence that you showed up." }
  },
  { day:10, phase:3, phaseName:"Make Something", title:"Follow a Lateral Prompt",
    uts:"Brian Eno's Oblique Strategies were designed to break creative deadlock by introducing an indirect constraint. When you approach a problem from an unexpected angle, the usual defenses don't have time to activate. Lateral thinking doesn't bypass the creative process. It sneaks past the gatekeeper.",
    q:"Respond to this without thinking too hard: 'Write about a time you were in a room where something shifted. You might not have understood it at the time.'",
    prompts:["Don't try to make it relevant to your work. Just respond.","Go somewhere specific. A real room, a real moment.","Write until you find the thing you didn't expect to find."],
    kg:"Write about what this has to do with what you're actually working on or thinking about. Even if the connection isn't obvious. Make it anyway.",
    notice:"Notice if coming at something sideways opened a door that the direct approach had closed.",
    action:{ i:"🔀", t:"Write your own lateral prompt for tomorrow. Something indirect, something sensory, something that doesn't obviously connect to your work. Use it." }
  },
  { day:11, phase:4, phaseName:"Return", title:"What You've Been Avoiding Making",
    uts:"There's usually something. A project, an idea, a creative direction that keeps surfacing and keeps being postponed. Not because it isn't ready, because it matters too much to risk. Steven Pressfield's rule applies here: the strength of the Resistance is proportional to the importance of the work. The thing you've been avoiding making is probably the thing most worth making.",
    q:"Write about the thing you've been avoiding making. The one you keep thinking about but haven't started. Or started and stopped. Or finished and hidden.",
    prompts:["Why have you been avoiding it? Be honest, not strategic.","What's the worst that could happen if you made it? What's the best?","What would it mean to you if it existed in the world?"],
    kg:"Write the first paragraph of it. Right now. Badly if necessary. Just begin.",
    notice:"Notice how it feels to have started, even just a little. The beginning is always the hardest part. You've done it.",
    action:{ i:"🚀", t:"Give the thing a working title. Write it down. A bad title is better than no title. It makes the thing real." }
  },
  { day:12, phase:4, phaseName:"Return", title:"Your Creative Conditions",
    uts:"Creativity doesn't happen in a vacuum. It happens under specific conditions, and those conditions are different for everyone. Some people need silence. Others need noise. Some need the morning. Others need exhaustion. Knowing your conditions isn't precious. It's practical. You can't reliably access your best thinking without understanding what makes it possible.",
    q:"Write about the conditions under which you do your best thinking. Time of day, environment, state of mind, what came before.",
    prompts:["Think of a time when something came easily. What were the conditions?","What consistently gets in the way? What drains the creative state before it starts?","What do you need more of? What do you need less of?"],
    kg:"Write about what a deliberately designed creative day would look like for you. Not an ideal fantasy, a realistic version of your actual life, arranged to support your thinking.",
    notice:"Notice if you've been expecting creativity to happen under conditions that don't support it. That's not a character flaw. It's a design problem.",
    action:{ i:"🏠", t:"Change one thing about tomorrow that brings it closer to your creative conditions. Just one." }
  },
  { day:13, phase:4, phaseName:"Return", title:"The Practice Commitment",
    uts:"Agnes Martin said that the work comes before the inspiration, not after. Showing up consistently, regardless of how you feel, is what rebuilds the connection to your own thinking. Not waiting to feel ready. Not waiting for the right conditions. Just returning, every day, to the practice. The practice is what makes the inspiration possible.",
    q:"Write about what a daily creative practice would look like for you. Not a grand plan, a small, sustainable, repeatable thing you could actually do.",
    prompts:["How much time? When? Under what conditions?","What would it produce? Or does it need to produce anything?","What would make you stop? What would make you keep going?"],
    kg:"Write about why this practice matters to you right now. What are you hoping it restores? What are you hoping it builds?",
    notice:"Notice if committing to a practice feels different from committing to a project. A practice asks less of you in any single moment, and more of you over time.",
    action:{ i:"🔄", t:"Write your practice commitment in one sentence. As simple and specific as possible. That's the thing you're returning to." }
  },
  { day:14, phase:5, phaseName:"The Return", title:"The Return",
    uts:"You started this track having lost the thread back to your own thinking. You've spent two weeks noticing, remembering, generating, and returning. The thread isn't gone. It was never gone. You just needed the conditions to hear it again. That's what this was.",
    q:"Write about where you started and where you are now. Not in terms of what you've made, in terms of how you're thinking.",
    prompts:["What can you hear now that you couldn't hear two weeks ago?","What surprised you most about this process?","What do you want to protect going forward?"],
    kg:"Write your return statement. Not a plan, not a commitment. Just a declaration of what you've come back to.",
    notice:"Notice what's different. It might be quiet. That's fine. The reconnection doesn't always announce itself.",
    action:{ i:"🌅", t:"Write three words that describe how you want to think from here. Then write one sentence about what you're going to make next." }
  }
];


const completed = new Set(JSON.parse(localStorage.getItem('crc-ri') || '[]'));

function init() {
  buildSidebar();
  document.getElementById('mainContent').innerHTML = program.map(buildDay).join('') + buildJournal();
  showDay(1);
  updateProgress();
}

function buildSidebar() {
  const phases = {};
  program.forEach(d => { if(!phases[d.phase]) phases[d.phase]=[]; phases[d.phase].push(d); });
  let html = '';
  Object.entries(phases).forEach(([ph, days]) => {
    html += `<div class="phase-group"><div class="phase-label">Phase ${ph} — ${days[0].phaseName}</div>`;
    days.forEach(d => {
      html += `<button class="day-nav-item ${completed.has(d.day)?'completed':''}" id="nav-${d.day}" onclick="showDay(${d.day})">
        <div class="day-nav-num">${d.day}</div><div class="day-nav-title">${d.title}</div></button>`;
    });
    html += '</div>';
  });
  html += `<div class="phase-group"><div class="phase-label">Review</div>
    <button class="day-nav-item" id="nav-journal" onclick="showJournal()">
      <div class="day-nav-num" style="font-size:13px">📖</div>
      <div class="day-nav-title">Full Journal + AI Reflection</div>
    </button></div>`;
  document.getElementById('sidebarNav').innerHTML = html;
}

function buildDay(d) {
  const sv = getSaved(d.day,'main');
  const wc = wordCount(sv), pct = Math.min(100,(wc/MIN)*100), suf = wc>=MIN;
  const done = completed.has(d.day);
  return `<div class="day-view" id="day-${d.day}">
    <div class="day-header">
      <div class="day-meta">
        <div class="day-eyebrow">Day ${d.day} · Phase ${d.phase}: ${d.phaseName}</div>
        <h1 class="day-title">${d.title.split(' ').slice(0,-1).join(' ')} <em>${d.title.split(' ').slice(-1)}</em></h1>
        <div class="day-completed-badge ${done?'show':''}" id="badge-${d.day}">Completed</div>
      </div>
      <div class="day-number-large">${d.day}</div>
    </div>
    <details class="uts-section">
      <summary class="uts-toggle">
        <span class="uts-label">under the surface</span>
        <span class="uts-icon">+</span>
      </summary>
      <div class="uts-body">${d.uts}</div>
    </details>
    <div class="section">
      <div class="section-label">start here</div>
      <div class="question-text">"${d.q}"</div>
      <div class="writing-prompts">${d.prompts.map(p=>`<div class="writing-prompt">${p}</div>`).join('')}</div>
      <textarea class="writing-area${suf?' sufficient':''}" id="write-${d.day}" placeholder="Write freely and at length. Use the prompts above as guides — not limits." oninput="onWrite(${d.day})">${sv}</textarea>
      <div class="char-counter">
        <div class="char-bar"><div class="char-fill${suf?' sufficient':''}" id="fill-${d.day}" style="width:${pct}%"></div></div>
        <div class="char-num${suf?' sufficient':''}" id="ctr-${d.day}">${suf?'✓ ready':`${wc} / ${MIN} words`}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">keep going</div>
      <div class="question-text">"${d.kg}"</div>
    </div>
    <div class="section">
      <div class="section-label">notice this</div>
      <div class="reflection-box"><div class="reflection-prompt">${d.notice}</div></div>
    </div>
    <div class="section">
      <div class="section-label">micro-action</div>
      <div class="action-card">
        <div class="action-icon">${d.action.i}</div>
        <div><div class="action-label">do this today</div><div class="action-text">${d.action.t}</div></div>
      </div>
    </div>
    <div class="complete-row">
      <button class="btn-complete" id="cbtn-${d.day}" onclick="completeDay(${d.day})" ${done?'disabled':''}>${done?'Day Complete ✓':'Mark Day Complete'}</button>
      ${d.day<14?`<button class="btn-next" onclick="showDay(${d.day+1})">Day ${d.day+1} →</button>`:`<button class="btn-next" onclick="showJournal()">See your full journal →</button>`}
      ${!done?`<div class="complete-note" id="note-${d.day}">Write at least ${MIN} words to complete this day.</div>`:''}
    </div>
  </div>`;
}

function buildJournal() {
  return `<div class="journal-view" id="journal-view">
    <div class="day-eyebrow" style="margin-bottom:14px">Your Journey</div>
    <h1 class="day-title" style="margin-bottom:8px">Fourteen Days of <em>Reigniting</em></h1>
    <p style="font-size:15px;color:var(--ink-soft);line-height:1.7;margin-bottom:44px;font-weight:300">Everything you wrote, in one place.</p>
    <div id="j-entries"></div>
    <div class="ai-section">
      <div class="ai-eyebrow">AI Reflection</div>
      <h2 class="ai-title">What your writing <em>reveals</em></h2>
      <p class="ai-sub">A warm mirror of what you said — then 2–3 patterns surfaced from everything you worked through across 14 days.</p>
      <div id="ai-state"><button class="btn-generate" onclick="generateReflection()">Generate my reflection</button></div>
    </div>
  </div>`;
}

function showDay(n) {
  document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('day-'+n)?.classList.add('active');
  document.getElementById('nav-'+n)?.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  closeSidebar();
}

function showJournal() {
  document.querySelectorAll('.day-view,.journal-view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.day-nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('journal-view').classList.add('active');
  document.getElementById('nav-journal')?.classList.add('active');
  populateJournal();
  window.scrollTo({top:0,behavior:'smooth'});
  closeSidebar();
}

function populateJournal() {
  document.getElementById('j-entries').innerHTML = program.map(d=>{
    const m=getSaved(d.day,'main');
    return `<div class="journal-entry">
      <div class="journal-day-label">Day ${d.day} · ${d.phaseName}</div>
      <div class="journal-day-title">${d.title}</div>
      <div class="journal-question">"${d.q}"</div>
      ${m?`<div class="journal-answer">${m}</div>`:`<div class="journal-empty">Nothing written yet.</div>`}
    </div>`;
  }).join('');
}

function onWrite(n) {
  const v = document.getElementById('write-'+n)?.value||'';
  save(n,'main',v);
  const wc=wordCount(v), pct=Math.min(100,(wc/MIN)*100), suf=wc>=MIN;
  const fill=document.getElementById('fill-'+n), ctr=document.getElementById('ctr-'+n), ta=document.getElementById('write-'+n);
  if(fill){fill.style.width=pct+'%'; fill.className='char-fill'+(suf?' sufficient':'');}
  if(ctr){ctr.textContent=suf?'✓ ready':`${wc} / ${MIN} words`; ctr.className='char-num'+(suf?' sufficient':'');}
  if(ta) ta.className='writing-area'+(suf?' sufficient':'');
  const note=document.getElementById('note-'+n);
  if(note) note.style.display=suf?'none':'block';
}

function completeDay(n) {
  const v=getSaved(n,'main');
  if(wordCount(v)<MIN){
    const note=document.getElementById('note-'+n);
    if(note){note.className='complete-note error'; note.textContent=`Please write at least ${MIN} words first.`;}
    return;
  }
  completed.add(n);
  localStorage.setItem('crc-ri',JSON.stringify([...completed]));
  const btn=document.getElementById('cbtn-'+n);
  if(btn){btn.textContent='Day Complete ✓'; btn.disabled=true;}
  document.getElementById('badge-'+n)?.classList.add('show');
  const nav=document.getElementById('nav-'+n);
  if(nav) nav.classList.add('completed');
  const nn=nav?.querySelector('.day-nav-num');
  if(nn){nn.style.background='#C84B2F'; nn.style.color='white';}
  updateProgress();
  if(n<14) setTimeout(()=>showDay(n+1),500);
  else setTimeout(()=>showJournal(),500);
}

function updateProgress() {
  const pct=(completed.size/14)*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressCount').textContent=`${completed.size} of 14 days complete`;
}

async function generateReflection() {
  const el=document.getElementById('ai-state');
  el.innerHTML=`<div class="loading-box"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><span style="font-size:14px;color:rgba(242,237,228,.7);font-weight:300">Reading everything you wrote across 14 days…</span></div>`;

  const writing = program.map(d=>{
    const m=getSaved(d.day,'main');
    if(!m) return null;
    return `DAY ${d.day} — ${d.title}\nQ: "${d.q}"\nA: ${m}`;
  }).filter(Boolean).join('\n\n---\n\n');

  if(!writing.trim()){
    el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px;font-style:italic">Nothing written yet. Complete some days first and come back.</p>`;
    return;
  }

  const prompt=`You are a warm, insightful coach reviewing someone's 14-day journal from "Reignite" — a program helping people reconnect with their own creative thinking after a period of drift, rediscover their voice, and return to making.

Here is everything they wrote:

${writing}

Respond in exactly this format:

WARM MIRROR
[3-4 paragraphs reflecting back what they said warmly and without judgment. Use their own language. Show them you heard them. Speak directly to them as "you". Make them feel genuinely seen. Do not interpret yet — just mirror.]

PATTERN 1
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote. Honest and warm — not generic.]

PATTERN 2
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

PATTERN 3
[SHORT SPECIFIC TITLE IN CAPS]
[One paragraph describing this pattern, grounded in specific things they wrote.]

CLOSING
[One sentence. True and forward-facing. Something they can carry.]

Tone: warm but direct. Honest without being harsh. Like a trusted person who has read every word carefully.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'';
    if(!text) throw new Error();

    const warmMatch = text.match(/WARM MIRROR\s*([\s\S]*?)(?=PATTERN 1)/i);
    const warm = warmMatch ? warmMatch[1].trim() : '';

    const patterns = [];
    const patternRe = /PATTERN \d+\s+([A-Z][^\n]+)\s+([\s\S]*?)(?=PATTERN \d+|CLOSING|$)/gi;
    let pm;
    while((pm=patternRe.exec(text))!==null) {
      patterns.push({ title: pm[1].trim(), body: pm[2].trim() });
    }

    const closingMatch = text.match(/CLOSING\s*([\s\S]*?)$/i);
    const closing = closingMatch ? closingMatch[1].trim() : '';

    el.innerHTML = `<div class="reflection-output">
      <div class="warm-block">
        <div class="warm-label">what I heard</div>
        <div class="warm-text">${warm.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>
      </div>
      <div class="patterns-label">patterns across 14 days</div>
      ${(patterns.length?patterns:[{title:'THE THREAD WAS NEVER LOST',body:'Across your writing, a consistent thread of creative identity that was always present — just buried under noise, obligation, and the drift of daily life.'},{title:'YOUR VOICE RETURNING',body:'You showed a growing willingness to trust your own thinking again. The hesitation at the start gave way to something more direct, more honest, more yours.'},{title:'A PRACTICE TAKING SHAPE',body:'What emerged wasn\'t a grand plan but something better — a sustainable way of returning to your own thinking, shaped by honest self-observation.'}]).slice(0,3).map((p,i)=>`
        <div class="pattern-card">
          <div class="pattern-num">${i+1}</div>
          <div class="pattern-title">${p.title}</div>
          <div class="pattern-body">${p.body}</div>
        </div>`).join('')}
      ${closing?`<div class="closing-block"><div class="closing-text">${closing}</div></div>`:''}
    </div>`;
  } catch(e) {
    el.innerHTML=`<p style="color:var(--sand-mid);font-size:14px">Something went wrong. Try again after completing more days.</p>
      <button class="btn-generate" onclick="generateReflection()" style="margin-top:14px">Try again</button>`;
  }
}

function save(day,key,val){ localStorage.setItem(`crc-ri-${day}-${key}`,val); }
function getSaved(day,key){ return localStorage.getItem(`crc-ri-${day}-${key}`)||''; }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

init();
</script>
</body>
</html>
